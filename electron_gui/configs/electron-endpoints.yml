# electron_gui/configs/electron-endpoints.yml
# Container runtime paths use /app/*; host registry: infrastructure/containers/host-config.yml
# Load via electron_gui utils / container: /app/electron-gui/utils/load_host_config.py

version: "1.0"

meta:
  host_config_path: infrastructure/containers/host-config.yml
  host_config_container_path: /app/configs/host-config.yml
  http_path_template: http://${service_name}:${port}/app
  description: Electron GUI ↔ backend bases (Docker DNS). base_url ends with /app.

endpoints:
