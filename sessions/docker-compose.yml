# sessions/docker-compose.yml
# Lucid session services – production spin-up

services:
  session-recorder:
    image: pickme/lucid-session-recorder:latest-arm64
    container_name: session-recorder
    restart: unless-stopped
    env_file:
      - .env.foundation
      - .env.core
      - .env.application
      - .env.secrets
    environment:
      - LUCID_ENV=production
      - LUCID_PLATFORM=arm64
      - PROJECT_ROOT=/mnt/myssd/Lucid/Lucid
      - SESSION_RECORDER_PORT=8090
      - SESSION_RECORDER_URL=http://session-recorder:8090
      - MONGODB_URI=mongodb://lucid:${MONGODB_PASSWORD}@lucid-mongodb:27017/lucid?authSource=admin
      - REDIS_URL=redis://:${REDIS_PASSWORD}@lucid-redis:6379/0
      - API_GATEWAY_URL=http://api-gateway:8080
    ports:
      - "8090:8090"
    networks:
      - lucid-pi-network
    volumes:
      - session-recordings:/data/recordings
      - session-logs:/app/logs
    depends_on:
      lucid-mongodb:
        condition: service_healthy
      lucid-redis:
        condition: service_healthy
    user: "65532:65532"
    security_opt:
      - no-new-privileges:true
      - seccomp:unconfined
    cap_drop: ["ALL"]
    read_only: true
    tmpfs:
      - /tmp:noexec,nosuid,size=200m
    healthcheck:
      test: ["CMD", "python3", "-c", "import sys; sys.exit(0)"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  session-chunk-processor:
    image: pickme/lucid-chunk-processor:latest-arm64
    container_name: session-chunk-processor
    restart: unless-stopped
    env_file:
      - .env.foundation
      - .env.core
      - .env.application
      - .env.secrets
      - .env.chunker
    environment:
      - LUCID_ENV=production
      - LUCID_PLATFORM=arm64
      - PROJECT_ROOT=/mnt/myssd/Lucid/Lucid
      - CHUNK_PROCESSOR_PORT=8010
      - CHUNK_PROCESSOR_URL=http://session-chunk-processor:8010
      - MONGODB_URI=mongodb://lucid:${MONGODB_PASSWORD}@lucid-mongodb:27017/lucid?authSource=admin
      - REDIS_URL=redis://:${REDIS_PASSWORD}@lucid-redis:6379/0
      - SESSION_RECORDER_URL=http://session-recorder:8090
    ports:
      - "8010:8010"
    networks:
      - lucid-pi-network
    volumes:
      - session-chunks:/data/chunks
      - chunk-logs:/app/logs
    depends_on:
      lucid-session-recorder:
        condition: service_healthy
      lucid-mongodb:
        condition: service_healthy
      lucid-redis:
        condition: service_healthy
    user: "65532:65532"
    security_opt:
      - no-new-privileges:true
      - seccomp:unconfined
    cap_drop: ["ALL"]
    read_only: true
    tmpfs:
      - /tmp:noexec,nosuid,size=200m
    healthcheck:
      test: ["CMD", "python3", "-c", "import sys; sys.exit(0)"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  session-storage-service:
    image: pickme/lucid-session-storage-service:latest-arm64
    container_name: session-storage-service
    restart: unless-stopped
    env_file:
      - .env.foundation
      - .env.core
      - .env.application
      - .env.secrets
    environment:
      - LUCID_ENV=production
      - LUCID_PLATFORM=arm64
      - PROJECT_ROOT=/mnt/myssd/Lucid/Lucid
      - SESSION_STORAGE_PORT=8082
      - SESSION_STORAGE_HOST=0.0.0.0
      - SESSION_STORAGE_URL=http://session-storage-service:8082
      - MONGODB_URI=mongodb://lucid:${MONGODB_PASSWORD}@lucid-mongodb:27017/lucid?authSource=admin
      - REDIS_URL=redis://:${REDIS_PASSWORD}@lucid-redis:6379/0
      - ELASTICSEARCH_URI=http://lucid-elasticsearch:9200
    ports:
      - "8082:8082"
    networks:
      - lucid-pi-network
    volumes:
      - session-storage-data:/data/sessions
      - session-encrypted-data:/data/encrypted
      - session-storage-logs:/app/logs
    depends_on:
      lucid-mongodb:
        condition: service_healthy
      lucid-redis:
        condition: service_healthy
      lucid-elasticsearch:
        condition: service_healthy
    user: "65532:65532"
    security_opt:
      - no-new-privileges:true
      - seccomp:unconfined
    cap_drop: ["ALL"]
    read_only: true
    tmpfs:
      - /tmp:noexec,nosuid,size=200m
    healthcheck:
      test:
        [
          "CMD",
          "/usr/bin/python3.11",
          "-c",
          "import socket; s = socket.socket(); s.settimeout(2); result = s.connect_ex(('session-storage-service', 8082)); s.close(); exit(0 if result == 0 else 1)",
        ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  session-api:
    image: pickme/lucid-session-api:latest-arm64
    container_name: session-api
    restart: unless-stopped
    env_file:
      - .env.foundation
      - .env.core
      - .env.application
      - .env.secrets
    environment:
      - LUCID_ENV=production
      - LUCID_PLATFORM=arm64
      - PROJECT_ROOT=/mnt/myssd/Lucid/Lucid
      - SESSION_API_PORT=8113
      - SESSION_API_URL=http://session-api:8113
      - MONGODB_URI=mongodb://lucid:${MONGODB_PASSWORD}@lucid-mongodb:27017/lucid?authSource=admin
      - REDIS_URL=redis://:${REDIS_PASSWORD}@lucid-redis:6379/0
      - SESSION_RECORDER_URL=http://session-recorder:8090
      - SESSION_STORAGE_URL=http://session-storage-service:8082
      - API_GATEWAY_URL=http://api-gateway:8080
    ports:
      - "8113:8113"
    networks:
      - lucid-pi-network
      - lucid-gui-network
    volumes:
      - session-api-logs:/app/logs
      - session-readonly-data:/data/sessions:ro
    depends_on:
      session-recorder:
        condition: service_healthy
      session-storage-service:
        condition: service_healthy
      lucid-mongodb:
        condition: service_healthy
      lucid-redis:
        condition: service_healthy
    user: "65532:65532"
    security_opt:
      - no-new-privileges:true
      - seccomp:unconfined
    cap_drop:
      - ALL
    cap_add:
      - NET_BIND_SERVICE
    read_only: true
    tmpfs:
      - /tmp:noexec,nosuid,size=100m
    healthcheck:
      test:
        [
          "CMD",
          "/usr/bin/python3.11",
          "-c",
          "import socket; s = socket.socket(); s.settimeout(2); result = s.connect_ex(('session-api', 8113)); s.close(); exit(0 if result == 0 else 1)",
        ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

networks:
  lucid-pi-network:
    external: true
    name: lucid-pi-network
  lucid-gui-network:
    external: true
    name: lucid-gui-network

volumes:
  session-recordings:
    name: lucid-session-recordings
  session-logs:
    name: lucid-session-logs
  session-chunks:
    name: lucid-session-chunks
  chunk-logs:
    name: lucid-chunk-processor-logs
  session-storage-data:
    name: lucid-session-storage-data
  session-encrypted-data:
    name: lucid-session-encrypted-data
  session-storage-logs:
    name: lucid-session-storage-logs
  session-api-logs:
    name: lucid-session-api-logs
  session-readonly-data:
    name: lucid-session-api-data
