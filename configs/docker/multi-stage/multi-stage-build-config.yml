# Multi-Stage Build Configuration for Lucid Project
# Configuration for building multi-stage images with layer optimization

# Lucid — aligned with infrastructure/containers/**/Dockerfile* (build context: repo root),
# x-files-listing.txt (packaged paths under /app/configs/docker/…),
# infrastructure/containers/host-config.yml (→ /app/service_configs/host-config.yml),
# infrastructure/containers/services/ (→ /app/service_configs/, container-runtime-layout.yml).
# Host data/logs: ${LUCID_REPO_ROOT:-${PROJECT_ROOT:-/mnt/myssd/Lucid/Lucid}}/…  Override on non-Pi hosts.
# Image env files: master-env-config.txt → /app/configs/.env.master ; configs/environment/.env.secrets → /app/configs/.env.secrets (bind-mount or image COPY). Do not list master-env-config.txt in env_file (Compose interpolates ${…} and fails on required placeholders).

services:
  # Multi-stage build orchestrator
  build-orchestrator:
    image: lucid/multi-stage-base:${VERSION:-latest}
    environment:
      - BUILD_PLATFORM=${BUILD_PLATFORM:-linux/amd64,linux/arm64}
      - REGISTRY=${REGISTRY:-ghcr.io}
      - IMAGE_NAME=${IMAGE_NAME:-lucid}
      - VERSION=${VERSION:-latest}
      - PUSH_IMAGES=${PUSH_IMAGES:-false}
      - NO_CACHE=${NO_CACHE:-false}
      - OPTIMIZE_LAYERS=${OPTIMIZE_LAYERS:-true}
      - PARALLEL_BUILDS=${PARALLEL_BUILDS:-4}
    volumes:
      - ${LUCID_REPO_ROOT:-${PROJECT_ROOT:-/mnt/myssd/Lucid/Lucid}}/build-cache:/cache
      - ${LUCID_REPO_ROOT:-${PROJECT_ROOT:-/mnt/myssd/Lucid/Lucid}}/build-logs:/logs
      - ${LUCID_REPO_ROOT:-${PROJECT_ROOT:-/mnt/myssd/Lucid/Lucid}}/layer-analysis:/analysis
      - /var/run/docker.sock:/var/run/docker.sock
    networks:
      - lucid-multi-stage-network
    command: >
      sh -c "
        echo 'Starting multi-stage build orchestrator...' &&
        mkdir -p /cache /logs /analysis &&
        python /app/scripts/build-multi-stage.py --orchestrate
      "

  # Layer analyzer for multi-stage builds
  layer-analyzer:
    image: lucid/multi-stage-builder:${VERSION:-latest}
    environment:
      - ANALYSIS_TARGET=layers
      - OPTIMIZATION_LEVEL=aggressive
      - GENERATE_REPORTS=true
    volumes:
      - ${LUCID_REPO_ROOT:-${PROJECT_ROOT:-/mnt/myssd/Lucid/Lucid}}/layer-reports:/reports
      - /var/run/docker.sock:/var/run/docker.sock
    networks:
      - lucid-multi-stage-network
    command: >
      sh -c "
        echo 'Starting layer analysis...' &&
        mkdir -p /reports &&
        python /app/scripts/analyze-layers.py --multi-stage
      "

  # Build cache optimizer
  cache-optimizer:
    image: lucid/multi-stage-builder:${VERSION:-latest}
    environment:
      - CACHE_OPTIMIZATION=true
      - CACHE_STRATEGY=aggressive
      - CLEANUP_OLD_CACHES=true
    volumes:
      - ${LUCID_REPO_ROOT:-${PROJECT_ROOT:-/mnt/myssd/Lucid/Lucid}}/build-cache:/cache
      - ${LUCID_REPO_ROOT:-${PROJECT_ROOT:-/mnt/myssd/Lucid/Lucid}}/cache-reports:/reports
      - /var/run/docker.sock:/var/run/docker.sock
    networks:
      - lucid-multi-stage-network
    command: >
      sh -c "
        echo 'Starting cache optimization...' &&
        mkdir -p /reports &&
        python /app/scripts/optimize-cache.py --multi-stage
      "

  # Multi-stage build validator
  build-validator:
    image: lucid/multi-stage-base:${VERSION:-latest}
    environment:
      - VALIDATION_TARGET=multi-stage
      - SECURITY_SCAN=true
      - SIZE_ANALYSIS=true
    volumes:
      - ${LUCID_REPO_ROOT:-${PROJECT_ROOT:-/mnt/myssd/Lucid/Lucid}}/validation-reports:/reports
      - /var/run/docker.sock:/var/run/docker.sock
    networks:
      lucid-multi-stage-network
    command: >
      sh -c "
        echo 'Starting build validation...' &&
        mkdir -p /reports &&
        python /app/scripts/validate-build.py --multi-stage
      "

networks:
  lucid-multi-stage-network:  # Currently "build-network"
    driver: bridge
    name: lucid-multi-stage-network
    ipam:
      config:
        - subnet: 172.30.0.0/16
          gateway: 172.30.0.1

volumes:
  build-cache:
    name: lucid-multi-stage-build-cache
  build-logs:
    name: lucid-multi-stage-build-logs
  layer-analysis:
    name: lucid-multi-stage-layer-analysis
  layer-reports:
    name: lucid-multi-stage-layer-reports
  cache-reports:
    name: lucid-multi-stage-cache-reports
  validation-reports:
    name: lucid-multi-stage-validation-reports
