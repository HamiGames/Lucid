    user: "${CONTAINER_USER:-65532}:${CONTAINER_GROUP:-65532}"
    security_opt:
      - no-new-privileges:true
      - seccomp:unconfined
    cap_drop:
      - ALL
    cap_add:
      - NET_BIND_SERVICE
    read_only: true
    tmpfs:
