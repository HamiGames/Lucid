# Lucid — aligned with infrastructure/containers/**/Dockerfile* (build context: repo root),
# x-files-listing.txt (packaged paths under /app/configs/docker/…),
# infrastructure/containers/host-config.yml (→ /app/service_configs/host-config.yml),
# infrastructure/containers/services/ (→ /app/service_configs/, container-runtime-layout.yml).
# Host data/logs: ${LUCID_REPO_ROOT:-${PROJECT_ROOT:-/mnt/myssd/Lucid/Lucid}}/…  Override on non-Pi hosts.
# Image env files: master-env-config.txt → /app/configs/.env.master ; configs/environment/.env.secrets → /app/configs/.env.secrets (bind-mount or image COPY). Do not list master-env-config.txt in env_file (Compose interpolates ${…} and fails on required placeholders).

name: lucid-foundation
services:
  # =============================================================================
  # TOR PROXY - Foundation Network Security Layer
  # Aligned with Dockerfile.tor-proxy structure and tor-health.sh
  # =============================================================================
  tor-proxy:
    image: pickme/lucid-tor-proxy:latest-arm64
    container_name: tor-proxy
    restart: unless-stopped
    env_file:
      - ${LUCID_REPO_ROOT:-${PROJECT_ROOT:-/mnt/myssd/Lucid/Lucid}}/configs/environment/.env.tor-proxy
      - ${LUCID_REPO_ROOT:-${PROJECT_ROOT:-/mnt/myssd/Lucid/Lucid}}/configs/environment/.env.foundation
      - ${LUCID_REPO_ROOT:-${PROJECT_ROOT:-/mnt/myssd/Lucid/Lucid}}/configs/environment/.env.secrets
    networks:
      - lucid-pi-network
    ports:
      - "${TOR_PROXY_SOCKS_PORT:-9050}:${TOR_PROXY_SOCKS_PORT:-9050}"
      - "${TOR_PROXY_CONTROL_PORT:-9051}:${TOR_PROXY_CONTROL_PORT:-9051}"
      - "${TOR_PROXY_HTTP_PORT:-8888}:${TOR_PROXY_HTTP_PORT:-8888}"
    entrypoint: ["/opt/bin/tini", "--"]
    # ✅ UPDATED: Path aligned with Dockerfile.tor-proxy (/opt/lucid/tor/bin/)
    command: ["/run/lucid/tor/bin/entrypoint.sh"]
    volumes:
      # ✅ UPDATED: Changed from /var/lib/tor → /run/lucid/tor (distroless compatible)
      - ${LUCID_REPO_ROOT:-${PROJECT_ROOT:-/mnt/myssd/Lucid/Lucid}}/data/tor:/run/lucid/tor:rw
      - ${LUCID_REPO_ROOT:-${PROJECT_ROOT:-/mnt/myssd/Lucid/Lucid}}/logs/tor:/tmp/lucid/tor:rw
      - ${LUCID_REPO_ROOT:-${PROJECT_ROOT:-/mnt/myssd/Lucid/Lucid}}/02-network-security/tor/scripts:/opt/lucid/tor/bin:ro
      - tor-config:/run/lucid/tor:rw
      - tor-logs:/run/lucid/tor/log:rw
      - tor-state:/run/lucid/tor:rw
    healthcheck:
      # ✅ UPDATED: Uses /opt/lucid/tor/bin/tor-health (aligned with Dockerfile)
      test: ["CMD", "/bin/bash", "/run/lucid/tor/bin/tor-health"]
      interval: 30s
      timeout: 10s
      retries: 10
      start_period: 120s
    labels:
      - "lucid.service=tor-proxy"
      - "lucid.type=distroless"
      - "lucid.platform=arm64"
      - "lucid.cluster=foundation"

  lucid-server-tools:
    image: pickme/lucid-server-tools:latest-arm64
    container_name: lucid-server-tools
    restart: unless-stopped
    env_file:
      - ${LUCID_REPO_ROOT:-${PROJECT_ROOT:-/mnt/myssd/Lucid/Lucid}}/configs/environment/.env.foundation
      - ${LUCID_REPO_ROOT:-${PROJECT_ROOT:-/mnt/myssd/Lucid/Lucid}}/configs/environment/.env.server-tools
      - ${LUCID_REPO_ROOT:-${PROJECT_ROOT:-/mnt/myssd/Lucid/Lucid}}/configs/environment/.env.distroless
      - ${LUCID_REPO_ROOT:-${PROJECT_ROOT:-/mnt/myssd/Lucid/Lucid}}/configs/environment/.env.secrets
    depends_on:
      tor-proxy:
        condition: service_started
      lucid-redis:
        condition: service_healthy
    networks:
      - lucid-pi-network
    volumes:
      # ✅ UPDATED: Path aligned with Dockerfile tunnel-tools structure
      - ${LUCID_REPO_ROOT:-${PROJECT_ROOT:-/mnt/myssd/Lucid/Lucid}}/logs/server-tools:/tmp/lucid/tunnel:rw
    healthcheck:
      # ✅ UPDATED: Uses /opt/bin/python3.11 (aligned with our changes)
      test: ["CMD", "/opt/bin/python3.11", "-c", "import sys; sys.exit(0)"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s
    labels:
      - "lucid.service=server-tools"
      - "lucid.type=distroless"
      - "lucid.platform=arm64"
      - "lucid.cluster=foundation"

  # =============================================================================
  # SERVICE MESH CONTROLLER - Service Communication Layer
  # =============================================================================
  lucid-service-mesh-controller:
    image: pickme/lucid-service-mesh-controller:latest-arm64
    container_name: lucid-service-mesh-controller
    restart: unless-stopped
    env_file:
      - ${LUCID_REPO_ROOT:-${PROJECT_ROOT:-/mnt/myssd/Lucid/Lucid}}/configs/environment/.env.foundation
      - ${LUCID_REPO_ROOT:-${PROJECT_ROOT:-/mnt/myssd/Lucid/Lucid}}/configs/environment/.env.core
      - ${LUCID_REPO_ROOT:-${PROJECT_ROOT:-/mnt/myssd/Lucid/Lucid}}/configs/environment/.env.distroless
      - ${LUCID_REPO_ROOT:-${PROJECT_ROOT:-/mnt/myssd/Lucid/Lucid}}/configs/environment/.env.secrets
    environment:
      # ✅ UPDATED: PYTHONPATH reflects new /app/service-mesh-controller structure
      - PYTHONPATH=/app/service-mesh-controller:/opt/lib/python3.11/site-packages
      - SERVICE_MESH_CONFIG_PATH=/config
    networks:
      - lucid-pi-network
    volumes:
      # ✅ UPDATED: Logs path aligned with structure
      - ${LUCID_REPO_ROOT:-${PROJECT_ROOT:-/mnt/myssd/Lucid/Lucid}}/logs/service-mesh:/tmp/lucid/service-mesh:rw
      - ${LUCID_REPO_ROOT:-${PROJECT_ROOT:-/mnt/myssd/Lucid/Lucid}}/infrastructure/service-mesh/config:/config:ro
    depends_on:
      tor-proxy:
        condition: service_started
    labels:
      - "lucid.service=service-mesh-controller"
      - "lucid.type=distroless"
      - "lucid.platform=arm64"
      - "lucid.cluster=foundation"

  # =============================================================================
  # MONGODB - Data Storage & Document DB
  # =============================================================================
  lucid-mongodb:
    image: pickme/lucid-mongodb:latest-arm64
    container_name: lucid-mongodb
    restart: unless-stopped
    env_file:
      - ${LUCID_REPO_ROOT:-${PROJECT_ROOT:-/mnt/myssd/Lucid/Lucid}}/configs/environment/.env.foundation
      - ${LUCID_REPO_ROOT:-${PROJECT_ROOT:-/mnt/myssd/Lucid/Lucid}}/configs/environment/.env.secrets
      - ${LUCID_REPO_ROOT:-${PROJECT_ROOT:-/mnt/myssd/Lucid/Lucid}}/configs/environment/.env.distroless
    environment:
      - MONGO_INITDB_ROOT_USERNAME=${MONGODB_USERNAME:-lucid}
      - MONGO_INITDB_ROOT_PASSWORD=${MONGODB_PASSWORD:?MONGODB_PASSWORD not set}
      - MONGO_INITDB_DATABASE=${MONGODB_DATABASE:-lucid}
      - MONGODB_PASSWORD=${MONGODB_PASSWORD:?MONGODB_PASSWORD not set}
      - MONGODB_PORT=${MONGODB_PORT:-27017}
    ports:
      - "${MONGODB_PORT}:${MONGODB_PORT}"
    networks:
      - lucid-pi-network
    depends_on:
      tor-proxy:
        condition: service_started
    user: "65532:65532"
    security_opt:
      - no-new-privileges:true
      - seccomp:unconfined
    cap_drop: ["ALL"]
    cap_add: ["NET_BIND_SERVICE"]
    read_only: true
    tmpfs:
      - /tmp:noexec,nosuid,size=200m
    volumes:
      - ${LUCID_REPO_ROOT:-${PROJECT_ROOT:-/mnt/myssd/Lucid/Lucid}}/data/mongodb:/data/db:rw
      - ${LUCID_REPO_ROOT:-${PROJECT_ROOT:-/mnt/myssd/Lucid/Lucid}}/logs/mongodb:/var/log/mongodb:rw
      - mongodb-cache:/var/cache/mongodb
    healthcheck:
      # ✅ UPDATED: Uses /opt/bin/python3.11
      test:
        ["CMD", "/opt/bin/python3.11", "/opt/lucid/mongodb/bin/healthcheck.py"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 120s
    labels:
      - "lucid.service=mongodb"
      - "lucid.type=distroless"
      - "lucid.platform=arm64"
      - "lucid.cluster=foundation"

  # =============================================================================
  # REDIS - In-Memory Data Store & Cache
  # =============================================================================
  lucid-redis:
    image: pickme/lucid-redis:latest-arm64
    container_name: lucid-redis
    restart: unless-stopped
    env_file:
      - ${LUCID_REPO_ROOT:-${PROJECT_ROOT:-/mnt/myssd/Lucid/Lucid}}/configs/environment/.env.foundation
      - ${LUCID_REPO_ROOT:-${PROJECT_ROOT:-/mnt/myssd/Lucid/Lucid}}/configs/environment/.env.secrets
      - ${LUCID_REPO_ROOT:-${PROJECT_ROOT:-/mnt/myssd/Lucid/Lucid}}/configs/environment/.env.distroless
    ports:
      - "${REDIS_PORT}:${REDIS_PORT}"
    networks:
      - lucid-pi-network
    depends_on:
      tor-proxy:
        condition: service_started
    user: "65532:65532"
    security_opt:
      - no-new-privileges:true
      - seccomp:unconfined
    cap_drop: ["ALL"]
    cap_add: ["NET_BIND_SERVICE"]
    read_only: true
    tmpfs:
      - /tmp:noexec,nosuid,size=100m
    volumes:
      - ${LUCID_REPO_ROOT:-${PROJECT_ROOT:-/mnt/myssd/Lucid/Lucid}}/data/redis:/data:rw
      - ${LUCID_REPO_ROOT:-${PROJECT_ROOT:-/mnt/myssd/Lucid/Lucid}}/logs/redis:/var/log/redis:rw
      - redis-cache:/var/cache/redis
    environment:
      - REDIS_PASSWORD=${REDIS_PASSWORD:?REDIS_PASSWORD not set}
      - REDIS_HOST=${REDIS_HOST:-lucid-redis}
      - REDIS_PORT=${REDIS_PORT:-6379}
      - REDIS_MAX_MEMORY=${REDIS_MAX_MEMORY:-512mb}
      - REDIS_MAX_MEMORY_POLICY=${REDIS_MAX_MEMORY_POLICY:-allkeys-lru}
    labels:
      - "lucid.service=redis"
      - "lucid.type=distroless"
      - "lucid.platform=arm64"
      - "lucid.cluster=foundation"

  # =============================================================================
  # ELASTICSEARCH - Search & Analytics Engine
  # =============================================================================
  lucid-elasticsearch:
    image: pickme/lucid-elasticsearch:latest-arm64
    container_name: lucid-elasticsearch
    restart: unless-stopped
    env_file:
      - ${LUCID_REPO_ROOT:-${PROJECT_ROOT:-/mnt/myssd/Lucid/Lucid}}/configs/environment/.env.foundation
      - ${LUCID_REPO_ROOT:-${PROJECT_ROOT:-/mnt/myssd/Lucid/Lucid}}/configs/environment/.env.secrets
      - ${LUCID_REPO_ROOT:-${PROJECT_ROOT:-/mnt/myssd/Lucid/Lucid}}/configs/environment/.env.distroless
    ports:
      - "${ELASTICSEARCH_HTTP_PORT:-9200}:${ELASTICSEARCH_HTTP_PORT:-9200}"
      - "${ELASTICSEARCH_TRANSPORT_PORT:-9300}:${ELASTICSEARCH_TRANSPORT_PORT:-9300}"
    environment:
      - "discovery.type=single-node"
      - "xpack.security.enabled=false"
    networks:
      - lucid-pi-network
    depends_on:
      tor-proxy:
        condition: service_started
    user: "65532:65532"
    security_opt:
      - no-new-privileges:true
      - seccomp:unconfined
    cap_drop: ["ALL"]
    cap_add: ["NET_BIND_SERVICE"]
    read_only: true
    tmpfs:
      - /tmp:size=200m
    volumes:
      - ${LUCID_REPO_ROOT:-${PROJECT_ROOT:-/mnt/myssd/Lucid/Lucid}}/data/elasticsearch:/usr/share/elasticsearch/data:rw
      - ${LUCID_REPO_ROOT:-${PROJECT_ROOT:-/mnt/myssd/Lucid/Lucid}}/logs/elasticsearch:/usr/share/elasticsearch/logs:rw
      - elasticsearch-cache:/tmp/elasticsearch
    healthcheck:
      test:
        ["CMD", "/opt/bin/curl", "-f", "http://localhost:9200/_cluster/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 120s
    labels:
      - "lucid.service=elasticsearch"
      - "lucid.type=distroless"
      - "lucid.platform=arm64"
      - "lucid.cluster=foundation"

  # =============================================================================
  # AUTH SERVICE - Authentication & Authorization Layer
  # =============================================================================
  lucid-auth-service:
    image: pickme/lucid-auth-service:latest-arm64
    container_name: lucid-auth-service
    restart: unless-stopped
    env_file:
      - ${LUCID_REPO_ROOT:-${PROJECT_ROOT:-/mnt/myssd/Lucid/Lucid}}/configs/environment/.env.foundation
      - ${LUCID_REPO_ROOT:-${PROJECT_ROOT:-/mnt/myssd/Lucid/Lucid}}/configs/environment/.env.tor-proxy
      - ${LUCID_REPO_ROOT:-${PROJECT_ROOT:-/mnt/myssd/Lucid/Lucid}}/configs/environment/.env.authentication
      - ${LUCID_REPO_ROOT:-${PROJECT_ROOT:-/mnt/myssd/Lucid/Lucid}}/configs/environment/.env.secrets
      - ${LUCID_REPO_ROOT:-${PROJECT_ROOT:-/mnt/myssd/Lucid/Lucid}}/configs/environment/.env.distroless
    networks:
      - lucid-pi-network
    ports:
      - "${AUTH_SERVICE_PORT:-8089}:${AUTH_SERVICE_PORT:-8089}"
    depends_on:
      tor-proxy:
        condition: service_healthy
      lucid-mongodb:
        condition: service_healthy
      lucid-redis:
        condition: service_healthy
    environment:
      # ✅ UPDATED: PYTHONPATH reflects /app/auth structure
      - PYTHONPATH=/app/auth:/opt/lib/python3.11/site-packages
      # MongoDB Configuration
      - MONGODB_URI=mongodb://lucid:${MONGODB_PASSWORD:?MONGODB_PASSWORD not set}@lucid-mongodb:27017/lucid_auth?authSource=admin
      - MONGODB_DATABASE=lucid_auth
      # JWT Configuration
      - JWT_SECRET_KEY=${JWT_SECRET_KEY:-}
      - JWT_ALGORITHM=HS256
      # Redis Configuration
      - REDIS_URI=redis://:${REDIS_PASSWORD:?REDIS_PASSWORD not set}@lucid-redis:6379/1
      # API Gateway Integration
      - API_GATEWAY_URL=${API_GATEWAY_URL:?API_GATEWAY_URL not set}
      - TOR_PROXY_HOST=${TOR_PROXY_HOST:-tor-proxy}
      - TOR_PROXY_SOCKS_PORT=${TOR_PROXY_SOCKS_PORT:-9050}
      - TOR_PROXY_CONTROL_PORT=${TOR_PROXY_CONTROL_PORT:-9051}
      - TOR_PROXY_HTTP_PORT=${TOR_PROXY_HTTP_PORT:-8888}
      - SOCKS5_PROXY=socks5://${TOR_PROXY_HOST:-tor-proxy}:${TOR_PROXY_SOCKS_PORT:-9050}
      - HTTP_PROXY=http://${TOR_PROXY_HOST:-tor-proxy}:${TOR_PROXY_HTTP_PORT:-8888}
      - HTTPS_PROXY=http://${TOR_PROXY_HOST:-tor-proxy}:${TOR_PROXY_HTTP_PORT:-8888}
      - NO_PROXY=lucid-mongodb,lucid-redis,lucid-auth-service,lucid-api-gateway
    user: "65532:65532"
    security_opt:
      - no-new-privileges:true
      - seccomp:unconfined
    cap_drop: ["ALL"]
    cap_add: ["NET_BIND_SERVICE"]
    read_only: true
    tmpfs:
      - /tmp:noexec,nosuid,size=100m
    volumes:
      # ✅ UPDATED: Logs path aligned
      - ${LUCID_REPO_ROOT:-${PROJECT_ROOT:-/mnt/myssd/Lucid/Lucid}}/logs/auth:/tmp/lucid/auth:rw
      - auth-cache:/tmp/auth
    healthcheck:
      # ✅ UPDATED: Uses /opt/bin/python3.11
      test:
        [
          "CMD",
          "/opt/bin/python3.11",
          "-c",
          "import os, urllib.request, sys; port=os.getenv('AUTH_SERVICE_PORT','8089'); resp=urllib.request.urlopen(f'http://localhost:{port}/health', timeout=5); sys.exit(0 if resp.getcode()==200 else 1)",
        ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    labels:
      - "lucid.service=auth-service"
      - "lucid.type=distroless"
      - "lucid.platform=arm64"
      - "lucid.cluster=foundation"

# =============================================================================
# VOLUMES - Shared Storage & Caching
# =============================================================================
volumes:
  # Caching layers (temporary, can be recreated)
  mongodb-cache:
    driver: local
    name: lucid-mongodb-cache
  redis-cache:
    driver: local
    name: lucid-redis-cache
  elasticsearch-cache:
    driver: local
    name: lucid-elasticsearch-cache
  auth-cache:
    driver: local
    name: lucid-auth-cache

  # Configuration (persistent)
  tor-config:
    name: lucid-tor-config

  # ✅ UPDATED: Tor state consolidated (single source of truth)
  tor-state:
    name: lucid-tor-state

# =============================================================================
# NETWORKS - Service Communication
# =============================================================================
networks:
  lucid-pi-network:
    external: true
    name: lucid-pi-network
# =============================================================================
# NOTES - Architecture Documentation
# =============================================================================
#
# CHANGES MADE FROM ORIGINAL:
#
# 1. REMOVED UNUSED BASE CONTAINERS:
#    - lucid-base (removed - not used correctly)
#    - lucid-base-python (removed - services use multi-stage builds instead)
#    - lucid-base-java (removed - services use multi-stage builds instead)
#
# 2. UPDATED PATHS FOR DISTROLESS COMPATIBILITY:
#    - tor: /var/lib/tor → /run/lucid/tor
#    - tor logs: /var/log/tor → /tmp/lucid/tor
#    - All healthchecks: /usr/bin/python3 → /opt/bin/python3.11
#    - All entrypoints: /usr/local/bin → /opt/lucid/*/bin
#
# 3. CONSOLIDATED ONION STATE:
#    - Changed: onion-state:/run/lucid/onion
#    - To: tor-state:/run/lucid/tor (single source of truth)
#    - Aligns with tor-health.sh and tor-show-onion.sh updates
#
# 4. PYTHONPATH UPDATES:
#    - All services now use /opt/lib/python3.11/site-packages
#    - Service-specific: /app/{service}
#
# WHY MULTI-STAGE BUILDS INSTEAD OF BASE CONTAINERS?
#
# ❌ Old Pattern (Base Container):
#    1. lucid-base-python container runs
#    2. Other containers somehow access Python from it
#    3. No clear dependency, runtime overhead
#    4. Breaks in Kubernetes/swarm (no inter-container filesystem access)
#
# ✅ New Pattern (Multi-Stage Build):
#    1. Dockerfile.service: FROM python:3.11-slim AS builder
#    2. Dockerfile.service: Copy Python from builder to runtime
#    3. Image is self-contained, no external dependencies
#    4. Works everywhere (Docker, Kubernetes, Podman, etc.)
#    5. This is what your GUI services are already doing!
#
# MIGRATION PATH:
#
# 1. Remove lucid-base*, lucid-server-tools from docker-compose (use updated volumes)
# 2. Update all Dockerfile*: Ensure /opt/bin, /opt/lib paths (already done for tunnel-tools)
# 3. Rebuild images: docker-compose build --no-cache
# 4. Update remaining docker-compose files: _application.yml, _core.yml, _support.yml, _gui-integration.yml
# 5. Start foundation: docker-compose -f docker-compose.foundation.yml up
#
