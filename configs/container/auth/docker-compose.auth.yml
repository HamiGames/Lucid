# LUCID AUTH - Distroless Deployment
# Path: infrastructure/containers/auth/docker-compose.auth.yml
#
# connects auth service to all other services via api-gateway, session-api, and node-system-gateway
# external access points = auth-service
# not directly connected to blockchain-network
# recieves requests from api-gateway, admin-system-gateway, session-api, node-system-gateway, and api-gateway
# sends requests to api-gateway, admin-system-gateway, session-api, node-system-gateway, and api-gateway
# sends requests to auth-service via api-gateway, session-api, and node-system-gateway
# sends requests to service-mesh-controller via pi-network
# sends requests to database-system via database-system-gateway
# sends requests to payment-systems via payment-systems-gateway
# sends requests to tron-client via tron-isolated
# sends requests to tron-wallet-manager via tron-isolated
# sends requests to tron-data-chain via tron-isolated
#
# From repository root (Lucid):
#   docker compose -f infrastructure/containers/auth/docker-compose.auth.yml up -d
#
# Prerequisites:
#   - docker network lucid-pi-network (see infrastructure/containers/network/network.txt)
#   - Repo root master-env-config.txt → /app/configs/.env.master (env_file + bind on lucid-auth-service)
#   - configs/environment/.env.secrets → /app/configs/.env.secrets

name: lucid-auth

x-lucid-build-args: &lucid-build-args
  BUILD_DATE: ${BUILD_DATE:-}
  VCS_REF: ${VCS_REF:-}
  VERSION: ${VERSION:-1.0.0}
  TARGETPLATFORM: ${TARGETPLATFORM:-linux/arm64}
  BUILDPLATFORM: ${BUILDPLATFORM:-linux/amd64}
  PYTHON_VERSION: ${PYTHON_VERSION:-3.11}

x-repo-context: &repo-context
  context: ../../../

x-env-auth: &env-auth
  - ../../../master-env-config.txt
  - ../../../configs/environment/.env.secrets

services:
  lucid-mongodb:
    image: ${LUCID_MONGODB_IMAGE:-pickme/lucid-mongodb:latest-arm64}
    container_name: lucid-mongodb
    platform: ${DOCKER_DEFAULT_PLATFORM:-linux/arm64}
    build:
      <<: *repo-context
      dockerfile: infrastructure/containers/database/Dockerfile.mongodb
      args:
        <<: *lucid-build-args
        DEBIAN_MULTIARCH: ${DEBIAN_MULTIARCH:-aarch64-linux-gnu}
    restart: unless-stopped
    networks:
      - lucid-pi-network
    ports:
      - "${LUCID_MONGODB_PUBLISH_PORT:-27017}:27017"
    volumes:
      - lucid_auth_mongodb_data:/data/db:rw
    environment:
      - MONGO_INITDB_ROOT_USERNAME=${MONGO_INITDB_ROOT_USERNAME:-lucid}
      - MONGO_INITDB_ROOT_PASSWORD=${MONGO_INITDB_ROOT_PASSWORD:?set MONGO_INITDB_ROOT_PASSWORD}
    user: "65532:65532"
    healthcheck:
      test: ["CMD", "/usr/bin/python3.11", "/app/usr/local/bin/healthcheck.py"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 90s

  lucid-redis:
    image: ${LUCID_REDIS_IMAGE:-redis:7-alpine}
    container_name: lucid-redis
    restart: unless-stopped
    networks:
      - lucid-pi-network
    ports:
      - "${LUCID_REDIS_PUBLISH_PORT:-6379}:6379"
    command: ["redis-server", "--appendonly", "yes"]
    volumes:
      - lucid_auth_redis_data:/data:rw
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  lucid-auth-service:
    image: ${LUCID_AUTH_SERVICE_IMAGE:-pickme/lucid-auth-service:latest-arm64}
    container_name: lucid-auth-service
    hostname: lucid-auth-service
    platform: ${DOCKER_DEFAULT_PLATFORM:-linux/arm64}
    build:
      <<: *repo-context
      dockerfile: infrastructure/containers/auth/Dockerfile.auth-service
      args:
        <<: *lucid-build-args
    restart: unless-stopped
    networks:
      - lucid-pi-network
    ports:
      - "${LUCID_AUTH_PUBLISH_PORT:-8089}:8089"
    env_file: *env-auth
    environment:
      - LUCID_ENV=${LUCID_ENV:-production}
      - AUTH_SERVICE_HOST=lucid-auth-service
      - AUTH_SERVICE_PORT=8089
      - AUTH_SERVICE_URL=http://lucid-auth-service:8089
      - MONGODB_URL=${MONGODB_URL:-mongodb://lucid:${MONGO_INITDB_ROOT_PASSWORD}@lucid-mongodb:27017/lucid?authSource=admin}
      - REDIS_URL=${REDIS_URL:-redis://lucid-redis:6379/0}
      - API_GATEWAY_URL=${API_GATEWAY_URL:-http://api-gateway:8080}
    user: "65532:65532"
    read_only: true
    tmpfs:
      - /tmp:noexec,nosuid,size=200m
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    cap_add:
      - NET_BIND_SERVICE
    volumes:
      - ../../../master-env-config.txt:/app/configs/.env.master:ro
      - ../../../configs/environment/.env.secrets:/app/configs/.env.secrets:ro
      - lucid_auth_logs:/app/logs:rw
    depends_on:
      lucid-mongodb:
        condition: service_healthy
      lucid-redis:
        condition: service_healthy
    healthcheck:
      test:
        [
          "CMD",
          "/app/usr/bin/python3.11",
          "-c",
          "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8089/health', timeout=2); exit(0)",
        ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
    labels:
      - "com.lucid.phase=foundation"
      - "com.lucid.service=lucid-auth-service"
      - "com.lucid.cluster=09-authentication"

networks:
  lucid-pi-network:
    name: lucid-pi-network
    external: true

volumes:
  lucid_auth_mongodb_data:
    name: lucid-auth-mongodb-data
  lucid_auth_redis_data:
    name: lucid-auth-redis-data
  lucid_auth_logs:
    name: lucid-auth-logs
