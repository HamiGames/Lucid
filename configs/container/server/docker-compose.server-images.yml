# Lucid server-tier images: API Gateway, Server Core, Server Operations
# Build context is the repository root (requires COPY RDP/, 03_api_gateway/, etc.)
#
# Build (from anywhere):
#   docker compose -f infrastructure/containers/server/docker-compose.server-images.yml build
#
# Run (Pi / dev — set MONGODB_URL, REDIS_URL for server-operations):
#   docker compose -f infrastructure/containers/server/docker-compose.server-images.yml up -d
#
# Optional: extend this file or export env from:
#   configs/environment/.env.foundation, .env.core, .env.support, .env.secrets
#
# Dockerfiles:
#   • 03_api_gateway/Dockerfile
#   • infrastructure/containers/server/Dockerfile
#   • infrastructure/containers/server/Dockerfile.server-manager


x-lucid-build-args: &lucid-build-args
  BUILD_DATE: ${BUILD_DATE:-}
  VCS_REF: ${VCS_REF:-}
  VERSION: ${VERSION:-1.0.0}
  TARGETPLATFORM: ${TARGETPLATFORM:-linux/arm64}
  BUILDPLATFORM: ${BUILDPLATFORM:-linux/amd64}
  PYTHON_VERSION: ${PYTHON_VERSION:-3.11}

x-lucid-env-files: &lucid-env-files
  - ../../../master-env-config.txt
  - ../../../configs/environment/.env.secrets

services:
  # ---------------------------------------------------------------------------
  # pickme/lucid-api-gateway — 03_api_gateway/Dockerfile
  # uvicorn binds --host api-gateway (container hostname must match)
  # ---------------------------------------------------------------------------
  lucid-api-gateway:
    image: ${LUCID_API_GATEWAY_IMAGE:-pickme/lucid-api-gateway:latest-arm64}
    container_name: lucid-api-gateway
    hostname: api-gateway
    platform: ${DOCKER_DEFAULT_PLATFORM:-linux/arm64}
    build:
      context: ../../..
      dockerfile: 03_api_gateway/Dockerfile
      args:
        <<: *lucid-build-args
    restart: unless-stopped
    env_file: *lucid-env-files
    ports:
      - "${API_GATEWAY_PUBLISH_PORT:-8080}:8080"
    environment:
      - LUCID_ENV=${LUCID_ENV:-production}
      - LUCID_PLATFORM=${LUCID_PLATFORM:-arm64}
      - API_GATEWAY_PORT=8080
      - API_GATEWAY_HOST=api-gateway
    networks:
      - lucid-server-tier
    security_opt:
      - no-new-privileges:true
    read_only: true
    tmpfs:
      - /tmp:noexec,nosuid,size=128m
    healthcheck:
      test:
        [
          "CMD",
          "/app/usr/bin/python3.11",
          "-c",
          "import socket; s=socket.socket(); s.settimeout(2); r=s.connect_ex(('api-gateway', 8080)); s.close(); exit(0 if r==0 else 1)",
        ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
    labels:
      - lucid.service=api-gateway
      - lucid.type=distroless
      - lucid.cluster=core

  # ---------------------------------------------------------------------------
  # pickme/lucid-server-core — infrastructure/containers/server/Dockerfile
  # Shared server foundation (server.xrdp_integration FastAPI on 8088)
  # ---------------------------------------------------------------------------
  lucid-server-core:
    image: ${LUCID_SERVER_CORE_IMAGE:-pickme/lucid-server-core:latest-arm64}
    container_name: lucid-server-core
    hostname: lucid-server-core
    platform: ${DOCKER_DEFAULT_PLATFORM:-linux/arm64}
    build:
      context: ../../..
      dockerfile: infrastructure/containers/server/Dockerfile
      args:
        <<: *lucid-build-args
    restart: unless-stopped
    env_file: *lucid-env-files
    ports:
      - "${LUCID_SERVER_CORE_PUBLISH_PORT:-8088}:8088"
    environment:
      - LUCID_ENV=${LUCID_ENV:-production}
      - LUCID_PLATFORM=${LUCID_PLATFORM:-arm64}
      - LUCID_SERVER_CORE_PORT=8088
      - LUCID_SERVER_CORE_DNS=lucid-server-core
    networks:
      - lucid-server-tier
    security_opt:
      - no-new-privileges:true
    read_only: true
    tmpfs:
      - /tmp:noexec,nosuid,size=128m
    healthcheck:
      test:
        [
          "CMD",
          "/app/usr/bin/python3.11",
          "-c",
          "import os,urllib.request,sys; p=os.environ.get('LUCID_SERVER_CORE_PORT','8088'); urllib.request.urlopen('http://127.0.0.1:'+str(p)+'/health', timeout=10).read(); sys.exit(0)",
        ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    labels:
      - lucid.service=lucid-server-core
      - lucid.type=distroless
      - lucid.cluster=core

  # ---------------------------------------------------------------------------
  # pickme/lucid-server-operations — Dockerfile.server-manager
  # Orchestrator (server_manager/entrypoint.py), port 8081
  # ---------------------------------------------------------------------------
  lucid-server-operations:
    image: ${LUCID_SERVER_OPERATIONS_IMAGE:-pickme/lucid-server-operations:latest-arm64}
    container_name: lucid-server-operations
    hostname: lucid-server-operations
    platform: ${DOCKER_DEFAULT_PLATFORM:-linux/arm64}
    build:
      context: ../../..
      dockerfile: infrastructure/containers/server/Dockerfile.server-manager
      args:
        <<: *lucid-build-args
    restart: unless-stopped
    env_file: *lucid-env-files
    ports:
      - "${LUCID_SERVER_OPERATIONS_PUBLISH_PORT:-8081}:8081"
    environment:
      - LUCID_ENV=${LUCID_ENV:-production}
      - LUCID_PLATFORM=${LUCID_PLATFORM:-arm64}
      - PROJECT_ROOT=${PROJECT_ROOT:-/mnt/myssd/Lucid/Lucid}
      - LUCID_SERVER_OPERATIONS_PORT=8081
      - RDP_SERVER_MANAGER_PORT=${RDP_SERVER_MANAGER_PORT:-8081}
      - RDP_SERVER_MANAGER_HOST=lucid-server-operations
      - RDP_SERVER_MANAGER_URL=http://lucid-server-operations:${RDP_SERVER_MANAGER_PORT:-8081}
      - LUCID_SERVER_CORE_URL=http://lucid-server-core:8088
      - API_GATEWAY_URL=${API_GATEWAY_URL:-http://api-gateway:8080}
      - MONGODB_URL=${MONGODB_URL:-}
      - REDIS_URL=${REDIS_URL:-}
      - AUTH_SERVICE_URL=${AUTH_SERVICE_URL:-http://lucid-auth-service:8089}
      - PORT_RANGE_START=${PORT_RANGE_START:-13389}
      - PORT_RANGE_END=${PORT_RANGE_END:-14389}
      - MAX_CONCURRENT_SERVERS=${MAX_CONCURRENT_SERVERS:-50}
    volumes:
      - lucid_server_operations_data:/app/data:rw
      - lucid_server_operations_logs:/app/logs:rw
      - lucid_server_operations_cache:/tmp/server-operations:rw
    networks:
      - lucid-server-tier
    user: "65532:65532"
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    cap_add:
      - NET_BIND_SERVICE
    read_only: true
    tmpfs:
      - /tmp:noexec,nosuid,size=128m
    depends_on:
      - lucid-server-core
    healthcheck:
      test:
        [
          "CMD",
          "/usr/bin/python3.11",
          "-c",
          "import os,urllib.request,sys; p=os.getenv('LUCID_SERVER_OPERATIONS_PORT') or os.getenv('RDP_SERVER_MANAGER_PORT','8081'); urllib.request.urlopen('http://127.0.0.1:'+str(p)+'/health', timeout=10).read(); sys.exit(0)",
        ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    labels:
      - lucid.service=server-operations
      - lucid.type=distroless
      - lucid.cluster=core

networks:
  lucid-server-tier:
    name: lucid-server-tier
    driver: bridge

volumes:
  lucid_server_operations_data:
    name: lucid-server-operations-data
  lucid_server_operations_logs:
    name: lucid-server-operations-logs
  lucid_server_operations_cache:
    name: lucid-server-operations-cache
