# LUCID ADMIN - Distroless Deployment
# Path: infrastructure/containers/admin/docker-compose.admin.yml
#
# connects all of admin services to each other via api-gateway, session-api, and node-system-gateway
# external access points = admin-interface, gui-admin, electron-admin-gui
# not directly connected to blockchain-network
# recieves requests from api-gateway, admin-system-gateway, session-api, node-system-gateway, and api-gateway
# sends requests to api-gateway, admin-system-gateway, session-api, node-system-gateway, and api-gateway
# sends requests to admin-interface via admin-system-gateway
# sends requests to gui-admin via admin-system-gateway
# sends requests to electron-admin-gui via admin-system-gateway
# sends requests to service-mesh-controller via pi-network
# sends requests to database-system via database-system-gateway
# sends requests to payment-systems via payment-systems-gateway
# sends requests to tron-wallet-manager via tron-isolated
# sends requests to tron-client via tron-isolated
# full control over all services in the admin plane
#
# From repository root (Lucid):
#   docker compose -f infrastructure/containers/admin/docker-compose.admin.yml up -d
#
# Prerequisites:
#   - docker network lucid-pi-network (see infrastructure/containers/network/network.txt)
#   - configs/environment under ../../../configs/environment/ (paths relative to this file)

name: lucid-admin-plane

x-lucid-build-args: &lucid-build-args
  BUILD_DATE: ${BUILD_DATE:-}
  VCS_REF: ${VCS_REF:-}
  VERSION: ${VERSION:-1.0.0}
  TARGETPLATFORM: ${TARGETPLATFORM:-linux/arm64}
  BUILDPLATFORM: ${BUILDPLATFORM:-linux/amd64}
  PYTHON_VERSION: ${PYTHON_VERSION:-3.11}

x-repo-context: &repo-context
  context: ../../../

x-env-admin: &env-admin
  - ../../../master-env-config.txt
  - ../../../configs/environment/.env.secrets

services:
  admin-params-registry:
    image: ${LUCID_PARAMS_REGISTRY_IMAGE:-pickme/lucid-params-registry:latest-arm64}
    container_name: admin-params-registry
    hostname: admin-params-registry
    platform: ${DOCKER_DEFAULT_PLATFORM:-linux/arm64}
    build:
      <<: *repo-context
      dockerfile: infrastructure/containers/admin/Dockerfile.params-registry
      args:
        <<: *lucid-build-args
    restart: unless-stopped
    env_file:
      - ../../../master-env-config.txt
      - ../../../configs/environment/.env.secrets
    networks:
      - lucid-pi-network
      - lucid-admin-net
    ports:
      - "${ADMIN_PARAMS_REGISTRY_PUBLISH_PORT:-8050}:8050"
    user: "65532:65532"
    security_opt:
      - no-new-privileges:true
    read_only: true
    tmpfs:
      - /tmp:rw,noexec,nosuid,size=64m

  admin-key-rotation:
    image: ${LUCID_KEY_ROTATION_IMAGE:-pickme/lucid-key-rotation:latest-arm64}
    container_name: admin-key-rotation
    hostname: admin-key-rotation
    platform: ${DOCKER_DEFAULT_PLATFORM:-linux/arm64}
    build:
      <<: *repo-context
      dockerfile: infrastructure/containers/admin/Dockerfile.key-rotation
      args:
        <<: *lucid-build-args
    restart: unless-stopped
    env_file: *env-admin
    networks:
      - lucid-pi-network
      - lucid-admin-net
    ports:
      - "${ADMIN_KEY_ROTATION_PUBLISH_PORT:-8060}:8060"
    user: "65532:65532"
    security_opt:
      - no-new-privileges:true
    read_only: true
    tmpfs:
      - /tmp:rw,noexec,nosuid,size=64m

  admin-governance-client:
    image: ${LUCID_GOVERNANCE_CLIENT_IMAGE:-pickme/lucid-governance-client:latest-arm64}
    container_name: admin-governance-client
    hostname: admin-governance-client
    platform: ${DOCKER_DEFAULT_PLATFORM:-linux/arm64}
    build:
      <<: *repo-context
      dockerfile: infrastructure/containers/admin/Dockerfile.gov-client
      args:
        <<: *lucid-build-args
    restart: unless-stopped
    env_file:
      - ../../../master-env-config.txt
      - ../../../configs/environment/.env.secrets
    networks:
      - lucid-pi-network
      - lucid-admin-net
    ports:
      - "${ADMIN_GOVERNANCE_CLIENT_PUBLISH_PORT:-8070}:8070"

  admin-ui-backend:
    image: ${LUCID_ADMIN_UI_BACKEND_IMAGE:-pickme/lucid-admin-ui-backend:latest-arm64}
    container_name: admin-ui-backend
    hostname: admin-ui-backend
    platform: ${DOCKER_DEFAULT_PLATFORM:-linux/arm64}
    build:
      <<: *repo-context
      dockerfile: infrastructure/containers/admin/Dockerfile.admin-ui-backend
      args:
        <<: *lucid-build-args
    restart: unless-stopped
    env_file:
      - ../../../master-env-config.txt
      - ../../../configs/environment/.env.secrets
    networks:
      - lucid-pi-network
      - lucid-admin-net
    ports:
      - "${ADMIN_UI_BACKEND_PUBLISH_PORT:-8120}:8120"
    environment:
      - ADMIN_INTERFACE_PORT=8120
      - ADMIN_INTERFACE_HOST=0.0.0.0
      - API_GATEWAY_URL=${API_GATEWAY_URL:-http://api-gateway:8080}
      - AUTH_SERVICE_URL=${AUTH_SERVICE_URL:-http://lucid-auth-service:8089}
    user: "65532:65532"
    security_opt:
      - no-new-privileges:true
    read_only: true
    tmpfs:
      - /tmp:rw,noexec,nosuid,size=128m

  admin-overlord:
    image: ${LUCID_ADMIN_OVERLORD_IMAGE:-pickme/lucid-admin-overlord:latest-arm64}
    container_name: admin-overlord
    hostname: admin-overlord
    platform: ${DOCKER_DEFAULT_PLATFORM:-linux/arm64}
    build:
      <<: *repo-context
      dockerfile: infrastructure/containers/admin/dockerfile.admin-overlord
      args:
        <<: *lucid-build-args
    restart: unless-stopped
    networks:
      - lucid-pi-network
      - lucid-admin-net
    ports:
      - "${ADMIN_OVERLORD_PUBLISH_PORT:-8140}:8140"
    environment:
      - OVERLORD_DOMAIN=admin
      - OVERLORD_HOST=0.0.0.0
      - OVERLORD_PORT=8140
      - OVERLORD_CONFIG_ROOT=/app/configs/environment
      - OVERLORD_BUNDLE_ROOT=/app/over_lord
      - OVERLORD_TRIGGERS_PATH=/app/over_lord/triggers.yaml
    user: "65532:65532"
    security_opt:
      - no-new-privileges:true
    read_only: true
    tmpfs:
      - /tmp:rw,noexec,nosuid,size=64m

  admin-system-gateway:
    image: ${LUCID_ADMIN_SYSTEM_GATEWAY_IMAGE:-pickme/lucid-admin-system-gateway:latest-arm64}
    container_name: admin-system-gateway
    hostname: admin-system-gateway
    platform: ${DOCKER_DEFAULT_PLATFORM:-linux/arm64}
    build:
      <<: *repo-context
      dockerfile: infrastructure/containers/admin/Dockerfile.admin-system-gateway
      args:
        <<: *lucid-build-args
    restart: unless-stopped
    env_file:
      - ../../../master-env-config.txt
      - ../../../configs/environment/.env.secrets
    networks:
      - lucid-pi-network
      - lucid-admin-net
    ports:
      - "${ADMIN_GATEWAY_HEALTH_PUBLISH_PORT:-8155}:8155"
      - "${ADMIN_GATEWAY_PORTAL_API_PUBLISH_PORT:-28080}:28080"
      - "${ADMIN_GATEWAY_PORTAL_ADMIN_UI_PUBLISH_PORT:-28120}:28120"
      - "${ADMIN_GATEWAY_PORTAL_PARAMS_PUBLISH_PORT:-28050}:28050"
      - "${ADMIN_GATEWAY_PORTAL_TUNNEL_PUBLISH_PORT:-27000}:27000"
    volumes:
      - ./config/openssl-api.yml:/app/node/config/openssl-api.yml:ro
      - ./config/admin-system-gateway.connections.json:/app/node/config/connections.json:ro
    depends_on:
      admin-params-registry:
        condition: service_started
      admin-ui-backend:
        condition: service_started
    user: "65532:65532"
    security_opt:
      - no-new-privileges:true
    read_only: true
    tmpfs:
      - /tmp:noexec,nosuid,size=128m
    cap_drop:
      - ALL
    cap_add:
      - NET_BIND_SERVICE
    labels:
      - "com.lucid.service=admin-system-gateway"
      - "com.lucid.plane=admin"

networks:
  lucid-pi-network:
    name: lucid-pi-network
    external: true
  lucid-admin-net:
    name: lucid-admin-net
    driver: bridge
    attachable: true
    ipam:
      config:
        - subnet: 172.28.0.0/16
          gateway: 172.28.0.1
