# gui/config/gui-endpoints.yml
#
# Host registry: infrastructure/containers/host-config.yml
# http_path_template: http://${service_name}:${port}/app

version: "1.0"

meta:
  host_config_path: infrastructure/containers/host-config.yml
  host_config_container_path: /app/configs/host-config.yml
  services_config_root: /app/configs/services
  http_path_template: http://${service_name}:${port}/app
  description: >
    GUI-facing HTTP bases. base_url ends with /app; health_path is relative to base_url.

api_gateway:
  host_registry_key: main_lucid_gateway
  service_name: api-gateway
  port: 8080
  host_ip: 172.20.10.1
  base_url: http://api-gateway:8080/app
  health_path: /health
  bundle_relative: api-gateway.yml

