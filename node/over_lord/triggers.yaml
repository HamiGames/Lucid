# =============================================================================
# Node overlord — YAML trigger definitions
# Path: node/over_lord/triggers.yaml
#
# Invoked via HTTP (see node-overlord API) or optional startup list below.
# Step types:
#   copy_file     — copy a file from /app/over_lord (src) to configs/environment (dest)
#   yaml_to_dotenv — map YAML paths to KEY=value lines in an outfile under configs/environment
# =============================================================================
version: 1

# Optional: triggers to run when the API process starts (best-effort if volume is writable)
startup:
  run_triggers: []

triggers:
  - id: publish-yaml-bundle
    description: Snapshot overlord YAML/compose into configs/environment/snapshots for operators
    steps:
      - type: copy_file
        src: config.yaml
        dest: snapshots/node-overlord-config.yaml
      - type: copy_file
        src: node-management-config.yaml
        dest: snapshots/node-management-config.yaml
      - type: copy_file
        src: openapi.yaml
        dest: snapshots/node-management-openapi.yaml
      - type: copy_file
        src: docker-compose.yml
        dest: snapshots/node-docker-compose.yml
      - type: copy_file
        src: triggers.yaml
        dest: snapshots/triggers.yaml
      - type: copy_file
        src: env.node-management.template
        dest: snapshots/env.node-management.template

  - id: render-env-from-node-management-yaml
    description: Emit dotenv fragment from node-management-config.yaml global.* (merge on host with secrets)
    steps:
      - type: yaml_to_dotenv
        yaml_file: node-management-config.yaml
        outfile: .env.node-management.from-yaml
        header: |
          # Generated by node-overlord trigger render-env-from-node-management-yaml
          # Merge with configs/environment/.env.node-management and .env.secrets on the host
        mappings:
          - yaml: global.port
            env: NODE_MANAGEMENT_PORT
          - yaml: global.staging_port
            env: NODE_MANAGEMENT_STAGING_PORT
          - yaml: global.host
            env: NODE_MANAGEMENT_HOST
          - yaml: global.log_level
            env: LOG_LEVEL
          - yaml: global.log_format
            env: LOG_FORMAT
          - yaml: global.service_name
            env: SERVICE_NAME
          - yaml: global.service_version
            env: SERVICE_VERSION
          - yaml: global.node_management_url
            env: NODE_MANAGEMENT_URL

  - id: render-env-from-config-yaml
    description: Alternate mapping using config.yaml global.* (same shape as node-management global)
    steps:
      - type: yaml_to_dotenv
        yaml_file: config.yaml
        outfile: .env.node-management.from-config-yaml
        header: |
          # Generated by node-overlord trigger render-env-from-config-yaml
        mappings:
          - yaml: global.port
            env: NODE_MANAGEMENT_PORT
          - yaml: global.staging_port
            env: NODE_MANAGEMENT_STAGING_PORT
          - yaml: global.host
            env: NODE_MANAGEMENT_HOST
          - yaml: global.log_level
            env: LOG_LEVEL
          - yaml: global.service_name
            env: SERVICE_NAME
          - yaml: global.service_version
            env: SERVICE_VERSION
