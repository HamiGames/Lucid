# Lucid Authentication Service – Standalone Compose aligned with foundation/core stack

services:
  lucid-auth-service:
    image: pickme/lucid-auth-service:latest-arm64
    container_name: lucid-auth-service
    restart: unless-stopped
    env_file:
      - ".env.foundation"
      - ".env.authentication"
      - ".env.secrets"
      - ".env.distroless"
    networks:
      lucid-pi-network:
    ports:
      - "18089:8089"
    working_dir: /app
    entrypoint: ["python3"]
    command: ["main.py"]
    environment:
      - LUCID_ENV=development
      - LUCID_PLATFORM=arm64
      - AUTH_SERVICE_HOST=lucid-auth-service
      - AUTH_SERVICE_PORT=8089
      - AUTH_SERVICE_URL=http://lucid-auth-service:8089
      - MONGODB_URI=mongodb://lucid:${MONGODB_PASSWORD}@lucid-mongodb:27017/lucid?authSource=admin
      - REDIS_URL=redis://:${REDIS_PASSWORD}@lucid-redis:6379/0
      - API_GATEWAY_URL=http://api-gateway:8080
      - CONSUL_HOST=service-mesh:8500
      - JWT_SECRET_KEY=${JWT_SECRET_KEY}
      - JWT_ALGORITHM=HS256
      - JWT_ACCESS_TOKEN_EXPIRE_MINUTES=15
      - JWT_REFRESH_TOKEN_EXPIRE_DAYS=7
      - ENABLE_HARDWARE_WALLET=true
      - LEDGER_SUPPORTED=true
      - TREZOR_SUPPORTED=true
      - KEEPKEY_SUPPORTED=true
      - TRON_NETWORK=${TRON_NETWORK}
    depends_on:
      lucid-mongodb:
        condition: service_healthy
      lucid-redis:
        condition: service_healthy
    user: "65532:65532"
    security_opt:
      - no-new-privileges:true
      - seccomp:unconfined
    cap_drop: ["ALL"]
    cap_add: ["NET_BIND_SERVICE"]
    read_only: true
    tmpfs:
      - /tmp:noexec,nosuid,size=100m
    volumes:
      - /mnt/myssd/Lucid/Lucid/logs/auth:/app/logs:rw
      - auth-dev-cache:/tmp/auth
    healthcheck:
      test:
        [
          "CMD",
          "python3",
          "-c",
          'import urllib.request; urllib.request.urlopen("http://lucid-auth-service:8089/health").read()',
        ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  # Optional local MongoDB for dev (renamed to avoid collisions)
  lucid-auth-mongodb:
    image: pickme/lucid-mongodb:latest-arm64
    container_name: lucid-auth-mongodb
    restart: unless-stopped
    env_file:
      - ".env.foundation"
    networks:
      lucid-pi-network:
    ports:
      - "27018:27017"
    environment:
      - MONGO_INITDB_ROOT_USERNAME=lucid
      - MONGO_INITDB_ROOT_PASSWORD=${MONGODB_PASSWORD}
      - MONGO_INITDB_DATABASE=lucid_auth
    command: ["mongod", "--auth", "--bind_ip_all"]
    volumes:
      - lucid-auth-mongodb-data:/data/db
      - "/app/auth/scripts/init-mongodb.js:/docker-entrypoint-initdb.d/init.js:ro"
    healthcheck:
      test: ["CMD-SHELL", "mongosh --quiet --eval 'db.runCommand({ ping: 1 })'"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  # Optional local Redis for dev (renamed to avoid collisions)
  lucid-auth-redis:
    image: pickme/lucid-redis:latest-arm64
    container_name: lucid-auth-redis
    restart: unless-stopped
    env_file:
      - .env.foundation
    networks:
      lucid-pi-network:
    ports:
      - "6380:6379"
    command:
      - redis-server
      - --appendonly
      - "yes"
    volumes:
      - lucid-auth-redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 3

networks:
  lucid-pi-network:
    external: true
    name: lucid-pi-network

volumes:
  auth-dev-cache:
    driver: local
    name: lucid-auth-dev-cache
  mongodb-dev-data:
    driver: local
    name: lucid-auth-mongodb-data
  redis-dev-data:
    driver: local
    name: lucid-auth-redis-data
