# LUCID ELECTRON GUI — infrastructure plane
# Path: infrastructure/containers/electron_gui/docker-compose.electron-gui.yml
#
# Aligned with: ports.txt (electron_gui_user 3001, electron_gui_node 3002), host-config.yml,
#   infrastructure/containers/env/env.secrets.template (populate configs/environment/.env.secrets from template).
# Networks: lucid-pi-network, lucid-gui-network, lucid-session-network (see infrastructure/containers/network/network.txt).
#
# Admin image (Dockerfile.admin) listens on 8120 inside the container; host-config admin_ui_backend also uses 8120 —
# default host publish 38120→8120 to reduce collisions when admin-ui-backend runs on the same Pi.
#
# From repository root (Lucid):
#   docker compose -f infrastructure/containers/electron_gui/docker-compose.electron-gui.yml up -d --build

name: lucid-electron-gui

x-lucid-host-config:
  file: ../host-config.yml
  repo_path: infrastructure/containers/host-config.yml
  version: '1.0'
  description: Lucid container host registry for Docker DNS hostnames, ports, discovery URLs, and static host IPs.
  http_path_template: 'http://{service_name}:{port}/app'
  host_ip_range: '172.20.10.1–172.20.10.76'
  in_container_path: /app/configs/host-config.yml

x-repo-context: &repo-context
  context: ../../../

x-lucid-build-args: &lucid-build-args
  BUILD_DATE: ${BUILD_DATE:-}
  VCS_REF: ${VCS_REF:-}
  VERSION: ${VERSION:-1.0.0}
  TARGETPLATFORM: ${TARGETPLATFORM:-linux/arm64}
  BUILDPLATFORM: ${BUILDPLATFORM:-linux/amd64}

x-env-electron: &env-electron
  - ../../../master-env-config.txt
  - ../../../configs/environment/.env.secrets

services:
  electron-gui-admin:
    image: ${LUCID_ELECTRON_GUI_ADMIN_IMAGE:-pickme/lucid-admin-interface:latest-arm64}
    container_name: lucid-electron-gui-admin
    hostname: electron-gui-admin
    platform: ${DOCKER_DEFAULT_PLATFORM:-linux/arm64}
    build:
      <<: *repo-context
      dockerfile: infrastructure/containers/electron_gui/Dockerfile.admin
      args:
        <<: *lucid-build-args
    restart: unless-stopped
    env_file: *env-electron
    environment:
      ELECTRON_GUI_API_BASE_URL: ${ELECTRON_GUI_API_BASE_URL:-http://api-gateway:8080/api/v1}
      ADMIN_INTERFACE_HOST: "0.0.0.0"
      ADMIN_INTERFACE_PORT: "8120"
      TOR_HOST: ${TOR_HOST:-tor-proxy}
      API_GATEWAY_HOST: ${API_GATEWAY_HOST:-api-gateway}
      SESSION_API_HOST: ${SESSION_API_HOST:-session-api}
      NODE_SYSTEM_GATEWAY_HOST: ${NODE_SYSTEM_GATEWAY_HOST:-node-system-gateway}
    ports:
      - "${ELECTRON_GUI_ADMIN_PUBLISH_PORT:-38120}:8120"
    volumes:
      - lucid_electron_gui_admin_data:/app/data:rw
      - lucid_electron_gui_admin_logs:/app/logs:rw
    networks:
      - lucid-pi-network
      - lucid-gui-network
      - lucid-session-network
    user: "65532:65532"
    read_only: true
    tmpfs:
      - /tmp:noexec,nosuid,size=128m
    security_opt:
      - no-new-privileges:true
    labels:
      com.lucid.service: electron-gui-admin
      com.lucid.cluster: gui-integration
      com.lucid.expose: "8120"
      com.lucid.phase: gui

  electron-gui-user:
    image: ${LUCID_ELECTRON_GUI_USER_IMAGE:-pickme/lucid-user-interface:latest-arm64}
    container_name: electron-gui-user
    hostname: electron-gui-user
    platform: ${DOCKER_DEFAULT_PLATFORM:-linux/arm64}
    build:
      <<: *repo-context
      dockerfile: infrastructure/containers/electron_gui/Dockerfile.user
      args:
        <<: *lucid-build-args
    restart: unless-stopped
    env_file: *env-electron
    environment:
      ELECTRON_GUI_API_BASE_URL: ${ELECTRON_GUI_API_BASE_URL:-http://api-gateway:8080/api/v1}
      TOR_HOST: ${TOR_HOST:-tor-proxy}
      API_GATEWAY_HOST: ${API_GATEWAY_HOST:-api-gateway}
      SESSION_API_HOST: ${SESSION_API_HOST:-session-api}
      NODE_SYSTEM_GATEWAY_HOST: ${NODE_SYSTEM_GATEWAY_HOST:-node-system-gateway}
    ports:
      - "${ELECTRON_GUI_USER_PUBLISH_PORT:-3001}:3001"
    volumes:
      - lucid_electron_gui_user_data:/app/data:rw
      - lucid_electron_gui_user_logs:/app/logs:rw
    networks:
      - lucid-pi-network
      - lucid-gui-network
      - lucid-session-network
    user: "65532:65532"
    read_only: true
    tmpfs:
      - /tmp:noexec,nosuid,size=128m
    security_opt:
      - no-new-privileges:true
    labels:
      com.lucid.service: electron-gui-user
      com.lucid.cluster: gui-integration
      com.lucid.expose: "3001"
      com.lucid.phase: gui

  electron-gui-node:
    image: ${LUCID_ELECTRON_GUI_NODE_IMAGE:-pickme/lucid-electron-node:latest-arm64}
    container_name: electron-gui-node
    hostname: electron-gui-node
    platform: ${DOCKER_DEFAULT_PLATFORM:-linux/arm64}
    build:
      <<: *repo-context
      dockerfile: infrastructure/containers/electron_gui/Dockerfile.node
      args:
        <<: *lucid-build-args
    restart: unless-stopped
    env_file: *env-electron
    environment:
      ELECTRON_GUI_API_BASE_URL: ${ELECTRON_GUI_API_BASE_URL:-http://api-gateway:8080/api/v1}
      TOR_HOST: ${TOR_HOST:-tor-proxy}
      API_GATEWAY_HOST: ${API_GATEWAY_HOST:-api-gateway}
      SESSION_API_HOST: ${SESSION_API_HOST:-session-api}
      NODE_SYSTEM_GATEWAY_HOST: ${NODE_SYSTEM_GATEWAY_HOST:-node-system-gateway}
    ports:
      - "${ELECTRON_GUI_NODE_PUBLISH_PORT:-3002}:3002"
    volumes:
      - lucid_electron_gui_node_data:/app/data:rw
      - lucid_electron_gui_node_logs:/app/logs:rw
    networks:
      - lucid-pi-network
      - lucid-gui-network
      - lucid-session-network
    user: "65532:65532"
    read_only: true
    tmpfs:
      - /tmp:noexec,nosuid,size=128m
    security_opt:
      - no-new-privileges:true
    labels:
      com.lucid.service: electron-gui-node
      com.lucid.cluster: gui-integration
      com.lucid.expose: "3002"
      com.lucid.phase: gui

networks:
  lucid-pi-network:
    external: true
    name: lucid-pi-network
  lucid-gui-network:
    external: true
    name: lucid-gui-network
  lucid-session-network:
    external: true
    name: lucid-session-network

volumes:
  lucid_electron_gui_admin_data:
  lucid_electron_gui_admin_logs:
  lucid_electron_gui_user_data:
  lucid_electron_gui_user_logs:
  lucid_electron_gui_node_data:
  lucid_electron_gui_node_logs:
