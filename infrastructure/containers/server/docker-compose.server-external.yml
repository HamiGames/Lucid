# LUCID SERVER EXTERNAL — server plane (gateway, manager, core)
# Path: infrastructure/containers/server/docker-compose.server-external.yml
#
# Aligned with: ports.txt (server-gateway 8080, lucid-server-manager 8081, lucid-server-core 8100),
#   host-config.yml, infrastructure/containers/env/env.secrets.template → configs/environment/.env.secrets.
# Networks: lucid-server-network (172.30.0.0/16), lucid-pi-network, lucid-session-network
#   (see infrastructure/containers/network/network.txt).
#
# server-gateway image expects hostname api-gateway for uvicorn/DNS alignment (Dockerfile.server-gateway).
# Alias server-gateway is added so both names resolve on lucid-pi-network.
#
# From repository root (Lucid):
#   docker compose -f infrastructure/containers/server/docker-compose.server-external.yml up -d --build

name: lucid-server-external

x-lucid-host-config:
  file: ../host-config.yml
  repo_path: infrastructure/containers/host-config.yml
  version: '1.0'
  description: Lucid container host registry for Docker DNS hostnames, ports, discovery URLs, and static host IPs.
  http_path_template: 'http://{service_name}:{port}/app'
  host_ip_range: '172.20.10.1–172.20.10.76'
  in_container_path: /app/configs/host-config.yml

x-repo-context: &repo-context
  context: ../../../

x-lucid-build-args: &lucid-build-args
  BUILD_DATE: ${BUILD_DATE:-}
  VCS_REF: ${VCS_REF:-}
  VERSION: ${VERSION:-1.0.0}
  TARGETPLATFORM: ${TARGETPLATFORM:-linux/arm64}
  BUILDPLATFORM: ${BUILDPLATFORM:-linux/amd64}
  PYTHON_VERSION: ${PYTHON_VERSION:-3.11}

x-env-server: &env-server
  - ../../../master-env-config.txt
  - ../../../configs/environment/.env.secrets

services:
  server-gateway:
    image: ${LUCID_SERVER_GATEWAY_IMAGE:-pickme/lucid-server-gateway:latest-arm64}
    container_name: lucid-server-gateway
    hostname: api-gateway
    platform: ${DOCKER_DEFAULT_PLATFORM:-linux/arm64}
    build:
      <<: *repo-context
      dockerfile: infrastructure/containers/server/Dockerfile.server-gateway
      args:
        <<: *lucid-build-args
    restart: unless-stopped
    env_file: *env-server
    environment:
      LUCID_ENV: ${LUCID_ENV:-production}
      WALLET_MANAGER_URL: ${WALLET_MANAGER_URL:-http://wallet-manager:8093}
      DATA_CHAIN_URL: ${DATA_CHAIN_URL:-http://data-chain:8087}
      TRON_CLIENT_URL: ${TRON_CLIENT_URL:-http://tron-client:8091}
      SESSION_API_URL: ${SESSION_API_URL:-http://session-api:8113}
      NODE_SYSTEM_GATEWAY_URL: ${NODE_SYSTEM_GATEWAY_URL:-http://node-system-gateway:8640}
      ADMIN_SYSTEM_GATEWAY_URL: ${ADMIN_SYSTEM_GATEWAY_URL:-http://admin-system-gateway:8155}
    ports:
      # Same internal port as api-gateway:8080 — remap host if both gateways run (ports.txt collision note).
      - "${SERVER_GATEWAY_PUBLISH_PORT:-8080}:8080"
    networks:
      lucid-pi-network:
        aliases:
          - server-gateway
      lucid-server-network:
        aliases:
          - server-gateway
      lucid-session-network:
        aliases:
          - server-gateway
    user: "65532:65532"
    read_only: true
    tmpfs:
      - /tmp:noexec,nosuid,size=200m
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    cap_add:
      - NET_BIND_SERVICE
    labels:
      com.lucid.service: server-gateway
      com.lucid.expose: "8080"

  lucid-server-manager:
    image: ${LUCID_SERVER_MANAGER_IMAGE:-pickme/lucid-server-manager:latest-arm64}
    container_name: lucid-server-manager
    hostname: lucid-server-manager
    platform: ${DOCKER_DEFAULT_PLATFORM:-linux/arm64}
    build:
      <<: *repo-context
      dockerfile: infrastructure/containers/server/Dockerfile.server-manager
      args:
        <<: *lucid-build-args
    restart: unless-stopped
    env_file: *env-server
    environment:
      LUCID_ENV: ${LUCID_ENV:-production}
    ports:
      - "${LUCID_SERVER_MANAGER_PUBLISH_PORT:-8081}:8081"
    networks:
      - lucid-pi-network
      - lucid-server-network
      - lucid-session-network
    user: "65532:65532"
    read_only: true
    tmpfs:
      - /tmp:noexec,nosuid,size=200m
    security_opt:
      - no-new-privileges:true
    labels:
      com.lucid.service: lucid-server-manager
      com.lucid.expose: "8081"

  lucid-server-core:
    image: ${LUCID_SERVER_CORE_IMAGE:-pickme/lucid-server-core:latest-arm64}
    container_name: lucid-server-core
    hostname: lucid-server-core
    platform: ${DOCKER_DEFAULT_PLATFORM:-linux/arm64}
    build:
      <<: *repo-context
      dockerfile: infrastructure/containers/server/Dockerfile
      args:
        <<: *lucid-build-args
    restart: unless-stopped
    env_file: *env-server
    environment:
      LUCID_ENV: ${LUCID_ENV:-production}
      LUCID_SERVER_CORE_PORT: "8100"
    ports:
      - "${LUCID_SERVER_CORE_PUBLISH_PORT:-8100}:8100"
    networks:
      - lucid-pi-network
      - lucid-server-network
      - lucid-session-network
    user: "65532:65532"
    read_only: true
    tmpfs:
      - /tmp:noexec,nosuid,size=200m
    security_opt:
      - no-new-privileges:true
    labels:
      com.lucid.service: lucid-server-core
      com.lucid.expose: "8100"

networks:
  lucid-pi-network:
    external: true
    name: lucid-pi-network
  lucid-server-network:
    external: true
    name: lucid-server-network
  lucid-session-network:
    external: true
    name: lucid-session-network
