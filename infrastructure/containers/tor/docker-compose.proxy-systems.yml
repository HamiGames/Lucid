# LUCID PROXY SYSTEMS — Tor SOCKS/control + tunnel-tools
# Path: infrastructure/containers/tor/docker-compose.proxy-systems.yml
#
# Aligned with: ports.txt (tor_socks 9050, tor_control 9051, tunnel_tools 7000), host-config.yml,
#   master-env-config.txt + configs/environment/.env.secrets → /app/configs/.env.master + .env.secrets (bind mounts on tor-proxy + tunnel-tools).
# Baked reference layouts (pickme images): container-runtime-layout.yml + this compose file under /app/service_configs/.
# tor-proxy: image pickme/lucid-tor-proxy:latest-arm64 (SOCKS + control).
# tunnel-tools: build infrastructure/containers/tor/Dockerfile (same stack as Dockerfile.tunnels notes).
#
# From repository root (Lucid):
#   docker compose -f infrastructure/containers/tor/docker-compose.proxy-systems.yml up -d --build

name: lucid-proxy-systems

x-lucid-host-config:
  file: ../host-config.yml
  repo_path: infrastructure/containers/host-config.yml
  version: "1.0"
  description: Lucid container host registry for Docker DNS hostnames, ports, discovery URLs, and static host IPs.
  http_path_template: "http://{service_name}:{port}/app"
  host_ip_range: "172.20.10.1–172.20.10.76"
  in_container_path: /app/configs/host-config.yml

x-repo-context: &repo-context
  context: ../../../

x-lucid-build-args: &lucid-build-args
  BUILD_DATE: ${BUILD_DATE:-}
  VCS_REF: ${VCS_REF:-}
  VERSION: ${VERSION:-1.0.0}
  TARGETPLATFORM: ${TARGETPLATFORM:-linux/arm64}
  BUILDPLATFORM: ${BUILDPLATFORM:-linux/amd64}

x-env-proxy: &env-proxy
  - ../../../master-env-config.txt
  - ../../../configs/environment/.env.secrets

services:
  tor-proxy:
    image: ${LUCID_TOR_PROXY_IMAGE:-pickme/lucid-tor-proxy:latest-arm64}
    container_name: tor-proxy
    hostname: tor-proxy
    platform: ${DOCKER_DEFAULT_PLATFORM:-linux/arm64}
    restart: unless-stopped
    env_file: *env-proxy
    environment:
      TOR_SOCKS_PORT: "9050"
      TOR_CONTROL_PORT: "9051"
    ports:
      - "${TOR_SOCKS_PUBLISH_PORT:-9050}:9050"
      - "${TOR_CONTROL_PUBLISH_PORT:-9051}:9051"
    networks:
      lucid-pi-network:
        aliases:
          - tor-socks
          - tor-control
    labels:
      com.lucid.service: tor-proxy
      com.lucid.expose: "9050,9051"
      com.lucid.tor.inherent: "true"

  tunnel-tools:
    image: ${LUCID_TUNNEL_TOOLS_IMAGE:-pickme/lucid-tunnel-tools:latest-arm64}
    container_name: tunnel-tools
    hostname: tunnel-tools
    platform: ${DOCKER_DEFAULT_PLATFORM:-linux/arm64}
    build:
      <<: *repo-context
      dockerfile: infrastructure/containers/tor/Dockerfile
      args:
        <<: *lucid-build-args
    restart: unless-stopped
    env_file: *env-proxy
    environment:
      CONTROL_HOST: tor-proxy
      CONTROL_PORT: "9051"
      TUNNEL_PORT: "7000"
      TOR_PROXY: tor-proxy:9050
    ports:
      - "${TUNNEL_TOOLS_PUBLISH_PORT:-7000}:7000"
    networks:
      - lucid-pi-network
    depends_on:
      tor-proxy:
        condition: service_started
    user: "65532:65532"
    read_only: true
    tmpfs:
      - /tmp:noexec,nosuid,size=128m
    security_opt:
      - no-new-privileges:true
    volumes:
      - ../../../master-env-config.txt:/app/configs/.env.master:ro
      - ../../../configs/environment/.env.secrets:/app/configs/.env.secrets:ro
    labels:
      com.lucid.service: tunnel-tools
      com.lucid.expose: "7000"
      com.lucid.tor.compatible: "true"

networks:
  lucid-pi-network:
    external: true
    name: lucid-pi-network
