# Lucid blockchain — core manager stack (engine, data, consensus, block-manager + sessions, payments, wallet, VM)
# Build contexts: repository root. Compose path: infrastructure/containers/blockchain/
#
# From repo root:
#   docker compose -f infrastructure/containers/blockchain/docker-compose.manager.yml up -d --build
#
# Wallet / identity: lucid-auth-service (bundles wallet/). TRON: tron-payment-service. Chain client: on-system-chain-client.
# VM: lucid-vm. Sessions: pipeline + API + merkle. Network lucid-pi-network must exist.

name: lucid-blockchain-manager

x-lucid-build-args: &lucid-build-args
  BUILD_DATE: ${BUILD_DATE:-}
  VCS_REF: ${VCS_REF:-}
  VERSION: ${VERSION:-1.0.0}
  TARGETPLATFORM: ${TARGETPLATFORM:-linux/arm64}
  BUILDPLATFORM: ${BUILDPLATFORM:-linux/amd64}
  PYTHON_VERSION: ${PYTHON_VERSION:-3.11}

# Three levels up from infrastructure/containers/blockchain/ = repository root (Lucid).
x-repo-context: &repo-context
  context: ../../../

x-env-manager: &env-manager
  - ../../../configs/environment/.env.foundation
  - ../../../configs/environment/.env.core
  - ../../../configs/environment/.env.support
  - ../../../configs/environment/.env.secrets

services:
  lucid-mongodb:
    image: ${LUCID_MONGODB_IMAGE:-pickme/lucid-mongodb:latest-arm64}
    container_name: lucid-mongodb
    platform: ${DOCKER_DEFAULT_PLATFORM:-linux/arm64}
    build:
      <<: *repo-context
      dockerfile: infrastructure/containers/database/Dockerfile.mongodb
      args:
        <<: *lucid-build-args
        DEBIAN_MULTIARCH: ${DEBIAN_MULTIARCH:-aarch64-linux-gnu}
    restart: unless-stopped
    networks:
      - lucid-pi-network
    ports:
      - "${LUCID_MONGODB_PUBLISH_PORT:-27017}:27017"
    volumes:
      - lucid_manager_mongodb_data:/data/db:rw
    environment:
      - MONGO_INITDB_ROOT_USERNAME=${MONGO_INITDB_ROOT_USERNAME:-lucid}
      - MONGO_INITDB_ROOT_PASSWORD=${MONGO_INITDB_ROOT_PASSWORD:?set MONGO_INITDB_ROOT_PASSWORD}
    user: "65532:65532"
    healthcheck:
      test: ["CMD", "/usr/bin/python3.11", "/app/usr/local/bin/healthcheck.py"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 90s

  lucid-redis:
    image: ${LUCID_REDIS_IMAGE:-redis:7-alpine}
    container_name: lucid-redis
    restart: unless-stopped
    networks:
      - lucid-pi-network
    ports:
      - "${LUCID_REDIS_PUBLISH_PORT:-6379}:6379"
    command: ["redis-server", "--appendonly", "yes"]
    volumes:
      - lucid_manager_redis_data:/data:rw
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  lucid-auth-service:
    image: ${LUCID_AUTH_SERVICE_IMAGE:-pickme/lucid-auth-service:latest-arm64}
    container_name: lucid-auth-service
    platform: ${DOCKER_DEFAULT_PLATFORM:-linux/arm64}
    build:
      <<: *repo-context
      dockerfile: infrastructure/containers/auth/Dockerfile.auth-service
      args:
        <<: *lucid-build-args
    restart: unless-stopped
    networks:
      - lucid-pi-network
    ports:
      - "${LUCID_AUTH_PUBLISH_PORT:-8089}:8089"
    env_file: *env-manager
    environment:
      - LUCID_ENV=${LUCID_ENV:-production}
      - MONGODB_URL=${MONGODB_URL:-mongodb://lucid:${MONGO_INITDB_ROOT_PASSWORD}@lucid-mongodb:27017/lucid?authSource=admin}
      - REDIS_URL=${REDIS_URL:-redis://lucid-redis:6379/0}
    depends_on:
      lucid-mongodb:
        condition: service_healthy
      lucid-redis:
        condition: service_healthy
    healthcheck:
      test:
        [
          "CMD",
          "/app/usr/bin/python3.11",
          "-c",
          "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8089/health', timeout=2); exit(0)",
        ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s

  lucid-blockchain-engine:
    image: ${LUCID_BLOCKCHAIN_ENGINE_IMAGE:-pickme/lucid-blockchain-engine:latest-arm64}
    container_name: lucid-blockchain-engine
    platform: ${DOCKER_DEFAULT_PLATFORM:-linux/arm64}
    build:
      <<: *repo-context
      dockerfile: infrastructure/containers/blockchain/Dockerfile.engine
      args:
        <<: *lucid-build-args
    restart: unless-stopped
    env_file: *env-manager
    networks:
      - lucid-pi-network
    ports:
      - "${BLOCKCHAIN_ENGINE_PUBLISH_PORT:-8084}:8084"
    volumes:
      - lucid_manager_engine_data:/app/data:rw
      - lucid_manager_engine_logs:/app/logs:rw
    environment:
      - BLOCKCHAIN_ENGINE_HOST=lucid-blockchain-engine
      - BLOCKCHAIN_ENGINE_PORT=8084
      - BLOCKCHAIN_ENGINE_URL=http://lucid-blockchain-engine:8084
      - MONGODB_URL=${MONGODB_URL:-mongodb://lucid:${MONGO_INITDB_ROOT_PASSWORD}@lucid-mongodb:27017/lucid?authSource=admin}
      - REDIS_URL=${REDIS_URL:-redis://lucid-redis:6379/0}
      - AUTH_SERVICE_URL=http://lucid-auth-service:8089
      - BLOCKCHAIN_SECRET_KEY=${BLOCKCHAIN_SECRET_KEY:?BLOCKCHAIN_SECRET_KEY not set}
    user: "65532:65532"
    read_only: true
    tmpfs:
      - /tmp:noexec,nosuid,size=200m
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    cap_add:
      - NET_BIND_SERVICE
    depends_on:
      lucid-mongodb:
        condition: service_healthy
      lucid-redis:
        condition: service_healthy
      lucid-auth-service:
        condition: service_healthy
    healthcheck:
      test:
        [
          "CMD",
          "/app/usr/bin/python3.11",
          "-c",
          "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8084/health', timeout=5).read()",
        ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s

  lucid-consensus-engine:
    image: ${LUCID_CONSENSUS_ENGINE_IMAGE:-pickme/lucid-consensus-engine:latest-arm64}
    container_name: lucid-consensus-engine
    platform: ${DOCKER_DEFAULT_PLATFORM:-linux/arm64}
    build:
      <<: *repo-context
      dockerfile: infrastructure/containers/blockchain/Dockerfile.consensus-engine
      args:
        <<: *lucid-build-args
    restart: unless-stopped
    env_file: *env-manager
    networks:
      - lucid-pi-network
    ports:
      - "${CONSENSUS_ENGINE_PUBLISH_PORT:-8095}:8085"
    environment:
      - BLOCKCHAIN_ENGINE_PORT=8085
      - BLOCKCHAIN_ENGINE_URL=http://lucid-consensus-engine:8085
      - MONGODB_URL=${MONGODB_URL:-mongodb://lucid:${MONGO_INITDB_ROOT_PASSWORD}@lucid-mongodb:27017/lucid?authSource=admin}
      - REDIS_URL=${REDIS_URL:-redis://lucid-redis:6379/0}
      - AUTH_SERVICE_URL=http://lucid-auth-service:8089
      - BLOCKCHAIN_SECRET_KEY=${BLOCKCHAIN_SECRET_KEY:?BLOCKCHAIN_SECRET_KEY not set}
    user: "65532:65532"
    read_only: true
    tmpfs:
      - /tmp:noexec,nosuid,size=200m
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    cap_add:
      - NET_BIND_SERVICE
    depends_on:
      lucid-mongodb:
        condition: service_healthy
      lucid-redis:
        condition: service_healthy
      lucid-auth-service:
        condition: service_healthy
      lucid-blockchain-engine:
        condition: service_healthy
    healthcheck:
      test:
        [
          "CMD",
          "/app/usr/bin/python3.11",
          "-c",
          "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8085/health', timeout=5).read()",
        ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s

  lucid-data-chain:
    image: ${LUCID_DATA_CHAIN_IMAGE:-pickme/lucid-data-chain:latest-arm64}
    container_name: lucid-data-chain
    platform: ${DOCKER_DEFAULT_PLATFORM:-linux/arm64}
    build:
      <<: *repo-context
      dockerfile: infrastructure/containers/blockchain/Dockerfile.data
      args:
        <<: *lucid-build-args
    restart: unless-stopped
    env_file: *env-manager
    networks:
      - lucid-pi-network
    ports:
      - "${DATA_CHAIN_PUBLISH_PORT:-8087}:8087"
    volumes:
      - lucid_manager_data_chain_data:/app/data:rw
      - lucid_manager_data_chain_logs:/app/logs:rw
    environment:
      - DATA_CHAIN_HOST=lucid-data-chain
      - DATA_CHAIN_PORT=8087
      - MONGODB_URL=${MONGODB_URL:-mongodb://lucid:${MONGO_INITDB_ROOT_PASSWORD}@lucid-mongodb:27017/lucid?authSource=admin}
      - REDIS_URL=${REDIS_URL:-redis://lucid-redis:6379/0}
      - BLOCKCHAIN_ENGINE_URL=http://lucid-blockchain-engine:8084
      - AUTH_SERVICE_URL=http://lucid-auth-service:8089
      - BLOCKCHAIN_SECRET_KEY=${BLOCKCHAIN_SECRET_KEY:?BLOCKCHAIN_SECRET_KEY not set}
    user: "65532:65532"
    read_only: true
    tmpfs:
      - /tmp:noexec,nosuid,size=128m
    depends_on:
      lucid-mongodb:
        condition: service_healthy
      lucid-redis:
        condition: service_healthy
      lucid-auth-service:
        condition: service_healthy
      lucid-blockchain-engine:
        condition: service_healthy
    healthcheck:
      test:
        [
          "CMD",
          "/app/usr/bin/python3.11",
          "-c",
          "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8087/health', timeout=5).read()",
        ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s

  lucid-block-manager:
    image: ${LUCID_BLOCK_MANAGER_IMAGE:-pickme/lucid-block-manager:latest-arm64}
    container_name: lucid-block-manager
    platform: ${DOCKER_DEFAULT_PLATFORM:-linux/arm64}
    build:
      <<: *repo-context
      dockerfile: infrastructure/containers/blockchain/Dockerfile.block-manager
      args:
        <<: *lucid-build-args
    restart: unless-stopped
    env_file: *env-manager
    networks:
      - lucid-pi-network
    ports:
      - "${BLOCK_MANAGER_PUBLISH_PORT:-8086}:8086"
    volumes:
      - lucid_manager_block_manager_data:/app/data:rw
      - lucid_manager_block_manager_logs:/app/logs:rw
    environment:
      - BLOCK_MANAGER_HOST=lucid-block-manager
      - BLOCK_MANAGER_PORT=8086
      - BLOCK_MANAGER_URL=http://lucid-block-manager:8086
      - BLOCK_STORAGE_PATH=${BLOCK_STORAGE_PATH:-/app/data/blocks}
      - SYNC_TIMEOUT=${SYNC_TIMEOUT:-30}
      - MONGODB_URL=${MONGODB_URL:-mongodb://lucid:${MONGO_INITDB_ROOT_PASSWORD}@lucid-mongodb:27017/lucid?authSource=admin}
      - REDIS_URL=${REDIS_URL:-redis://lucid-redis:6379/0}
      - BLOCKCHAIN_ENGINE_URL=http://lucid-blockchain-engine:8084
      - AUTH_SERVICE_URL=http://lucid-auth-service:8089
      - BLOCKCHAIN_SECRET_KEY=${BLOCKCHAIN_SECRET_KEY:?BLOCKCHAIN_SECRET_KEY not set}
    user: "65532:65532"
    read_only: true
    tmpfs:
      - /tmp:noexec,nosuid,size=128m
    depends_on:
      lucid-mongodb:
        condition: service_healthy
      lucid-redis:
        condition: service_healthy
      lucid-auth-service:
        condition: service_healthy
      lucid-blockchain-engine:
        condition: service_healthy
    healthcheck:
      test:
        [
          "CMD",
          "/app/usr/bin/python3.11",
          "-c",
          "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8086/health', timeout=5).read()",
        ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s

  lucid-session-pipeline:
    image: ${LUCID_SESSION_PIPELINE_IMAGE:-pickme/lucid-session-pipeline:latest-arm64}
    container_name: lucid-session-pipeline
    hostname: session-pipeline
    platform: ${DOCKER_DEFAULT_PLATFORM:-linux/arm64}
    build:
      <<: *repo-context
      dockerfile: infrastructure/containers/sessions/Dockerfile.session-pipeline
      args:
        <<: *lucid-build-args
    restart: unless-stopped
    networks:
      - lucid-pi-network
    ports:
      - "${SESSION_PIPELINE_PUBLISH_PORT:-8083}:8083"
    env_file: *env-manager
    environment:
      - MONGODB_URL=${MONGODB_URL:-mongodb://lucid:${MONGO_INITDB_ROOT_PASSWORD}@lucid-mongodb:27017/lucid?authSource=admin}
      - REDIS_URL=${REDIS_URL:-redis://lucid-redis:6379/0}
      - BLOCKCHAIN_ENGINE_URL=http://lucid-blockchain-engine:8084
    depends_on:
      lucid-mongodb:
        condition: service_healthy
      lucid-redis:
        condition: service_healthy
      lucid-blockchain-engine:
        condition: service_healthy
    healthcheck:
      test:
        [
          "CMD",
          "/app/usr/bin/python3.11",
          "-c",
          "import urllib.request; urllib.request.urlopen('http://session-pipeline:8083/health', timeout=2).read()",
        ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s

  lucid-session-api:
    image: ${LUCID_SESSION_API_IMAGE:-pickme/lucid-session-api:latest-arm64}
    container_name: lucid-session-api
    hostname: session-api
    platform: ${DOCKER_DEFAULT_PLATFORM:-linux/arm64}
    build:
      <<: *repo-context
      dockerfile: infrastructure/containers/sessions/Dockerfile.api
      args:
        <<: *lucid-build-args
    restart: unless-stopped
    networks:
      - lucid-pi-network
    ports:
      - "${SESSION_API_PUBLISH_PORT:-8113}:8113"
    env_file: *env-manager
    environment:
      - PORT=8113
      - HOST=session-api
      - MONGODB_URL=${MONGODB_URL:-mongodb://lucid:${MONGO_INITDB_ROOT_PASSWORD}@lucid-mongodb:27017/lucid?authSource=admin}
      - REDIS_URL=${REDIS_URL:-redis://lucid-redis:6379/0}
      - BLOCKCHAIN_ENGINE_URL=http://lucid-blockchain-engine:8084
    depends_on:
      lucid-mongodb:
        condition: service_healthy
      lucid-redis:
        condition: service_healthy
      lucid-blockchain-engine:
        condition: service_healthy
    healthcheck:
      test:
        [
          "CMD",
          "/app/usr/bin/python3.11",
          "-c",
          "import socket; s=socket.socket(); s.settimeout(2); r=s.connect_ex(('session-api',8113)); s.close(); exit(0 if r==0 else 1)",
        ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 45s

  lucid-merkle-tree-builder:
    image: ${LUCID_MERKLE_BUILDER_IMAGE:-pickme/lucid-merkle-builder:latest-arm64}
    container_name: lucid-merkle-tree-builder
    platform: ${DOCKER_DEFAULT_PLATFORM:-linux/arm64}
    build:
      <<: *repo-context
      dockerfile: infrastructure/containers/sessions/Dockerfile.merkle-tree-builder
      args:
        <<: *lucid-build-args
    restart: unless-stopped
    networks:
      - lucid-pi-network
    ports:
      - "${MERKLE_BUILDER_PUBLISH_PORT:-8092}:8092"
    env_file: *env-manager
    environment:
      - MONGODB_URL=${MONGODB_URL:-mongodb://lucid:${MONGO_INITDB_ROOT_PASSWORD}@lucid-mongodb:27017/lucid?authSource=admin}
      - REDIS_URL=${REDIS_URL:-redis://lucid-redis:6379/0}
      - BLOCKCHAIN_ENGINE_URL=http://lucid-blockchain-engine:8084
    depends_on:
      lucid-mongodb:
        condition: service_healthy
      lucid-redis:
        condition: service_healthy
      lucid-blockchain-engine:
        condition: service_healthy
    healthcheck:
      test:
        [
          "CMD",
          "/app/usr/bin/python3.11",
          "-c",
          "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8092/health', timeout=2).read()",
        ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s

  lucid-tron-payment-service:
    image: ${LUCID_TRON_PAYMENT_IMAGE:-pickme/lucid-tron-payment-service:latest-arm64}
    container_name: lucid-tron-payment-service
    platform: ${DOCKER_DEFAULT_PLATFORM:-linux/arm64}
    build:
      <<: *repo-context
      dockerfile: infrastructure/containers/payment_systems/Dockerfile.tron-payment-service
      args:
        BUILDPLATFORM: ${BUILDPLATFORM:-linux/amd64}
        TARGETPLATFORM: ${TARGETPLATFORM:-linux/arm64}
    restart: unless-stopped
    networks:
      - lucid-pi-network
    ports:
      - "${TRON_PAYMENT_PUBLISH_PORT:-8070}:8080"
    env_file: *env-manager
    environment:
      - MONGODB_URL=${MONGODB_URL:-mongodb://lucid:${MONGO_INITDB_ROOT_PASSWORD}@lucid-mongodb:27017/lucid?authSource=admin}
      - REDIS_URL=${REDIS_URL:-redis://lucid-redis:6379/0}
      - BLOCKCHAIN_ENGINE_URL=http://lucid-blockchain-engine:8084
      - AUTH_SERVICE_URL=http://lucid-auth-service:8089
    depends_on:
      lucid-mongodb:
        condition: service_healthy
      lucid-redis:
        condition: service_healthy
      lucid-auth-service:
        condition: service_healthy
      lucid-blockchain-engine:
        condition: service_healthy
    healthcheck:
      test:
        [
          "CMD",
          "/usr/bin/python3",
          "-c",
          "import socket; s=socket.socket(); s.settimeout(2); r=s.connect_ex(('127.0.0.1',8080)); s.close(); exit(0 if r==0 else 1)",
        ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  lucid-on-system-chain-client:
    image: ${LUCID_ON_SYSTEM_CHAIN_CLIENT_IMAGE:-pickme/lucid-on-system-chain-client:latest-arm64}
    container_name: lucid-on-system-chain-client
    platform: ${DOCKER_DEFAULT_PLATFORM:-linux/arm64}
    build:
      <<: *repo-context
      dockerfile: infrastructure/containers/payment_systems/Dockerfile.on-system-chain-client
      args:
        BUILDPLATFORM: ${BUILDPLATFORM:-linux/amd64}
        TARGETPLATFORM: ${TARGETPLATFORM:-linux/arm64}
    restart: unless-stopped
    networks:
      - lucid-pi-network
    ports:
      - "${ON_SYSTEM_CHAIN_CLIENT_PUBLISH_PORT:-8040}:8040"
    env_file: *env-manager
    environment:
      - MONGODB_URL=${MONGODB_URL:-mongodb://lucid:${MONGO_INITDB_ROOT_PASSWORD}@lucid-mongodb:27017/lucid?authSource=admin}
      - BLOCKCHAIN_ENGINE_URL=http://lucid-blockchain-engine:8084
    depends_on:
      lucid-mongodb:
        condition: service_healthy
      lucid-blockchain-engine:
        condition: service_healthy
    healthcheck:
      test:
        [
          "CMD",
          "/usr/bin/python3",
          "-c",
          "import socket; s=socket.socket(); s.settimeout(2); r=s.connect_ex(('127.0.0.1',8040)); s.close(); exit(0 if r==0 else 1)",
        ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  lucid-vm:
    image: ${LUCID_VM_IMAGE:-pickme/lucid-vm:latest-arm64}
    container_name: lucid-vm
    platform: ${DOCKER_DEFAULT_PLATFORM:-linux/arm64}
    build:
      <<: *repo-context
      dockerfile: infrastructure/containers/vm/Dockerfile.vm
      args:
        <<: *lucid-build-args
    restart: unless-stopped
    networks:
      - lucid-pi-network
    ports:
      - "${LUCID_VM_PUBLISH_PORT:-8107}:8107"
    env_file: *env-manager
    environment:
      - BLOCKCHAIN_ENGINE_URL=http://lucid-blockchain-engine:8084
      - AUTH_SERVICE_URL=http://lucid-auth-service:8089
    depends_on:
      lucid-blockchain-engine:
        condition: service_healthy
      lucid-auth-service:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "/opt/venv/bin/python", "-c", "import sys; sys.exit(0)"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s

networks:
  lucid-pi-network:
    external: true
    name: lucid-pi-network

volumes:
  lucid_manager_mongodb_data:
    name: lucid-manager-mongodb-data
  lucid_manager_redis_data:
    name: lucid-manager-redis-data
  lucid_manager_engine_data:
  lucid_manager_engine_logs:
  lucid_manager_data_chain_data:
  lucid_manager_data_chain_logs:
  lucid_manager_block_manager_data:
  lucid_manager_block_manager_logs:
