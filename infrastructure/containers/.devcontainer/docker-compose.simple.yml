# Simplified Lucid Development Environment
# Just the core devcontainer to test basic functionality

x-lucid-env-files: &lucid-env-files
  - ../../../master-env-config.txt
  - ../../../configs/environment/.env.secrets

networks:
  lucid-dev_lucid_net:
    name: lucid-dev_lucid_net
    driver: bridge
    attachable: true

services:
  # Minimal development container
  devcontainer:
    build:
      context: ..
      dockerfile: infrastructure/containers/infrastructure/containers/infrastructure/containers/infrastructure/containers/.devcontainer/Dockerfile.simple
    image: lucid/dev:simple
    container_name: lucid_devcontainer_simple
    hostname: lucid-dev-simple

    env_file: *lucid-env-files
    
    # Basic environment
    environment:
      - PYTHONUNBUFFERED=1
      - LUCID_ENV=dev
      
    # Mount workspace + same paths as Dockerfile.simple LUCID_IMAGE_CONFIG (/app/configs/)
    volumes:
      - ../../../master-env-config.txt:/app/configs/.env.master:ro
      - ../../../configs/environment/.env.secrets:/app/configs/.env.secrets:ro
      - ../:/workspaces/Lucid:cached
      
    # Network
    networks:
      - lucid-dev_lucid_net
      
    # Port mappings - just the basics
    ports:
      - "8080:8080"
      - "8081:8081"
      
    # Keep running
    command: tail -f /dev/null
    
    # Security
    security_opt:
      - no-new-privileges:true