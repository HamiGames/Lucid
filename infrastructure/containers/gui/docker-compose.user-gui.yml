# LUCID USER GUI - Distroless Deployment
# Path: infrastructure/containers/gui/docker-compose.user-gui.yml
#
# user and gui services cross interaction content
# links user-gui to gui-api-bridge
# links user-gui to gui-docker-manager
# links user-gui to gui-tor-manager
# links user-gui to gui-hardware-manager
# uses user-network, gui-network, and pi-network
# does not make full connection to the blockchain-network
# is isolated from database services and server-storage
# links user-gui to server-manager via api-gateway
# links user-gui to session-api via session-network
# links user-gui to server-system-gateway via api-gateway
# links user-gui to node-system via api-gateway
# links user-gui to wallet-manager via api-gateway
# links user-gui to data-chain via api-gateway
# links user-gui to tron-client via api-gateway
# links user-gui to payment-systems via api-gateway
# links user-gui to blockchain-network via api-gateway
# links user-gui to service-mesh-controller via api-gateway
# links user-gui to node-system via api-gateway
# recieves requests from api-gateway, admin-system-gateway, session-api, node-system-gateway, and api-gateway
# sends requests to api-gateway, admin-system-gateway, session-api, node-system-gateway, and api-gateway
#
# Merge with foundation/core for api-gateway, tor-proxy, lucid-mongodb, lucid-redis, lucid-auth-service
# when you need the same depends_on graph as configs/docker/docker-compose.gui-integration.yml.
#
# From repository root (Lucid):
#   docker compose -f infrastructure/containers/gui/docker-compose.user-gui.yml up -d
#
# onion-state volume: create once (e.g. docker volume create onion-state) or merge with a stack that defines it.

name: lucid-user-gui

x-repo-context: &repo-context
  context: ../../../

x-lucid-build-args: &lucid-build-args
  BUILD_DATE: ${BUILD_DATE:-}
  VCS_REF: ${VCS_REF:-}
  VERSION: ${VERSION:-1.0.0}
  TARGETPLATFORM: ${TARGETPLATFORM:-linux/arm64}
  BUILDPLATFORM: ${BUILDPLATFORM:-linux/amd64}

services:
  gui-api-bridge:
    image: ${LUCID_GUI_API_BRIDGE_IMAGE:-pickme/lucid-gui-api-bridge:latest-arm64}
    container_name: lucid-gui-api-bridge
    hostname: gui-api-bridge
    platform: ${DOCKER_DEFAULT_PLATFORM:-linux/arm64}
    build:
      <<: *repo-context
      dockerfile: infrastructure/containers/gui/Dockerfile.gui-api-bridge
      args:
        <<: *lucid-build-args
    restart: unless-stopped
    env_file:
      - ../../../configs/.env.master
      - ../../../configs/environment/.env.secrets
    ports:
      - "${GUI_API_BRIDGE_PUBLISH_PORT:-8102}:8102"
    volumes:
      - lucid_user_gui_api_bridge_logs:/app/logs:rw
      - lucid_user_gui_api_bridge_data:/app/data:rw
    networks:
      - lucid-pi-network
      - lucid-gui-network
    user: "65532:65532"
    security_opt:
      - no-new-privileges:true
      - seccomp:unconfined
    cap_drop:
      - ALL
    cap_add:
      - NET_BIND_SERVICE
    read_only: true
    tmpfs:
      - /tmp:noexec,nosuid,size=100m
    healthcheck:
      test:
        [
          "CMD",
          "python3",
          "-c",
          "import socket; s = socket.socket(); s.settimeout(2); r = s.connect_ex(('127.0.0.1', 8102)); s.close(); exit(0 if r == 0 else 1)",
        ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
    labels:
      - "com.lucid.phase=gui"
      - "com.lucid.service=gui-api-bridge"
      - "com.lucid.cluster=gui-integration"

  gui-docker-manager:
    image: ${LUCID_GUI_DOCKER_MANAGER_IMAGE:-pickme/lucid-gui-docker-manager:latest-arm64}
    container_name: lucid-gui-docker-manager
    hostname: gui-docker-manager
    platform: ${DOCKER_DEFAULT_PLATFORM:-linux/arm64}
    build:
      <<: *repo-context
      dockerfile: gui_docker_manager/Dockerfile.gui-docker-manager
      args:
        <<: *lucid-build-args
    restart: unless-stopped
    env_file:
      - ../../../configs/.env.master
      - ../../../configs/environment/.env.secrets
    ports:
      - "${GUI_DOCKER_MANAGER_PUBLISH_PORT:-8098}:8098"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - lucid_user_gui_docker_manager_logs:/app/logs:rw
      - lucid_user_gui_docker_manager_data:/app/data:rw
    networks:
      - lucid-pi-network
      - lucid-gui-network
    user: "65532:65532"
    security_opt:
      - no-new-privileges:true
      - seccomp:unconfined
    cap_drop:
      - ALL
    cap_add:
      - NET_BIND_SERVICE
    read_only: true
    tmpfs:
      - /tmp:noexec,nosuid,size=100m
    healthcheck:
      test:
        [
          "CMD",
          "python3",
          "-c",
          "import socket; s = socket.socket(); s.settimeout(2); r = s.connect_ex(('127.0.0.1', 8098)); s.close(); exit(0 if r == 0 else 1)",
        ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
    labels:
      - "com.lucid.phase=gui"
      - "com.lucid.service=gui-docker-manager"
      - "com.lucid.cluster=gui-integration"

  gui-tor-manager:
    image: ${LUCID_GUI_TOR_MANAGER_IMAGE:-pickme/lucid-gui-tor-manager:latest-arm64}
    container_name: lucid-gui-tor-manager
    hostname: gui-tor-manager
    platform: ${DOCKER_DEFAULT_PLATFORM:-linux/arm64}
    build:
      <<: *repo-context
      dockerfile: infrastructure/containers/gui/Dockerfile.gui-tor-manager
      args:
        <<: *lucid-build-args
    restart: unless-stopped
    env_file:
      - ../../../configs/.env.master
      - ../../../configs/environment/.env.secrets
    ports:
      - "${GUI_TOR_MANAGER_PUBLISH_PORT:-8097}:8097"
    volumes:
      - lucid_user_gui_tor_data:/app/tor-data:rw
      - lucid_user_gui_tor_manager_logs:/app/logs:rw
      - onion-state:/run/lucid/onion:ro
    networks:
      - lucid-pi-network
      - lucid-gui-network
    user: "65532:65532"
    security_opt:
      - no-new-privileges:true
      - seccomp:unconfined
    cap_drop:
      - ALL
    cap_add:
      - NET_BIND_SERVICE
    read_only: true
    tmpfs:
      - /tmp:noexec,nosuid,size=100m
    healthcheck:
      test:
        [
          "CMD",
          "python3",
          "-c",
          "import socket; s = socket.socket(); s.settimeout(2); r = s.connect_ex(('127.0.0.1', 8097)); s.close(); exit(0 if r == 0 else 1)",
        ]
      interval: 60s
      timeout: 10s
      retries: 3
      start_period: 60s
    labels:
      - "com.lucid.phase=gui"
      - "com.lucid.service=gui-tor-manager"
      - "com.lucid.cluster=gui-integration"

  gui-hardware-manager:
    image: ${LUCID_GUI_HARDWARE_MANAGER_IMAGE:-pickme/lucid-gui-hardware-manager:latest-arm64}
    container_name: lucid-gui-hardware-manager
    hostname: gui-hardware-manager
    platform: ${DOCKER_DEFAULT_PLATFORM:-linux/arm64}
    build:
      <<: *repo-context
      dockerfile: infrastructure/containers/gui/Dockerfile.gui-hardware-manager
      args:
        <<: *lucid-build-args
    restart: unless-stopped
    env_file:
      - ../../../configs/.env.master
      - ../../../configs/environment/.env.secrets
    ports:
      - "${GUI_HARDWARE_MANAGER_PUBLISH_PORT:-8099}:8099"
    volumes:
      - lucid_user_gui_hardware_logs:/app/logs:rw
      - lucid_user_gui_hardware_data:/app/data:rw
      - /run/usb-devices:/run/usb:rw
    networks:
      - lucid-pi-network
      - lucid-gui-network
    depends_on:
      gui-api-bridge:
        condition: service_healthy
    user: "65532:65532"
    security_opt:
      - no-new-privileges:true
      - seccomp:unconfined
    cap_drop:
      - ALL
    cap_add:
      - NET_BIND_SERVICE
    read_only: true
    tmpfs:
      - /tmp:noexec,nosuid,size=100m
    healthcheck:
      test:
        [
          "CMD",
          "python3",
          "-c",
          "import socket; s = socket.socket(); s.settimeout(2); r = s.connect_ex(('127.0.0.1', 8099)); s.close(); exit(0 if r == 0 else 1)",
        ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
    labels:
      - "com.lucid.phase=gui"
      - "com.lucid.service=gui-hardware-manager"
      - "com.lucid.cluster=gui-integration"

  lucid-user-interface:
    image: ${LUCID_USER_INTERFACE_IMAGE:-pickme/lucid-user-interface:latest-arm64}
    container_name: lucid-user-interface
    hostname: electron-gui-user
    platform: ${DOCKER_DEFAULT_PLATFORM:-linux/arm64}
    restart: unless-stopped
    env_file:
      - ../../../configs/.env.master
      - ../../../configs/environment/.env.secrets
    ports:
      - "${USER_INTERFACE_PUBLISH_PORT:-3001}:3001"
    volumes:
      - lucid_user_gui_interface_logs:/app/logs:rw
      - lucid_user_gui_interface_data:/app/data:rw
    networks:
      - lucid-pi-network
      - lucid-gui-network
    depends_on:
      gui-api-bridge:
        condition: service_healthy
    user: "65532:65532"
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    cap_add:
      - NET_BIND_SERVICE
    read_only: true
    tmpfs:
      - /tmp:noexec,nosuid,size=100m
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://127.0.0.1:3001/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    labels:
      - "com.lucid.phase=gui"
      - "com.lucid.service=lucid-user-interface"
      - "com.lucid.cluster=gui-integration"
      - "com.lucid.profile=user"

networks:
  lucid-pi-network:
    name: lucid-pi-network
    external: true
  lucid-gui-network:
    name: lucid-gui-network
    driver: bridge
    attachable: true
    ipam:
      config:
        - subnet: 172.27.0.0/16
          gateway: 172.27.0.1

volumes:
  lucid_user_gui_api_bridge_logs:
    name: lucid-user-gui-api-bridge-logs
  lucid_user_gui_api_bridge_data:
    name: lucid-user-gui-api-bridge-data
  lucid_user_gui_docker_manager_logs:
    name: lucid-user-gui-docker-manager-logs
  lucid_user_gui_docker_manager_data:
    name: lucid-user-gui-docker-manager-data
  lucid_user_gui_tor_data:
    name: lucid-user-gui-tor-data
  lucid_user_gui_tor_manager_logs:
    name: lucid-user-gui-tor-manager-logs
  lucid_user_gui_hardware_logs:
    name: lucid-user-gui-hardware-logs
  lucid_user_gui_hardware_data:
    name: lucid-user-gui-hardware-data
  lucid_user_gui_interface_logs:
    name: lucid-user-gui-interface-logs
  lucid_user_gui_interface_data:
    name: lucid-user-gui-interface-data
  onion-state:
    name: onion-state
    external: true
