# LUCID GUI SYSTEM (node operator) — Distroless Deployment
# Path: infrastructure/containers/gui/docker-compose.node-gui.yml
#
# Aligned with: ports.txt / host-config.yml (gui_api_bridge 8102, electron_gui_node 3002),
#   infrastructure/containers/env/env.secrets.template → configs/environment/.env.secrets.
#
# Networks: lucid-gui-network (172.27.0.0/16), lucid-pi-network, lucid-session-network, lucid-tron-isolated
#   so gui-api-bridge can reach session-api, tron-client / payment peers, and pi-network discovery
#   (see infrastructure/containers/network/network.txt).
#
# container_name lucid-node-gui-api-bridge avoids clashing with docker-compose.user-gui.yml (lucid-gui-api-bridge);
# Docker DNS name for the service remains gui-api-bridge within this compose project.
#
# From repository root (Lucid):
#   docker compose -f infrastructure/containers/gui/docker-compose.node-gui.yml up -d

name: lucid-node-gui

x-repo-context: &repo-context
  context: ../../../

x-lucid-build-args: &lucid-build-args
  BUILD_DATE: ${BUILD_DATE:-}
  VCS_REF: ${VCS_REF:-}
  VERSION: ${VERSION:-1.0.0}
  TARGETPLATFORM: ${TARGETPLATFORM:-linux/arm64}
  BUILDPLATFORM: ${BUILDPLATFORM:-linux/amd64}

x-env-node-gui: &env-node-gui
  - ../../../configs/.env.master
  - ../../../configs/environment/.env.secrets

x-env-node-interface: &env-node-interface
  - ../../../configs/.env.master
  - ../../../configs/environment/.env.secrets

services:
  gui-api-bridge:
    image: ${LUCID_GUI_API_BRIDGE_IMAGE:-pickme/lucid-gui-api-bridge:latest-arm64}
    container_name: lucid-node-gui-api-bridge
    hostname: gui-api-bridge
    platform: ${DOCKER_DEFAULT_PLATFORM:-linux/arm64}
    build:
      <<: *repo-context
      dockerfile: infrastructure/containers/gui/Dockerfile.gui-api-bridge
      args:
        <<: *lucid-build-args
    restart: unless-stopped
    env_file: *env-node-gui
    environment:
      API_GATEWAY_URL: ${API_GATEWAY_URL:-http://api-gateway:8080}
      SESSION_API_URL: ${SESSION_API_URL:-http://session-api:8113}
      NODE_SYSTEM_GATEWAY_URL: ${NODE_SYSTEM_GATEWAY_URL:-http://node-system-gateway:8640}
      NODE_MANAGEMENT_URL: ${NODE_MANAGEMENT_URL:-http://node-management:8095}
      DATA_CHAIN_URL: ${DATA_CHAIN_URL:-http://data-chain:8087}
      TRON_CLIENT_URL: ${TRON_CLIENT_URL:-http://tron-client:8091}
      WALLET_MANAGER_URL: ${WALLET_MANAGER_URL:-http://wallet-manager:8093}
      PAYMENT_SYSTEM_GATEWAY_URL: ${PAYMENT_SYSTEM_GATEWAY_URL:-http://payment-system-gateway:8097}
      TOR_HOST: ${TOR_HOST:-tor-proxy}
    ports:
      - "${GUI_API_BRIDGE_PUBLISH_PORT:-8102}:8102"
    volumes:
      - lucid_node_gui_api_bridge_logs:/app/logs:rw
      - lucid_node_gui_api_bridge_data:/app/data:rw
    networks:
      - lucid-pi-network
      - lucid-gui-network
      - lucid-session-network
      - lucid-tron-isolated
    user: "65532:65532"
    security_opt:
      - no-new-privileges:true
      - seccomp:unconfined
    cap_drop:
      - ALL
    cap_add:
      - NET_BIND_SERVICE
    read_only: true
    tmpfs:
      - /tmp:noexec,nosuid,size=100m
    healthcheck:
      test:
        [
          "CMD",
          "python3",
          "-c",
          "import socket; s = socket.socket(); s.settimeout(2); r = s.connect_ex(('127.0.0.1', 8102)); s.close(); exit(0 if r == 0 else 1)",
        ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
    labels:
      - "com.lucid.phase=gui"
      - "com.lucid.service=gui-api-bridge"
      - "com.lucid.cluster=gui-integration"
      - "com.lucid.expose=8102"

  lucid-node-interface:
    image: ${LUCID_NODE_INTERFACE_IMAGE:-pickme/lucid-electron-node:latest-arm64}
    container_name: lucid-node-interface
    hostname: electron-gui-node
    platform: ${DOCKER_DEFAULT_PLATFORM:-linux/arm64}
    build:
      <<: *repo-context
      dockerfile: infrastructure/containers/electron_gui/Dockerfile.node
      args:
        <<: *lucid-build-args
        BUILDPLATFORM: ${BUILDPLATFORM:-linux/amd64}
        TARGETPLATFORM: ${TARGETPLATFORM:-linux/arm64}
    restart: unless-stopped
    env_file: *env-node-interface
    ports:
      - "${NODE_INTERFACE_PUBLISH_PORT:-3002}:3002"
    volumes:
      - lucid_node_gui_interface_logs:/app/logs:rw
      - lucid_node_gui_interface_data:/app/data:rw
    networks:
      - lucid-pi-network
      - lucid-gui-network
      - lucid-session-network
      - lucid-tron-isolated
    environment:
      NODE_ENV: production
      ELECTRON_GUI_PROFILE: node_operator
      ELECTRON_GUI_NETWORK: lucid-pi-network
      ELECTRON_GUI_API_BASE_URL: ${ELECTRON_GUI_API_BASE_URL:-http://gui-api-bridge:8102/api/v1}
      TOR_HOST: ${TOR_HOST:-tor-proxy}
    depends_on:
      gui-api-bridge:
        condition: service_healthy
    user: "65532:65532"
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    cap_add:
      - NET_BIND_SERVICE
    read_only: true
    tmpfs:
      - /tmp:noexec,nosuid,size=100m
    healthcheck:
      test:
        [
          "CMD",
          "/nodejs/bin/node",
          "-e",
          "require('http').get('http://127.0.0.1:3002/health', (r) => process.exit(r.statusCode===200?0:1)).on('error', () => process.exit(1))",
        ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    labels:
      - "com.lucid.phase=gui"
      - "com.lucid.service=lucid-node-interface"
      - "com.lucid.cluster=gui-integration"
      - "com.lucid.expose=3002"

networks:
  lucid-pi-network:
    name: lucid-pi-network
    external: true
  lucid-gui-network:
    name: lucid-gui-network
    driver: bridge
    attachable: true
    ipam:
      config:
        - subnet: 172.27.0.0/16
          gateway: 172.27.0.1
  lucid-session-network:
    name: lucid-session-network
    external: true
  lucid-tron-isolated:
    name: lucid-tron-isolated
    external: true

volumes:
  lucid_node_gui_api_bridge_logs:
    name: lucid-node-gui-api-bridge-logs
  lucid_node_gui_api_bridge_data:
    name: lucid-node-gui-api-bridge-data
  lucid_node_gui_interface_logs:
    name: lucid-node-gui-interface-logs
  lucid_node_gui_interface_data:
    name: lucid-node-gui-interface-data
