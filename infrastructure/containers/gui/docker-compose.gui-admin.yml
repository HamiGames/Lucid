# LUCID GUI ADMIN - Distroless Deployment
# Path: infrastructure/containers/gui/docker-compose.gui-admin.yml
#
# gui and admin services cross interaction content
# links gui-admin to admin-api
# links gui-admin to admin-database
# uses gui-network, admin-network, and pi-network
# does not make full connection to the blockchain-network
# is isolated from database services and server-storage
# links gui-admin to admin-interface via admin-system-gateway
# links gui-admin to admin-backend via admin-system-gateway
# links gui-admin to admin-frontend via admin-system-gateway
# links gui-admin to gui-api-bridge via api-gateway, session-api, and node-system-gateway
# links gui-admin to gui-node, gui-user, gui-developer via api-gateway, session-api, and node-system-gateway
# recieves requests from api-gateway, admin-system-gateway, session-api, node-system-gateway, and api-gateway
# sends requests to api-gateway, admin-system-gateway, session-api, node-system-gateway, and api-gateway
# sends requests to admin-interface via admin-system-gateway
# sends requests to admin-backend via admin-system-gateway
# sends requests to admin-frontend via admin-system-gateway
# sends requests to gui-api-bridge via api-gateway, session-api, and node-system-gateway
# sends requests to gui-node, gui-user, gui-developer via api-gateway, session-api, and node-system-gateway
# sends requests to service-mesh-controller via pi-network
#
# From repository root (Lucid):
#   docker compose -f infrastructure/containers/gui/docker-compose.gui-admin.yml up -d
#
# Merge with infrastructure/containers/admin/docker-compose.admin.yml for admin-ui-backend and
# admin-system-gateway hostnames on lucid-pi-network.

name: lucid-gui-admin

x-lucid-host-config:
  file: ../host-config.yml
  repo_path: infrastructure/containers/host-config.yml
  version: '1.0'
  description: Lucid container host registry for Docker DNS hostnames, ports, discovery URLs, and static host IPs.
  http_path_template: 'http://{service_name}:{port}/app'
  host_ip_range: '172.20.10.1–172.20.10.76'
  in_container_path: /app/configs/host-config.yml

x-repo-context: &repo-context
  context: ../../../

x-lucid-build-args: &lucid-build-args
  BUILD_DATE: ${BUILD_DATE:-}
  VCS_REF: ${VCS_REF:-}
  VERSION: ${VERSION:-1.0.0}
  TARGETPLATFORM: ${TARGETPLATFORM:-linux/arm64}
  BUILDPLATFORM: ${BUILDPLATFORM:-linux/amd64}

services:
  gui-api-bridge:
    image: ${LUCID_GUI_API_BRIDGE_IMAGE:-pickme/lucid-gui-api-bridge:latest-arm64}
    container_name: lucid-gui-api-bridge
    hostname: gui-api-bridge
    platform: ${DOCKER_DEFAULT_PLATFORM:-linux/arm64}
    build:
      <<: *repo-context
      dockerfile: infrastructure/containers/gui/Dockerfile.gui-api-bridge
      args:
        <<: *lucid-build-args
    restart: unless-stopped
    env_file:
      - ../../../master-env-config.txt
      - ../../../configs/environment/.env.secrets
    ports:
      - "${GUI_API_BRIDGE_PUBLISH_PORT:-8102}:8102"
    volumes:
      - lucid_gui_admin_api_bridge_logs:/app/logs:rw
      - lucid_gui_admin_api_bridge_data:/app/data:rw
    networks:
      - lucid-pi-network
      - lucid-gui-network
      - lucid-admin-net
    user: "65532:65532"
    security_opt:
      - no-new-privileges:true
      - seccomp:unconfined
    cap_drop:
      - ALL
    cap_add:
      - NET_BIND_SERVICE
    read_only: true
    tmpfs:
      - /tmp:noexec,nosuid,size=100m
    healthcheck:
      test:
        [
          "CMD",
          "python3",
          "-c",
          "import socket; s = socket.socket(); s.settimeout(2); r = s.connect_ex(('127.0.0.1', 8102)); s.close(); exit(0 if r == 0 else 1)",
        ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
    labels:
      - "com.lucid.phase=gui"
      - "com.lucid.service=gui-api-bridge"
      - "com.lucid.cluster=gui-integration"

  lucid-admin-interface:
    image: ${LUCID_ADMIN_INTERFACE_IMAGE:-pickme/lucid-admin-interface:latest-arm64}
    container_name: lucid-admin-interface
    hostname: lucid-admin-interface
    platform: ${DOCKER_DEFAULT_PLATFORM:-linux/arm64}
    restart: unless-stopped
    env_file:
      - ../../../master-env-config.txt
      - ../../../configs/environment/.env.secrets
    ports:
      - "${ADMIN_INTERFACE_HTTP_PUBLISH_PORT:-8120}:8120"
      - "${ADMIN_INTERFACE_AUX_PUBLISH_PORT:-8100}:8100"
    volumes:
      - lucid_gui_admin_interface_logs:/app/logs:rw
      - lucid_gui_admin_interface_data:/app/data:rw
    networks:
      - lucid-pi-network
      - lucid-gui-network
      - lucid-admin-net
    depends_on:
      gui-api-bridge:
        condition: service_healthy
    user: "65532:65532"
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    cap_add:
      - NET_BIND_SERVICE
    read_only: true
    tmpfs:
      - /tmp:noexec,nosuid,size=100m
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://127.0.0.1:8120/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    labels:
      - "com.lucid.phase=gui"
      - "com.lucid.service=admin-interface"
      - "com.lucid.cluster=gui-integration"
      - "com.lucid.profile=admin"

networks:
  lucid-pi-network:
    name: lucid-pi-network
    external: true
  lucid-gui-network:
    name: lucid-gui-network
    driver: bridge
    attachable: true
    ipam:
      config:
        - subnet: 172.27.0.0/16
          gateway: 172.27.0.1
  lucid-admin-net:
    name: lucid-admin-net
    driver: bridge
    attachable: true
    ipam:
      config:
        - subnet: 172.28.0.0/16
          gateway: 172.28.0.1
