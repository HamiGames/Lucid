# MongoDB YAML config for Lucid distroless image (copied to /app/etc/mongod.conf)
# Paths must stay under /app — see database/mongodb/start_mongodb.py (data_dir, log_dir).
# Command-line flags passed by the startup script override the same options when both are set.

# Storage (matches volume mount: ...:/app/data and script --dbpath /app/data/db)
storage:
  dbPath: /app/data/db
  journal:
    enabled: true
    commitIntervalMs: 100
  wiredTiger:
    engineConfig:
      cacheSizeGB: 0.5
      journalCompressor: snappy
      directoryForIndexes: false
    collectionConfig:
      blockCompressor: snappy
    indexConfig:
      prefixCompression: true

# Logs under /app (script also passes --logpath; keep paths aligned)
systemLog:
  destination: file
  logAppend: true
  path: /app/var/log/mongodb/mongod.log
  logRotate: reopen
  verbosity: 0
  component:
    accessControl:
      verbosity: 0
    command:
      verbosity: 0
    replication:
      verbosity: 1

net:
  port: 27017
  bindIp: 0.0.0.0
  maxIncomingConnections: 100
  wireObjectCheck: true
  ipv6: false

processManagement:
  fork: false
  pidFilePath: /app/var/run/mongodb/mongod.pid

security:
  authorization: enabled
  javascriptEnabled: false

# Standalone by default (matches start_mongodb.py unless MONGODB_REPLICA_SET_ENABLED=true).
# Uncomment when using a replica set and after rs.initiate():
# replication:
#   replSetName: lucid-rs
#   oplogSizeMB: 128
#   enableMajorityReadConcern: true

operationProfiling:
  slowOpThresholdMs: 100
  mode: slowOp

setParameter:
  enableLocalhostAuthBypass: false
  authenticationMechanisms: SCRAM-SHA-1,SCRAM-SHA-256
  maxLogSizeKB: 10
  logLevel: 0
  cursorTimeoutMillis: 600000
  enableFlowControl: true
  flowControlTargetLagSeconds: 1
