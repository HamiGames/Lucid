# Path: infrastructure/containers/node/docker-compose.node-images.yml
# Builds and runs: node-worker (8600), node-registry (8610), node-gov (8620), node-utils (8630)
# aligned with infrastructure/containers/node/Dockerfile.node-* and node/docker-compose.yml patterns.
#
# Run from repository root (c:\Users\surba\Desktop\personal\THE_FUCKER\lucid_2\Lucid):
#   docker compose -f infrastructure/containers/node/docker-compose.node-images.yml up -d --build
#
# Run from this directory:
#   docker compose -f docker-compose.node-images.yml up -d --build
#
# Override platform on Windows/AMD64 dev host:
#   DOCKER_DEFAULT_PLATFORM=linux/amd64 docker compose -f infrastructure/containers/node/docker-compose.node-images.yml build

name: lucid-node-images

x-lucid-host-config:
  file: ../host-config.yml
  repo_path: infrastructure/containers/host-config.yml
  version: '1.0'
  description: Lucid container host registry for Docker DNS hostnames, ports, discovery URLs, and static host IPs.
  http_path_template: 'http://{service_name}:{port}/app'
  host_ip_range: '172.20.10.1–172.20.10.76'
  in_container_path: /app/configs/host-config.yml

x-node-build-args: &node-build-args
  BUILD_DATE: ${BUILD_DATE:-}
  VCS_REF: ${VCS_REF:-local}
  VERSION: ${VERSION:-1.0.0}

x-lucid-env-files: &lucid-env-files
  - ../../../master-env-config.txt
  - ../../../configs/environment/.env.secrets

services:
  lucid-mongodb:
    image: mongo:7
    container_name: lucid-node-images-mongodb
    hostname: lucid-mongodb
    environment:
      MONGO_INITDB_DATABASE: lucid_node_management
    volumes:
      - lucid-node-images-mongodb-data:/data/db
    networks:
      lucid-node-images:
        aliases:
          - lucid-mongodb
    ports:
      - "${LUCID_NODE_IMAGES_MONGO_PORT:-27017}:27017"
    healthcheck:
      test:
        ["CMD", "mongosh", "--quiet", "--eval", "db.runCommand({ ping: 1 }).ok"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 30s
    restart: unless-stopped

  lucid-redis:
    image: redis:7-alpine
    container_name: lucid-node-images-redis
    hostname: lucid-redis
    command: ["redis-server", "--appendonly", "yes"]
    volumes:
      - lucid-node-images-redis-data:/data
    networks:
      lucid-node-images:
        aliases:
          - lucid-redis
    ports:
      - "${LUCID_NODE_IMAGES_REDIS_PORT:-6379}:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 10s
    restart: unless-stopped

  node-worker:
    build:
      context: ../../../
      dockerfile: infrastructure/containers/node/Dockerfile.node-worker
      platforms:
        - ${LUCID_NODE_IMAGES_PLATFORM:-linux/arm64}
      args:
        <<: *node-build-args
    image: pickme/lucid-node-worker:${VERSION:-1.0.0}-arm64
    container_name: node-worker
    hostname: node-worker
    env_file: *lucid-env-files
    networks:
      lucid-node-images:
        aliases:
          - node-worker
    ports:
      - "${NODE_WORKER_PORT:-8600}:8600"
    environment:
      LUCID_ENV: production
      LUCID_PLATFORM: ${LUCID_PLATFORM:-arm64}
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
      PYTHONUNBUFFERED: "1"
      PYTHONDONTWRITEBYTECODE: "1"
      NODE_MANAGEMENT_HOST: "0.0.0.0"
      NODE_MANAGEMENT_PORT: "8600"
      NODE_MANAGEMENT_STAGING_PORT: ${NODE_MANAGEMENT_STAGING_PORT:-8099}
      NODE_MANAGEMENT_URL: http://node-worker:8600
      NODE_WORKER_PORT: "8600"
      MONGODB_URL: ${MONGODB_URL:-mongodb://lucid-mongodb:27017/lucid_node_management}
      MONGODB_DATABASE: ${MONGODB_DATABASE:-lucid_node_management}
      REDIS_URL: ${REDIS_URL:-redis://lucid-redis:6379/0}
      NODE_ID: ${NODE_WORKER_ID:-node-worker-1}
    volumes:
      - lucid-node-worker-data:/app/data
      - lucid-node-worker-logs:/app/logs
      - lucid-node-worker-cache:/app/cache
    depends_on:
      lucid-mongodb:
        condition: service_healthy
      lucid-redis:
        condition: service_healthy
    user: "65532:65532"
    read_only: true
    tmpfs:
      - /tmp:noexec,nosuid,size=100m
    security_opt:
      - no-new-privileges:true
    restart: unless-stopped

  node-registry:
    build:
      context: ../../../
      dockerfile: infrastructure/containers/node/Dockerfile.node-registry
      platforms:
        - ${LUCID_NODE_IMAGES_PLATFORM:-linux/arm64}
      args:
        <<: *node-build-args
    image: pickme/lucid-node-registry:${VERSION:-1.0.0}-arm64
    container_name: node-registry
    hostname: node-registry
    env_file: *lucid-env-files
    networks:
      lucid-node-images:
        aliases:
          - node-registry
    ports:
      - "${NODE_REGISTRY_PORT:-8610}:8610"
    environment:
      LUCID_ENV: production
      LUCID_PLATFORM: ${LUCID_PLATFORM:-arm64}
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
      PYTHONUNBUFFERED: "1"
      PYTHONDONTWRITEBYTECODE: "1"
      NODE_MANAGEMENT_HOST: "0.0.0.0"
      NODE_MANAGEMENT_PORT: "8610"
      NODE_MANAGEMENT_STAGING_PORT: ${NODE_MANAGEMENT_STAGING_PORT:-8099}
      NODE_MANAGEMENT_URL: http://node-registry:8610
      NODE_REGISTRY_PORT: "8610"
      MONGODB_URL: ${MONGODB_URL:-mongodb://lucid-mongodb:27017/lucid_node_management}
      MONGODB_DATABASE: ${MONGODB_DATABASE:-lucid_node_management}
      REDIS_URL: ${REDIS_URL:-redis://lucid-redis:6379/0}
      NODE_ID: ${NODE_REGISTRY_ID:-node-registry-1}
    volumes:
      - lucid-node-registry-data:/app/data
      - lucid-node-registry-logs:/app/logs
      - lucid-node-registry-cache:/app/cache
    depends_on:
      lucid-mongodb:
        condition: service_healthy
      lucid-redis:
        condition: service_healthy
    user: "65532:65532"
    read_only: true
    tmpfs:
      - /tmp:noexec,nosuid,size=100m
    security_opt:
      - no-new-privileges:true
    restart: unless-stopped

  node-gov:
    build:
      context: ../../../
      dockerfile: infrastructure/containers/node/Dockerfile.node-gov
      platforms:
        - ${LUCID_NODE_IMAGES_PLATFORM:-linux/arm64}
      args:
        <<: *node-build-args
    image: pickme/lucid-node-gov:${VERSION:-1.0.0}-arm64
    container_name: node-gov
    hostname: node-gov
    env_file: *lucid-env-files
    networks:
      lucid-node-images:
        aliases:
          - node-gov
    ports:
      - "${NODE_GOV_PORT:-8620}:8620"
    environment:
      LUCID_ENV: production
      LUCID_PLATFORM: ${LUCID_PLATFORM:-arm64}
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
      PYTHONUNBUFFERED: "1"
      PYTHONDONTWRITEBYTECODE: "1"
      NODE_MANAGEMENT_HOST: "0.0.0.0"
      NODE_MANAGEMENT_PORT: "8620"
      NODE_MANAGEMENT_STAGING_PORT: ${NODE_MANAGEMENT_STAGING_PORT:-8099}
      NODE_MANAGEMENT_URL: http://node-gov:8620
      NODE_GOV_PORT: "8620"
      MONGODB_URL: ${MONGODB_URL:-mongodb://lucid-mongodb:27017/lucid_node_management}
      MONGODB_DATABASE: ${MONGODB_DATABASE:-lucid_node_management}
      REDIS_URL: ${REDIS_URL:-redis://lucid-redis:6379/0}
      NODE_ID: ${NODE_GOV_ID:-node-gov-1}
    volumes:
      - lucid-node-gov-data:/app/data
      - lucid-node-gov-logs:/app/logs
      - lucid-node-gov-cache:/app/cache
    depends_on:
      lucid-mongodb:
        condition: service_healthy
      lucid-redis:
        condition: service_healthy
    user: "65532:65532"
    read_only: true
    tmpfs:
      - /tmp:noexec,nosuid,size=100m
    security_opt:
      - no-new-privileges:true
    restart: unless-stopped

  node-utils:
    build:
      context: ../../../
      dockerfile: infrastructure/containers/node/Dockerfile.node-utils
      platforms:
        - ${LUCID_NODE_IMAGES_PLATFORM:-linux/arm64}
      args:
        <<: *node-build-args
    image: pickme/lucid-node-utils:${VERSION:-1.0.0}-arm64
    container_name: node-utils
    hostname: node-utils
    env_file: *lucid-env-files
    networks:
      lucid-node-images:
        aliases:
          - node-utils
    ports:
      - "${NODE_UTILS_PORT:-8630}:8630"
    environment:
      LUCID_ENV: production
      LUCID_PLATFORM: ${LUCID_PLATFORM:-arm64}
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
      PYTHONUNBUFFERED: "1"
      PYTHONDONTWRITEBYTECODE: "1"
      NODE_MANAGEMENT_HOST: "0.0.0.0"
      NODE_MANAGEMENT_PORT: "8630"
      NODE_MANAGEMENT_STAGING_PORT: ${NODE_MANAGEMENT_STAGING_PORT:-8099}
      NODE_MANAGEMENT_URL: http://node-utils:8630
      NODE_UTILS_PORT: "8630"
      MONGODB_URL: ${MONGODB_URL:-mongodb://lucid-mongodb:27017/lucid_node_management}
      MONGODB_DATABASE: ${MONGODB_DATABASE:-lucid_node_management}
      REDIS_URL: ${REDIS_URL:-redis://lucid-redis:6379/0}
      NODE_ID: ${NODE_UTILS_ID:-node-utils-1}
    volumes:
      - lucid-node-utils-data:/app/data
      - lucid-node-utils-logs:/app/logs
      - lucid-node-utils-cache:/app/cache
    depends_on:
      lucid-mongodb:
        condition: service_healthy
      lucid-redis:
        condition: service_healthy
    user: "65532:65532"
    read_only: true
    tmpfs:
      - /tmp:noexec,nosuid,size=100m
    security_opt:
      - no-new-privileges:true
    restart: unless-stopped

networks:
  lucid-node-images:
    driver: bridge
    name: lucid-node-images

volumes:
  lucid-node-images-mongodb-data:
    name: lucid-node-images-mongodb-data
  lucid-node-images-redis-data:
    name: lucid-node-images-redis-data
  lucid-node-worker-data:
    name: lucid-node-worker-data
  lucid-node-worker-logs:
    name: lucid-node-worker-logs
  lucid-node-worker-cache:
    name: lucid-node-worker-cache
  lucid-node-registry-data:
    name: lucid-node-registry-data
  lucid-node-registry-logs:
    name: lucid-node-registry-logs
  lucid-node-registry-cache:
    name: lucid-node-registry-cache
  lucid-node-gov-data:
    name: lucid-node-gov-data
  lucid-node-gov-logs:
    name: lucid-node-gov-logs
  lucid-node-gov-cache:
    name: lucid-node-gov-cache
  lucid-node-utils-data:
    name: lucid-node-utils-data
  lucid-node-utils-logs:
    name: lucid-node-utils-logs
  lucid-node-utils-cache:
    name: lucid-node-utils-cache
