    image: ${LUCID_GUI_API_BRIDGE_IMAGE:-pickme/lucid-gui-api-bridge:latest-arm64}
    container_name: lucid-gui-api-bridge
    hostname: gui-api-bridge
    platform: ${DOCKER_DEFAULT_PLATFORM:-linux/arm64}
    build:
      <<: *repo-context
      dockerfile: infrastructure/containers/gui/Dockerfile.gui-api-bridge
      args:
        <<: *lucid-build-args
    restart: unless-stopped
    env_file: *env-user
    ports:
      - "${GUI_API_BRIDGE_PUBLISH_PORT:-8102}:8102"
    volumes:
      - lucid_user_services_gui_api_logs:/app/logs:rw
      - lucid_user_services_gui_api_data:/app/data:rw
    networks:
      lucid-pi-network:
        <<: *lucid-pi-ip-gui-api-bridge
      lucid-gui-network:
    user: "65532:65532"
    security_opt:
      - no-new-privileges:true
      - seccomp:unconfined
    cap_drop:
      - ALL
    cap_add:
      - NET_BIND_SERVICE
    read_only: true
    tmpfs:
      - /tmp:noexec,nosuid,size=100m
    depends_on:
      server-gateway:
        condition: service_started
      lucid-auth-service:
        condition: service_healthy
      session-api:
        condition: service_started
    healthcheck:
      test:
        [
          "CMD",
          "python3",
          "-c",
          "import socket; s = socket.socket(); s.settimeout(2); r = s.connect_ex(('127.0.0.1', 8102)); s.close(); exit(0 if r == 0 else 1)",
        ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
    labels:
      com.lucid.phase: gui
      com.lucid.host_ip: "172.20.10.61"
      com.lucid.service: gui-api-bridge
      com.lucid.cluster: gui-integration

