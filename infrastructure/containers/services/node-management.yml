# Runtime (container): /app/service_configs/node-management.yml — see container-runtime-layout.yml
# Node Management Service Configuration
# Cluster: 05-NODE-MANAGEMENT
# Service: Worker Node Management and PoOT Operations
# Port: 8095 (node_management @ infrastructure/containers/host-config.yml — distinct from tron-staking:8096)

config_files:
  secrets: /app/configs/.env.secrets
  master: /app/configs/.env.master

service:
  name: node-management
  version: "1.0.0"
  description: "Lucid Node Management - Worker node management and PoOT operations"
  cluster_id: "05-node-management-cluster"
  
# Port Configuration
ports:
  node-management: 8095

# Container Configuration
containers:
  node-management:
    name: lucid-node-management
    base_image: "pickme/lucid-node-management:latest-arm64"
    tag: "latest"
    multi_stage_build: true

# Service Dependencies
dependencies:
  internal:
    - name: "api-gateway"
      url: "http://api-gateway:8080/app"
      required: true
    - name: "blockchain-engine"
      url: "http://blockchain-engine:8084/app"
      required: true
    - name: "tron-payment-service"
      url: "http://tron-payment-service:8080/app"
      required: true
      isolated: true
    - name: "payout-router"
      url: "http://payout-router:8092/app"
      required: false
    - name: "node-overlord"
      url: "http://node-overlord:8130/app"
      required: false
    - name: "node-registry"
      url: "http://node-registry:8610/app"
      required: false
  external:
    - name: "lucid-mongodb"
      url: "mongodb://lucid-mongodb:27017/lucid_nodes"
      required: true
    - name: "lucid-redis"
      url: "redis://lucid-redis:6379/4"
      required: true

# Node Management Configuration
node-management:
  worker-nodes:
    max_nodes: 10000
    registration_timeout: 60
    heartbeat_interval: 30
    offline_timeout: 300
    cleanup_timeout: 3600
  node-lifecycle:
    states:
      - "registering"
      - "active"
      - "idle"
      - "working"
      - "offline"
      - "terminated"
    state_timeout: 300
    auto_cleanup: true
  resource-requirements:
    min_cpu: "1"
    min_memory: "2Gi"
    min_disk: "10Gi"
    min_network: "100Mbps"
    max_cpu: "16"
    max_memory: "64Gi"
    max_disk: "1Ti"
    max_network: "1Gbps"

# Pool Management Configuration
pool-management:
  pools:
    - name: "high_performance"
      min_cpu: "4"
      min_memory: "8Gi"
      min_disk: "100Gi"
      priority: 1
    - name: "standard"
      min_cpu: "2"
      min_memory: "4Gi"
      min_disk: "50Gi"
      priority: 2
    - name: "basic"
      min_cpu: "1"
      min_memory: "2Gi"
      min_disk: "20Gi"
      priority: 3
  pool-assignment:
    strategy: "resource_based"
    load_balancing: true
    auto_scaling: true
    scale_up_threshold: 0.8
    scale_down_threshold: 0.3

# PoOT (Proof of Observation Time) Configuration
poot:
  algorithm: "PoOT"
  scoring:
    observation_time_weight: 0.4
    resource_contribution_weight: 0.3
    network_stability_weight: 0.2
    uptime_weight: 0.1
  validation:
    min_observation_time: 3600  # 1 hour
    max_observation_time: 86400  # 24 hours
    validation_interval: 300  # 5 minutes
    consensus_threshold: 0.67
  rewards:
    base_reward: 100
    bonus_multiplier: 2.0
    penalty_multiplier: 0.5
    distribution_interval: 86400  # 24 hours

# Resource Monitoring Configuration
resource-monitoring:
  metrics_collection:
    interval: 30
    retention: 604800  # 7 days
    compression: true
  monitored_resources:
    cpu:
      enabled: true
      threshold_warning: 80
      threshold_critical: 95
    memory:
      enabled: true
      threshold_warning: 80
      threshold_critical: 95
    disk:
      enabled: true
      threshold_warning: 80
      threshold_critical: 95
    network:
      enabled: true
      threshold_warning: 80
      threshold_critical: 95
  performance_metrics:
    - "cpu_utilization"
    - "memory_utilization"
    - "disk_io"
    - "network_io"
    - "response_time"
    - "throughput"
    - "error_rate"

# Payout Management Configuration
payout-management:
  tron-integration:
    enabled: true
    network: "${TRON_NETWORK}"
    usdt-contract: "${USDT_CONTRACT_ADDRESS}"
    payout-frequency: "daily"
    batch-size: 100
    timeout: 300
  payout-calculation:
    base_rate: 1.0
    performance_multiplier: true
    uptime_multiplier: true
    quality_multiplier: true
  payout-processing:
    auto_processing: true
    manual_approval: false
    minimum_payout: 1.0
    maximum_payout: 10000.0

# API Configuration
api:
  version: "v1"
  base_path: "/app/api/v1"
  endpoints:
    health:
      - "GET /app/health"
    nodes:
      - "POST /nodes"
      - "GET /nodes"
      - "GET /nodes/{node_id}"
      - "PUT /nodes/{node_id}"
      - "DELETE /nodes/{node_id}"
      - "POST /nodes/{node_id}/register"
      - "POST /nodes/{node_id}/deregister"
      - "GET /nodes/{node_id}/status"
    pools:
      - "GET /pools"
      - "POST /pools"
      - "GET /pools/{pool_id}"
      - "PUT /pools/{pool_id}"
      - "DELETE /pools/{pool_id}"
      - "GET /pools/{pool_id}/nodes"
      - "POST /pools/{pool_id}/nodes/{node_id}"
      - "DELETE /pools/{pool_id}/nodes/{node_id}"
    resources:
      - "GET /nodes/{node_id}/resources"
      - "GET /nodes/{node_id}/metrics"
      - "GET /nodes/{node_id}/performance"
      - "POST /nodes/{node_id}/resources/update"
    poot:
      - "GET /poot/status"
      - "GET /poot/nodes/{node_id}/score"
      - "POST /poot/nodes/{node_id}/validate"
      - "GET /poot/leaderboard"
      - "GET /poot/consensus/status"
    payouts:
      - "GET /payouts"
      - "GET /payouts/{payout_id}"
      - "POST /payouts/process"
      - "GET /payouts/history"
      - "POST /payouts/{payout_id}/approve"
      - "POST /payouts/{payout_id}/reject"

# Database Configuration
database:
  lucid-mongodb:
    uri: "mongodb://lucid-mongodb:27017/lucid_nodes"
    database: "lucid_nodes"
    collections:
      - "nodes"
      - "pools"
      - "resources"
      - "poot_scores"
      - "payouts"
      - "metrics"
      - "alerts"
    indexes:
      - "node_id"
      - "pool_id"
      - "user_id"
      - "created_at"
      - "status"
      - "poot_score"
    connection_pool: 20
    timeout: 30
  redis:
    uri: "redis://lucid-redis:6379/4"
    database: 4
    use_cases:
      - "node_cache"
      - "poot_scores"
      - "resource_metrics"
      - "payout_queue"
    timeout: 30

# Security Configuration
security:
  authentication:
    required: true
    methods: ["jwt", "certificate"]
    session_timeout: 3600
  authorization:
    rbac_enabled: true
    roles:
      - "node-operator"
      - "pool-manager"
      - "admin"
  encryption:
    data_in_transit: true
    data_at_rest: true
    node_communication: true
  access_control:
    node_isolation: true
    pool_isolation: true
    resource_isolation: true
  audit_logging:
    enabled: true
    events:
      - "node_registered"
      - "node_deregistered"
      - "pool_created"
      - "pool_deleted"
      - "poot_score_calculated"
      - "payout_processed"
      - "resource_alert"

# Performance Configuration
performance:
  max_nodes: 10000
  max_pools: 100
  max_payouts_per_day: 1000
  connection_pool_size: 100
  request_timeout: 30
  response_timeout: 60
  bandwidth_limit: "1Gbps"
  cpu_usage_limit: "90%"
  memory_usage_limit: "90%"

# Logging Configuration
logging:
  level: "INFO"
  format: "json"
  structured: true
  node_events: true
  pool_events: true
  poot_events: true
  payout_events: true
  resource_events: true
  error_events: true
  correlation_id: true

# Health Check Configuration
health_check:
  node_service:
    endpoint: "/app/api/v1/nodes/health"
    interval: 30
    timeout: 10
    retries: 3
  dependencies:
    - "lucid-mongodb"
    - "lucid-redis"
    - "blockchain-engine"
    - "tron-payment-service"

# Metrics Configuration
metrics:
  enabled: true
  prometheus:
    enabled: true
    port: 9090
  custom_metrics:
    - "active_nodes"
    - "active_pools"
    - "poot_scores"
    - "payout_processing_rate"
    - "resource_utilization"
    - "node_registration_rate"
    - "pool_assignment_success_rate"
    - "payout_success_rate"

# Monitoring Configuration
monitoring:
  prometheus:
    enabled: true
    port: 9090
    path: "/app/metrics"
  grafana:
    enabled: true
    dashboard_id: "node-management"
  alerts:
    - name: "node_registration_failure"
      condition: "node_registration_success_rate < 0.9"
      severity: "critical"
    - name: "poot_validation_failure"
      condition: "poot_validation_success_rate < 0.8"
      severity: "warning"
    - name: "payout_processing_failure"
      condition: "payout_success_rate < 0.95"
      severity: "critical"
    - name: "high_resource_usage"
      condition: "resource_utilization > 0.9"
      severity: "warning"

# Deployment Configuration
deployment:
  replicas: 3
  resources:
    requests:
      cpu: "1"
      memory: "2Gi"
    limits:
      cpu: "4"
      memory: "8Gi"
  strategy:
    type: "RollingUpdate"
    rolling_update:
      max_unavailable: 1
      max_surge: 1
  volumes:
    - name: "node_data"
      path: "/data/nodes"
      size: "100Gi"
    - name: "poot_data"
      path: "/data/poot"
      size: "50Gi"
    - name: "payout_data"
      path: "/data/payouts"
      size: "20Gi"

# Environment-specific Overrides
environments:
  development:
    debug: true
    log_level: "DEBUG"
    node_management:
      max_nodes: 100
    performance:
      max_nodes: 100
      
  staging:
    debug: false
    log_level: "INFO"
    node_management:
      max_nodes: 1000
    performance:
      max_nodes: 1000
      
  production:
    debug: false
    log_level: "WARN"
    node_management:
      max_nodes: 10000
    performance:
      max_nodes: 10000
    security:
      enhanced: true

# Validation Rules
validation:
  required_fields:
    - "service.name"
    - "service.version"
    - "ports.node-management"
    - "containers.node-management.base_image"
  port_ranges:
    node-management: [8095, 8999]
  resource_limits:
    cpu_max: "8"
    memory_max: "16Gi"
  security_requirements:
    - "security.authentication.required"
    - "security.encryption.data_in_transit"
    - "security.audit_logging.enabled"
