# LUCID NODE MANAGEMENT — primary + staging (/app/configs/host-config.yml: node_management, node_management_staging)
# Path: infrastructure/containers/services/node/docker-compose.node-management.yml
#
# Aligned with:
#   - /app/configs/host-config.yml (services.node_management, node_management_staging)
#   - infrastructure/containers/tor/docker-compose.proxy-systems.yml (x-repo-context, env_file, labels, lucid-pi-network)
#   - Application image: infrastructure/containers/node/Dockerfile.node-management
#   - Baked services tree: build with Dockerfile in this directory (pickme/lucid-node-services-config:latest-arm64)
#
# From repository root (Lucid):
#   docker compose -f infrastructure/containers/services/node/docker-compose.node-management.yml up -d --build

name: lucid-node-management-services

x-lucid-host-config:
  file: ../../host-config.yml
  repo_path: infrastructure/containers/host-config.yml
  version: '1.0'
  description: Lucid container host registry for Docker DNS hostnames, ports, discovery URLs, and static host IPs.
  http_path_template: 'http://{service_name}:{port}/app'
  host_ip_range: '172.20.10.1–172.20.10.76'
  in_container_path: /app/configs/host-config.yml

x-repo-context: &repo-context
  context: ../../../../

x-lucid-build-args: &lucid-build-args
  BUILD_DATE: ${BUILD_DATE:-}
  VCS_REF: ${VCS_REF:-}
  VERSION: ${VERSION:-1.0.0}
  TARGETPLATFORM: ${TARGETPLATFORM:-linux/arm64}
  BUILDPLATFORM: ${BUILDPLATFORM:-linux/amd64}
  PYTHON_VERSION: ${PYTHON_VERSION:-3.11}

x-env-node-mgmt: &env-node-mgmt
  - ../../../../master-env-config.txt
  - ../../../../configs/environment/.env.secrets

services:
  node-management:
    image: ${LUCID_NODE_MANAGEMENT_IMAGE:-pickme/lucid-node-management:latest-arm64}
    container_name: node-management
    hostname: node-management
    platform: ${DOCKER_DEFAULT_PLATFORM:-linux/arm64}
    build:
      <<: *repo-context
      dockerfile: infrastructure/containers/node/Dockerfile.node-management
      args:
        <<: *lucid-build-args
    restart: unless-stopped
    env_file: *env-node-mgmt
    environment:
      NODE_MANAGEMENT_PORT: "8095"
      NODE_MANAGEMENT_STAGING_PORT: "8099"
      NODE_MANAGEMENT_URL: ${NODE_MANAGEMENT_URL:-http://node-management:8095}
      MONGODB_URL: ${MONGODB_URL:-mongodb://lucid-mongodb:27017/lucid_node_management}
      REDIS_URL: ${REDIS_URL:-redis://lucid-redis:6379/0}
    ports:
      - "${NODE_MANAGEMENT_PUBLISH_PORT:-8095}:8095"
    networks:
      - lucid-pi-network
    user: "65532:65532"
    read_only: true
    tmpfs:
      - /tmp:noexec,nosuid,size=100m
    security_opt:
      - no-new-privileges:true
    volumes:
      - ../../../../master-env-config.txt:/app/configs/.env.master:ro
      - ../../../../configs/environment/.env.secrets:/app/configs/.env.secrets:ro
    labels:
      com.lucid.service: node-management
      com.lucid.platform: arm64
      com.lucid.cluster: application
      com.lucid.security: distroless
      com.lucid.expose: "8095"

  node-management-staging:
    image: ${LUCID_NODE_MANAGEMENT_IMAGE:-pickme/lucid-node-management:latest-arm64}
    container_name: node-management-staging
    hostname: node-management-staging
    platform: ${DOCKER_DEFAULT_PLATFORM:-linux/arm64}
    depends_on:
      - node-management
    restart: unless-stopped
    env_file: *env-node-mgmt
    environment:
      NODE_MANAGEMENT_PORT: "8099"
      NODE_MANAGEMENT_STAGING_PORT: "8099"
      NODE_MANAGEMENT_URL: ${NODE_MANAGEMENT_STAGING_URL:-http://node-management-staging:8099}
      MONGODB_URL: ${MONGODB_URL:-mongodb://lucid-mongodb:27017/lucid_node_management}
      REDIS_URL: ${REDIS_URL:-redis://lucid-redis:6379/0}
    ports:
      - "${NODE_MANAGEMENT_STAGING_PUBLISH_PORT:-8099}:8099"
    networks:
      - lucid-pi-network
    user: "65532:65532"
    read_only: true
    tmpfs:
      - /tmp:noexec,nosuid,size=100m
    security_opt:
      - no-new-privileges:true
    volumes:
      - ../../../../master-env-config.txt:/app/configs/.env.master:ro
      - ../../../../configs/environment/.env.secrets:/app/configs/.env.secrets:ro
    labels:
      com.lucid.service: node-management-staging
      com.lucid.platform: arm64
      com.lucid.cluster: application
      com.lucid.security: distroless
      com.lucid.expose: "8099"

networks:
  lucid-pi-network:
    external: true
    name: lucid-pi-network
