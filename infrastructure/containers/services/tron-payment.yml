# Runtime (container): /app/configs/services/tron-payment.yml — see container-runtime-layout.yml
# TRON Payment Service Configuration
# This file contains configuration for the TRON payment system services
# Upstream HTTP entry: tron-payment-service:8080 (tron_payment_service @ host-config.yml); payment-system-gateway:8097

config_files:
  secrets: /app/configs/.env.secrets
  master: /app/configs/.env.master

# Service Information
service:
  name: "tron-payment-service"
  version: "1.0.0"
  description: "TRON Payment System for Lucid RDP"
  environment: "${ENVIRONMENT:-development}"

# TRON Network Configuration
tron:
  network: "${TRON_NETWORK:-mainnet}"
  api_url: "${TRON_API_URL:-https://api.trongrid.io}"
  api_key: "${TRON_API_KEY}"
  timeout: 30
  retry_attempts: 3
  retry_delay: 1000

# USDT Configuration
usdt:
  contract_address: "${USDT_CONTRACT_ADDRESS}"
  decimals: 6
  min_transfer: 1
  max_transfer: 1000000
  gas_limit: 100000
  gas_price: 1000000

# Wallet Configuration
wallet:
  enabled: true
  encryption_enabled: true
  encryption_algorithm: "AES-256-GCM"
  backup_enabled: true
  backup_interval: 3600
  max_wallets_per_user: 10

# Payout Configuration
payout:
  enabled: true
  v0_enabled: true
  kyc_enabled: true
  direct_enabled: true
  min_amount: 1
  max_amount: 10000
  batch_size: 10
  batch_timeout: 300
  confirmation_blocks: 20

# Staking Configuration
staking:
  enabled: true
  min_amount: 1000
  max_amount: 10000000
  reward_rate: 0.05
  lock_period: 86400
  auto_compound: false

# Service Ports (payment cluster keys in infrastructure/containers/host-config.yml + master-env TRX_STAKING_URL)
ports:
  tron_payment_service: 8080
  tron_client: 8091
  payout_router: 8092
  wallet_manager: 8093
  usdt_manager: 8094
  trx_staking: 8096
  payment_system_gateway: 8097

# Database Configuration
database:
  mongodb:
    host: "${MONGODB_HOST}"
    port: "${MONGODB_PORT}"
    database: "${MONGODB_DATABASE}"
    username: "${MONGODB_USERNAME}"
    password: "${MONGODB_PASSWORD}"
    auth_source: "admin"
    pool_size: 20
    max_idle_time: 30000
    server_selection_timeout: 5000

  redis:
    host: "${REDIS_HOST}"
    port: "${REDIS_PORT}"
    password: "${REDIS_PASSWORD}"
    database: 0
    pool_size: 50
    max_connections: 1000
    timeout: 5

# Security Configuration
security:
  jwt:
    secret: "${JWT_SECRET}"
    algorithm: "HS256"
    access_token_expire_minutes: 15
    refresh_token_expire_days: 7

  encryption:
    key: "${ENCRYPTION_KEY}"
    algorithm: "AES-256-GCM"
    iv_length: 12

  ssl:
    enabled: "${SSL_ENABLED}"
    cert_path: "${SSL_CERT_PATH:/app/etc/ssl/certs/lucid.crt}"
    key_path: "${SSL_KEY_PATH:/app/etc/ssl/private/lucid.key}"
    ca_path: "${SSL_CA_PATH:/app/etc/ssl/certs/ca.crt}"

# Rate Limiting
rate_limiting:
  enabled: true
  requests_per_minute: 100
  burst_size: 20
  window_size: 60

# Monitoring Configuration
monitoring:
  enabled: true
  metrics_enabled: true
  health_check_interval: 30
  health_check_timeout: 10
  prometheus_port: 9090
  prometheus_path: "/metrics"

# Logging Configuration
logging:
  level: "${LOG_LEVEL}"
  format: "json"
  file: "/app/logs/tron-payment.log"
  max_size: "100MB"
  max_files: 10
  compress: true

# Alerting Configuration
alerting:
  enabled: true
  email:
    smtp_host: "${ALERTING_EMAIL_SMTP_HOST}"
    smtp_port: "${ALERTING_EMAIL_SMTP_PORT}"
    smtp_user: "${ALERTING_EMAIL_SMTP_USER}"
    smtp_password: "${ALERTING_EMAIL_SMTP_PASSWORD}"
    from: "${ALERTING_EMAIL_FROM}"
    to: "${ALERTING_EMAIL_TO}"

  thresholds:
    error_rate: 5
    response_time: 1000
    cpu_usage: 80
    memory_usage: 80

# Network Configuration
network:
  interface: "${NETWORK_INTERFACE}"
  mtu: 1500
  buffer_size: 65536
  timeout: 30
  keepalive: true

# Container Configuration
container:
  runtime: "docker"
  network: "lucid-tron-isolated"
  subnet: "${TRON_ISOLATED_SUBNET}"
  gateway: "tron-client.lucid.local"

# Resource Limits
resources:
  cpu_limit: "2"
  memory_limit: "2Gi"
  cpu_request: "0.5"
  memory_request: "512Mi"
  storage_limit: "10Gi"

# Health Checks
health_checks:
  liveness:
    enabled: true
    path: "/health"
    port: 8080
    initial_delay: 30
    period: 10
    timeout: 5
    failure_threshold: 3

  readiness:
    enabled: true
    path: "/ready"
    port: 8080
    initial_delay: 5
    period: 5
    timeout: 3
    failure_threshold: 3

# Service Dependencies
dependencies:
  - name: "lucid-mongodb"
    host: "lucid-mongodb"
    port: "${MONGODB_PORT}"
    timeout: 10

  - name: "lucid-redis"
    host: "lucid-redis"
    port: "${REDIS_PORT}"
    timeout: 10

  - name: "lucid-auth-service"
    host: "lucid-auth-service"
    port: "${AUTH_SERVICE_PORT:-8089}"
    timeout: 10

# Environment Variables
environment:
  TRON_NETWORK: "${TRON_NETWORK}"
  TRON_API_URL: "${TRON_API_URL}"
  TRON_API_KEY: "${TRON_API_KEY}"
  USDT_CONTRACT_ADDRESS: "${USDT_CONTRACT_ADDRESS}"
  JWT_SECRET: "${JWT_SECRET}"
  ENCRYPTION_KEY: "${ENCRYPTION_KEY}"
  MONGODB_URI: "mongodb://${MONGODB_USERNAME}:${MONGODB_PASSWORD}@${MONGODB_HOST}:${MONGODB_PORT}/${MONGODB_DATABASE}?authSource=admin"
  REDIS_URL: "redis://${REDIS_HOST}:${REDIS_PORT}"

# Service Discovery
discovery:
  enabled: true
  consul:
    host: "lucid-consul"
    port: "${CONSUL_PORT}"
    service_name: "tron-payment-service"
    service_tags: ["tron-payment", "payment","distribution", "tron", "crypto"]
    health_check_interval: 30

# Load Balancing
load_balancing:
  enabled: false
  algorithm: "round_robin"
  health_check: true
  sticky_sessions: false

# Caching
caching:
  enabled: true
  ttl: 300
  max_size: 1000
  eviction_policy: "LRU"

# Backup Configuration
backup:
  enabled: true
  schedule: "0 2 * * *"
  retention_days: 30
  compression: true
  encryption: true
  storage:
    type: "local"
    path: "/app/data/backups/lucid/tron-payment"

# Development Configuration
development:
  debug: "${DEBUG:-false}"
  hot_reload: false
  mock_external_apis: false
  test_mode: false

# Production Configuration
production:
  debug: false
  hot_reload: false
  mock_external_apis: false
  test_mode: false
  ssl_required: true
  cors_origins: ["https://${LUCID_DOMAIN}"]

# Testing Configuration
testing:
  debug: true
  hot_reload: true
  mock_external_apis: true
  test_mode: true
  ssl_required: false
  cors_origins: ["*"]
