# Runtime (container): /app/service_configs/rdp/server-manager-config.yaml — see ../container-runtime-layout.yml
# Lucid RDP Server Manager - Configuration File
# Optional YAML configuration for RDP server management
# File: RDP/config/server-manager-config.yaml
# Purpose: Configuration for server templates, port management, and connection policies
# This file uses a flat structure matching the configuration model
# Environment variables from docker-compose.application.yml override these values
# Values with empty strings MUST be provided via environment variables
#
# Canonical registry (generated): infrastructure/containers/host-config.yml → container path /app/configs/host-config.yml
x-lucid-host-config-alignment:
  registry_path: /app/configs/host-config.yml
  http_path_template: "http://{service_name}:{port}/app"
  host_ip_range: 172.20.10.1–172.20.10.76
  entries:
    main_lucid_gateway:
      host_config_key: main_lucid_gateway
      service_name: api-gateway
      port: 8080
      host_ip: 172.20.10.1
      http_path: http://api-gateway:8080/app
    lucid_auth_service:
      host_config_key: lucid_auth_service
      service_name: lucid-auth-service
      port: 8089
      host_ip: 172.20.10.5
      http_path: http://lucid-auth-service:8089/app
    rdp_server_manager_yml:
      host_config_key: rdp_server_manager_yml
      service_name: rdp-server-manager
      port: 8001
      host_ip: 172.20.10.49
      http_path: http://rdp-server-manager:8001/app
    rdp_server_manager:
      host_config_key: rdp_server_manager
      service_name: rdp-server-manager-http
      port: 8090
      host_ip: 172.20.10.49
      http_path: http://rdp-server-manager-http:8090/app
    rdp_session_controller:
      host_config_key: rdp_session_controller
      service_name: rdp-session-controller
      port: 8101
      host_ip: 172.20.10.50
      http_path: http://rdp-session-controller:8101/app
    rdp_resource_monitor:
      host_config_key: rdp_resource_monitor
      service_name: rdp-resource-monitor
      port: 8201
      host_ip: 172.20.10.51
      http_path: http://rdp-resource-monitor:8201/app
    lucid_xrdp:
      host_config_key: lucid_xrdp
      service_name: lucid-xrdp
      port: 8250
      host_ip: 172.20.10.52
      http_path: http://lucid-xrdp:8250/app
    xrdp_desktop:
      host_config_key: xrdp_desktop
      service_name: xrdp-rdp
      port: 3389
      host_ip: 172.20.10.53
      http_path: http://xrdp-rdp:3389/app
    xrdp_sesman:
      host_config_key: xrdp_sesman
      service_name: xrdp-sesman
      port: 3350
      host_ip: 172.20.10.54
      http_path: http://xrdp-sesman:3350/app
    lucid_redis:
      host_config_key: lucid_redis
      service_name: lucid-redis
      port: 6379
      host_ip: 172.20.10.67
      http_path: http://lucid-redis:6379/app
    lucid_mongodb:
      host_config_key: lucid_mongodb
      service_name: lucid-mongodb
      port: 27017
      host_ip: 172.20.10.70
      http_path: http://lucid-mongodb:27017/app
    prometheus_metrics:
      host_config_key: prometheus_metrics
      service_name: prometheus-metrics
      port: 9090
      host_ip: 172.20.10.74
      http_path: http://prometheus-metrics:9090/app

# =============================================================================
# SERVICE CONFIGURATION
# =============================================================================
# Default values - can be overridden by environment variables
SERVICE_NAME: "rdp-server-manager"
SERVICE_VERSION: "1.0.0"
DEBUG: false
LOG_LEVEL: "INFO"
HOST: "0.0.0.0"
# host-config.yml rdp_server_manager (rdp-server-manager-http): 8090 @ 172.20.10.49 — matches Dockerfile.rdp-server-manager EXPOSE 8090; config fragment port 8001
PORT: 8090
MONITORING_PORT: 8090

# =============================================================================
# NETWORK CONFIGURATION
# =============================================================================
# MUST come from docker-compose.application.yml environment section
RDP_SERVER_MANAGER_HOST: ""
RDP_SERVER_MANAGER_PORT: ""
RDP_SERVER_MANAGER_URL: ""

# =============================================================================
# DATABASE CONFIGURATION
# =============================================================================
# MUST come from /app/configs/.env.secrets (bind: configs/environment/.env.secrets)
MONGODB_URL: ""
REDIS_URL: ""

# =============================================================================
# STORAGE CONFIGURATION
# =============================================================================
# Default paths matching volume mounts in docker-compose.application.yml
LOG_STORAGE_PATH: "/app/logs"
TEMP_STORAGE_PATH: "/tmp/server-manager"

# =============================================================================
# PORT MANAGEMENT CONFIGURATION
# =============================================================================
# Default values - can be overridden by environment variables
PORT_MANAGEMENT_ENABLED: true
PORT_RANGE_START: 3390
PORT_RANGE_END: 3499
PORT_ALLOCATION_STRATEGY: "sequential"
PORT_REUSE_DELAY_SECONDS: 60
MAX_PORTS_PER_USER: 5
PORT_HEALTH_CHECK: true
PORT_HEALTH_CHECK_INTERVAL_SECONDS: 30

# =============================================================================
# CONNECTION CONFIGURATION
# =============================================================================
# Default values - can be overridden by environment variables
MAX_CONCURRENT_CONNECTIONS: 100
MAX_CONNECTIONS_PER_USER: 10
MAX_CONNECTIONS_PER_IP: 5
CONNECTION_TIMEOUT_SECONDS: 300
IDLE_TIMEOUT_SECONDS: 1800
KEEPALIVE_INTERVAL_SECONDS: 30
CONNECTION_POOL_ENABLED: true
CONNECTION_POOL_SIZE: 50
CONNECTION_POOL_MAX_OVERFLOW: 20
CONNECTION_POOL_TIMEOUT_SECONDS: 30

# =============================================================================
# INTEGRATION SERVICE URLS
# =============================================================================
# MUST come from docker-compose.application.yml environment section
RDP_XRDP_URL: ""
API_GATEWAY_URL: ""
AUTH_SERVICE_URL: ""

# =============================================================================
# XRDP CONFIGURATION
# =============================================================================
# Default values - can be overridden by environment variables
XRDP_CONFIG_PATH: "/etc/xrdp"
XRDP_SESSIONS_PATH: "/var/lib/xrdp/sessions"
XRDP_LOG_PATH: "/var/log/xrdp"
XRDP_PORT: 3389
XRDP_CRYPT_LEVEL: "high"
XRDP_BITMAP_CACHE: true
XRDP_BITMAP_COMPRESSION: true
XRDP_MAX_BPP: 24

# =============================================================================
# HEALTH CHECK CONFIGURATION
# =============================================================================
# Default values
HEALTH_CHECK_INTERVAL: 30
HEALTH_CHECK_ENABLED: true

# =============================================================================
# METRICS CONFIGURATION
# =============================================================================
# Default values
METRICS_ENABLED: true
PROMETHEUS_ENABLED: true
METRICS_PORT: 9090
EXPORT_METRICS_ENDPOINT: true

# =============================================================================
# RETRY CONFIGURATION
# =============================================================================
# Default values - can be overridden by environment variables
SERVICE_TIMEOUT_SECONDS: 30
SERVICE_RETRY_COUNT: 3
SERVICE_RETRY_DELAY_SECONDS: 1.0

# =============================================================================
# CORS CONFIGURATION
# =============================================================================
# Default value - can be overridden by environment variables
CORS_ORIGINS: "*"
