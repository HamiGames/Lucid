# infrastructure/containers/services/master-endpoint.yml
# Aggregates endpoint-file-list.txt sources; registry aligned to host-config.yml.

version: '1.0'
description: 'Master endpoint index: aggregates endpoint-file-list sources; service registry mirrors infrastructure/containers/host-config.yml.'
meta:
  host_config_path: infrastructure/containers/host-config.yml
  host_config_container_path: /app/configs/host-config.yml
  http_path_template: http://${service_name}:${port}/app
  master_index_path: infrastructure/containers/services/master-endpoint.yml
  endpoint_source_files:
  - path: admin/config/admin-endpoints.yml
    scope: admin-plane HTTP bases, cross-service
  - path: auth/config/endpoints.yaml
    scope: lucid-auth-service route catalog (/app prefix)
  - path: configs/integration/master-integration-config.yml
    scope: cross-system integration URLs
  - path: configs/services/gui-hardware-manager.yml
    scope: gui-hardware-manager service + API paths
  - path: configs/services/session-management.yml
    scope: session-management pipeline config
  - path: electron_gui/configs/electron-endpoints.yml
    scope: Electron GUI backend bases
  - path: gui/config/gui-endpoints.yml
    scope: GUI / desktop client bases
  - path: infrastructure/containers/blockchain/config/blockchain-endpoints.yml
    scope: blockchain + anchoring plane
  - path: infrastructure/containers/blockchain/config/block-pay-endpoints.yml
    scope: TRON / payment plane
  - path: infrastructure/containers/services/admin-interface.yml
    scope: admin-interface bundle
  - path: infrastructure/containers/services/beta-sidecar.yml
    scope: beta sidecar mesh + health probes
  - path: infrastructure/containers/services/blockchain-core.yml
    scope: blockchain-core bundle
  - path: infrastructure/containers/services/gui-hardware-manager.yml
    scope: gui-hardware-manager bundle
  - path: infrastructure/containers/services/node-management.yml
    scope: node-management bundle
  - path: infrastructure/containers/services/rdp-services.yml
    scope: RDP services bundle
  - path: infrastructure/containers/services/service-discovery.yml
    scope: Consul / service mesh discovery
  - path: infrastructure/containers/services/session-management.yml
    scope: session-management bundle
common_http:
  app_mount: /app
  health_relative: /health
  api_version_base: /app/api/v1
  notes: Most Lucid HTTP apps expose health at {http_path host base}/health when base ends with /app; admin-system-gateway
    host-config lists primary discovery as /health on port 8155.
audiences:
  super_admin:
    description: Full admin plane + gateways
    primary_configs:
    - admin/config/admin-endpoints.yml
    - infrastructure/containers/services/admin-interface.yml
    host_registry_keys:
    - admin_ui_backend
    - admin_overlord
    - admin_system_gateway
    - admin_params_registry
    - admin_key_rotation
    - admin_governance_client
    - database_overlord
    - main_lucid_gateway
  admin:
    description: Operations + monitoring
    primary_configs:
    - admin/config/admin-endpoints.yml
    host_registry_keys:
    - lucid_gov
    - prometheus_metrics
    - lucid_service_mesh_controller
    - service_mesh_http
  user:
    description: Electron / GUI clients
    primary_configs:
    - gui/config/gui-endpoints.yml
    - electron_gui/configs/electron-endpoints.yml
    host_registry_keys:
    - gui_api_bridge
    - gui_docker_manager
    - gui_hardware_manager
    - gui_tor_manager_http
    - electron_gui_user
    - lucid_auth_service
    - main_lucid_gateway
  node_operator:
    description: Worker / pool operations
    primary_configs:
    - infrastructure/containers/services/node-management.yml
    host_registry_keys:
    - node_management
    - node_worker
    - node_registry
    - node_overlord
    - node_gov
    - node_utils
    - electron_gui_node
  developer:
    description: API + core platform
    primary_configs:
    - configs/integration/master-integration-config.yml
    host_registry_keys:
    - lucid_server_manager
    - lucid_server_core
    - main_lucid_gateway
    - blockchain_engine
  session_pipeline_ops:
    description: Recording, chunks, storage, API
    primary_configs:
    - configs/services/session-management.yml
    - infrastructure/containers/services/session-management.yml
    host_registry_keys:
    - session_system_control
    - session_pipeline_manager
    - session_chunk_processor
    - session_storage_service
    - session_storage
    - session_pipeline
    - session_anchoring
    - session_recorder
    - session_processor
    - session_merkle_tree_builder
    - session_overlord
    - session_api
  blockchain_plane:
    description: lucid_blocks (no TRON in-process)
    primary_configs:
    - infrastructure/containers/blockchain/config/blockchain-endpoints.yml
    - infrastructure/containers/services/blockchain-core.yml
    host_registry_keys:
    - blockchain_engine
    - blockchain_consensus_engine
    - block_manager
    - data_chain
  payment_plane:
    description: Isolated TRON / wallet
    primary_configs:
    - infrastructure/containers/blockchain/config/block-pay-endpoints.yml
    host_registry_keys:
    - tron_node_client
    - on_system_chain_client
    - tron_payment_service
    - tron_client
    - tron_client_aux
    - payout_router
    - wallet_manager
    - usdt_manager
  rdp_plane:
    description: RDP / XRDP stack
    primary_configs:
    - infrastructure/containers/services/rdp-services.yml
    host_registry_keys:
    - rdp_server_manager_yml
    - rdp_server_manager
    - rdp_session_controller
    - rdp_resource_monitor
    - lucid_xrdp
    - xrdp_desktop
    - xrdp_sesman
  foundation_data:
    description: Datastores and Tor (native protocols; http_path is templating only per host-config notes)
    primary_configs:
    - admin/config/admin-endpoints.yml
    - configs/integration/master-integration-config.yml
    host_registry_keys:
    - lucid_mongodb
    - lucid_redis
    - lucid_elasticsearch_http
    - lucid_elasticsearch_transport
    - mongodb_monitoring
    - lucid_system_storage
    - tor_socks
    - tor_control
    - tunnel_tools
  mesh_support:
    description: Service discovery + sidecar
    primary_configs:
    - infrastructure/containers/services/service-discovery.yml
    - infrastructure/containers/services/beta-sidecar.yml
    host_registry_keys:
    - lucid_service_mesh_controller
    - consul_dns
    - consul_grpc
    - consul_lan_serf
    - service_mesh_http
  compute_other:
    description: VM + system storage
    host_registry_keys:
    - vm_service
authentication_routes:
  config: auth/config/endpoints.yaml
  mount: /app
  examples:
  - /app/health
  - /app/auth/login
  - /app/users/me
  - /app/sessions
