# Runtime (container): /app/service_configs/distroless/distroless-build-config.yml — see ../container-runtime-layout.yml
# Compose: run on host; env_file/bind paths may be host-relative unless you mount this tree at /app/service_configs/.
# Service hostname/port/host_ip: /app/configs/host-config.yml (static IPs: repository root service-ip.txt)
x-lucid-env-files: &lucid-env-files
  - /app/configs/.env.secrets
  - /app/configs/.env.master

services:
  distroless-builder:
    image: pickme/lucid-base:latest-arm64
    container_name: distroless-builder
    restart: unless-stopped
    networks:
      - lucid-distroless-production
    environment:
      - LUCID_ENV=production
      - LUCID_PLATFORM=arm64
      - LUCID_MODE=builder
      - DOCKER_BUILDKIT=1
    user: "65532:65532"
    security_opt:
      - no-new-privileges:true
      - seccomp:unconfined
    cap_drop:
      - ALL
    cap_add:
      - NET_BIND_SERVICE
    read_only: true
    tmpfs:
      - /tmp:noexec,nosuid,size=500m
      - /var/tmp:noexec,nosuid,size=200m
    volumes:
      - /app/configs/.env.master:/app/configs/.env.master:ro
      - /app/configs/.env.secrets:/app/configs/.env.secrets:ro
    healthcheck:
      test: ["CMD", "python3", "-c", "import sys; sys.exit(0)"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    labels:
      - "lucid.service=distroless-builder"
      - "lucid.type=distroless"
      - "lucid.platform=arm64"
      - "lucid.security=hardened"
      - "lucid.mode=builder"

  security-scanner:
    image: pickme/lucid-base:latest-arm64
    container_name: security-scanner
    restart: unless-stopped
    networks:
      - lucid-distroless-production
    env_file: *lucid-env-files
    environment:
      - LUCID_ENV=production
      - LUCID_PLATFORM=arm64
      - LUCID_MODE=security-scanner
      - LUCID_ENV_SECRETS_FILE=/app/configs/.env.secrets
      - LUCID_ENV_MASTER_FILE=/app/configs/.env.master
    user: "65532:65532"
    security_opt:
      - no-new-privileges:true
      - seccomp:unconfined
    cap_drop:
      - ALL
    read_only: true
    tmpfs:
      - /tmp:noexec,nosuid,size=200m
    volumes:
      - /app/configs/.env.master:/app/configs/.env.master:ro
      - /app/configs/.env.secrets:/app/configs/.env.secrets:ro
    healthcheck:
      test: ["CMD", "python3", "-c", "import sys; sys.exit(0)"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    labels:
      - "lucid.service=security-scanner"
      - "lucid.type=distroless"
      - "lucid.platform=arm64"
      - "lucid.security=hardened"
      - "lucid.mode=scanner"

  layer-optimizer:
    image: pickme/lucid-base:latest-arm64
    container_name: layer-optimizer
    restart: unless-stopped
    networks:
      - lucid-distroless-production
    env_file: *lucid-env-files
    environment:
      - LUCID_ENV=production
      - LUCID_PLATFORM=arm64
      - LUCID_MODE=layer-optimizer
      - LUCID_ENV_SECRETS_FILE=/app/configs/.env.secrets
      - LUCID_ENV_MASTER_FILE=/app/configs/.env.master
    user: "65532:65532"
    security_opt:
      - no-new-privileges:true
      - seccomp:unconfined
    cap_drop:
      - ALL
    read_only: true
    tmpfs:
      - /tmp:noexec,nosuid,size=300m
    volumes:
      - /app/configs/.env.master:/app/configs/.env.master:ro
      - /app/configs/.env.secrets:/app/configs/.env.secrets:ro
    healthcheck:
      test: ["CMD", "python3", "-c", "import sys; sys.exit(0)"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    labels:
      - "lucid.service=layer-optimizer"
      - "lucid.type=distroless"
      - "lucid.platform=arm64"
      - "lucid.security=hardened"
      - "lucid.mode=optimizer"

networks:
  lucid-distroless-production:
    driver: bridge
    name: lucid-distroless-production
    attachable: true
    ipam:
      config:
        - subnet: 172.28.0.0/16
          gateway: 172.28.0.1