# Runtime (container): /app/configs/services/distroless/distroless-development-config.yml — see ../container-runtime-layout.yml
# Compose: run on host; env_file paths must exist on the host unless you copy this tree into the image first.
# Service hostname/port/host_ip: /app/configs/host-config.yml (static IPs: repository root service-ip.txt)


x-lucid-env-files: &lucid-env-files
  - /app/configs/.env.secrets
  - /app/configs/.env.master

services:
  dev-distroless:
    image: pickme/lucid-base:latest-arm64
    container_name: dev-distroless
    restart: unless-stopped
    networks:
      - lucid-distroless-dev
    env_file: *lucid-env-files
    environment:
      - LUCID_ENV=development
      - LUCID_PLATFORM=arm64
      - LUCID_MODE=development
      - DEBUG=true
      - LUCID_ENV_SECRETS_FILE=/app/configs/.env.secrets
      - LUCID_ENV_MASTER_FILE=/app/configs/.env.master
    user: "65532:65532"
    security_opt:
      - no-new-privileges:true
      - seccomp:unconfined
    cap_drop:
      - ALL
    cap_add:
      - NET_BIND_SERVICE
    read_only: false
    tmpfs:
      - /tmp:noexec,nosuid,size=200m
    volumes:
      - /app/configs/.env.master:/app/configs/.env.master:ro
      - /app/configs/.env.secrets:/app/configs/.env.secrets:ro
    healthcheck:
      test: ["CMD", "python3", "-c", "import sys; sys.exit(0)"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    labels:
      - "lucid.service=dev-distroless"
      - "lucid.type=distroless"
      - "lucid.platform=arm64"
      - "lucid.security=development"
      - "lucid.mode=development"

  dev-minimal:
    image: pickme/lucid-base:latest-arm64
    container_name: dev-minimal
    restart: unless-stopped
    networks:
      - lucid-distroless-dev
    env_file: *lucid-env-files
    environment:
      - LUCID_ENV=development
      - LUCID_PLATFORM=arm64
      - LUCID_MODE=minimal-development
      - DEBUG=true
      - LUCID_ENV_SECRETS_FILE=/app/configs/.env.secrets
      - LUCID_ENV_MASTER_FILE=/app/configs/.env.master
    user: "65532:65532"
    security_opt:
      - no-new-privileges:true
      - seccomp:unconfined
    cap_drop:
      - ALL
    read_only: false
    tmpfs:
      - /tmp:noexec,nosuid,size=100m
    volumes:
      - /app/configs/.env.master:/app/configs/.env.master:ro
      - /app/configs/.env.secrets:/app/configs/.env.secrets:ro
    healthcheck:
      test: ["CMD", "python3", "-c", "import sys; sys.exit(0)"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    labels:
      - "lucid.service=dev-minimal"
      - "lucid.type=distroless"
      - "lucid.platform=arm64"
      - "lucid.security=development"
      - "lucid.mode=minimal"

  dev-tools:
    image: pickme/lucid-base:latest-arm64
    container_name: dev-tools
    restart: unless-stopped
    networks:
      - lucid-distroless-dev
    env_file: *lucid-env-files
    environment:
      - LUCID_ENV=development
      - LUCID_PLATFORM=arm64
      - LUCID_MODE=dev-tools
      - DEBUG=true
      - LUCID_ENV_SECRETS_FILE=/app/configs/.env.secrets
      - LUCID_ENV_MASTER_FILE=/app/configs/.env.master
    user: "65532:65532"
    security_opt:
      - no-new-privileges:true
      - seccomp:unconfined
    cap_drop:
      - ALL
    cap_add:
      - NET_BIND_SERVICE
    read_only: false
    tmpfs:
      - /tmp:noexec,nosuid,size=300m
    volumes:
      - /app/configs/.env.master:/app/configs/.env.master:ro
      - /app/configs/.env.secrets:/app/configs/.env.secrets:ro
    healthcheck:
      test: ["CMD", "python3", "-c", "import sys; sys.exit(0)"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    labels:
      - "lucid.service=dev-tools"
      - "lucid.type=distroless"
      - "lucid.platform=arm64"
      - "lucid.security=development"
      - "lucid.mode=tools"

networks:
  lucid-distroless-dev:
    driver: bridge
    name: lucid-distroless-dev
    attachable: true
    ipam:
      config:
        - subnet: 172.29.0.0/16
          gateway: 172.29.0.1