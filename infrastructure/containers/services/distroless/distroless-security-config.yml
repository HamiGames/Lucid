# Runtime (container): /app/service_configs/distroless/distroless-security-config.yml — see ../container-runtime-layout.yml
# Compose: run on host; env_file paths must exist on the host unless you copy this tree into the image first.
# Service hostname/port/host_ip: /app/configs/host-config.yml (static IPs: repository root service-ip.txt)


x-lucid-env-files: &lucid-env-files
  - /app/configs/.env.secrets
  - /app/configs/.env.master

services:
  secure-distroless:
    image: pickme/lucid-base:latest-arm64
    container_name: secure-distroless
    restart: unless-stopped
    networks:
      - lucid-distroless-production
    env_file: *lucid-env-files
    environment:
      - LUCID_ENV=production
      - LUCID_PLATFORM=arm64
      - LUCID_MODE=secure
      - SECURITY_LEVEL=high
      - LUCID_ENV_SECRETS_FILE=/app/configs/.env.secrets
      - LUCID_ENV_MASTER_FILE=/app/configs/.env.master
    user: "65532:65532"
    security_opt:
      - no-new-privileges:true
      - seccomp:unconfined
      - apparmor:unconfined
    cap_drop:
      - ALL
    cap_add:
      - NET_BIND_SERVICE
    read_only: true
    tmpfs:
      - /tmp:noexec,nosuid,size=100m
    volumes:
      - /app/configs/.env.master:/app/configs/.env.master:ro
      - /app/configs/.env.secrets:/app/configs/.env.secrets:ro
    healthcheck:
      test: ["CMD", "python3", "-c", "import sys; sys.exit(0)"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    labels:
      - "lucid.service=secure-distroless"
      - "lucid.type=distroless"
      - "lucid.platform=arm64"
      - "lucid.security=maximum"
      - "lucid.mode=secure"

  minimal-secure:
    image: pickme/lucid-base:latest-arm64
    container_name: minimal-secure
    restart: unless-stopped
    networks:
      - lucid-distroless-production
    env_file: *lucid-env-files
    environment:
      - LUCID_ENV=production
      - LUCID_PLATFORM=arm64
      - LUCID_MODE=minimal-secure
      - SECURITY_LEVEL=high
      - LUCID_ENV_SECRETS_FILE=/app/configs/.env.secrets
      - LUCID_ENV_MASTER_FILE=/app/configs/.env.master
    user: "65532:65532"
    security_opt:
      - no-new-privileges:true
      - seccomp:unconfined
      - apparmor:unconfined
    cap_drop:
      - ALL
    read_only: true
    tmpfs:
      - /tmp:noexec,nosuid,size=50m
    volumes:
      - /app/configs/.env.master:/app/configs/.env.master:ro
      - /app/configs/.env.secrets:/app/configs/.env.secrets:ro
    healthcheck:
      test: ["CMD", "python3", "-c", "import sys; sys.exit(0)"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    labels:
      - "lucid.service=minimal-secure"
      - "lucid.type=distroless"
      - "lucid.platform=arm64"
      - "lucid.security=maximum"
      - "lucid.mode=minimal"

  security-monitor:
    image: pickme/lucid-base:latest-arm64
    container_name: security-monitor
    restart: unless-stopped
    networks:
      - lucid-distroless-production
    env_file: *lucid-env-files
    environment:
      - LUCID_ENV=production
      - LUCID_PLATFORM=arm64
      - LUCID_MODE=security-monitor
      - SECURITY_LEVEL=maximum
      - LUCID_ENV_SECRETS_FILE=/app/configs/.env.secrets
      - LUCID_ENV_MASTER_FILE=/app/configs/.env.master
    user: "65532:65532"
    security_opt:
      - no-new-privileges:true
      - seccomp:unconfined
      - apparmor:unconfined
    cap_drop:
      - ALL
    read_only: true
    tmpfs:
      - /tmp:noexec,nosuid,size=200m
    volumes:
      - /app/configs/.env.master:/app/configs/.env.master:ro
      - /app/configs/.env.secrets:/app/configs/.env.secrets:ro
    healthcheck:
      test: ["CMD", "python3", "-c", "import sys; sys.exit(0)"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    labels:
      - "lucid.service=security-monitor"
      - "lucid.type=distroless"
      - "lucid.platform=arm64"
      - "lucid.security=maximum"
      - "lucid.mode=monitor"

networks:
  lucid-distroless-production:
    driver: bridge
    name: lucid-distroless-production
    attachable: true
    ipam:
      config:
        - subnet: 172.28.0.0/16
          gateway: 172.28.0.1