# Runtime (container): /app/service_configs/rdp-services.yml — see container-runtime-layout.yml
# Per-service YAML fragments: /app/service_configs/rdp/*.yaml (e.g. server-manager-config.yaml, xrdp-config.yaml)
# RDP Services Configuration
# Cluster: 04-RDP-SERVICES
# Service: RDP Server Management and Session Control
# Canonical hostname/port/host_ip: infrastructure/containers/host-config.yml (rdp_server_manager_yml, rdp_server_manager,
#   rdp_session_controller, rdp_resource_monitor, lucid_xrdp, xrdp_desktop, xrdp_sesman).

config_files:
  secrets: /app/configs/.env.secrets
  master: /app/configs/.env.master

# Static host IPs for Docker DNS names (diagnostics / docs); source of truth: host-config.yml
host_registry:
  source: infrastructure/containers/host-config.yml
  services:
    rdp-server-manager:
      host_ip: 172.20.10.49
      port_config_fragment: 8001
    rdp-server-manager-http:
      host_ip: 172.20.10.49
      port: 8090
    rdp-session-controller:
      host_ip: 172.20.10.50
      port: 8101
    rdp-resource-monitor:
      host_ip: 172.20.10.51
      port: 8201
    lucid-xrdp:
      host_ip: 172.20.10.52
      port: 8250
    xrdp-rdp:
      host_ip: 172.20.10.53
      port: 3389
    xrdp-sesman:
      host_ip: 172.20.10.54
      port: 3350

service:
  name: rdp-services
  version: "1.0.0"
  description: "Lucid RDP Services - Remote Desktop Protocol server management"
  cluster_id: "04-rdp-services-cluster"
  
# Port Configuration
ports:
  rdp_server: 8001
  rdp_server_manager_http: 8090
  lucid-xrdp: 8250
  rdp_session_controller: 8101
  rdp_resource_monitor: 8201
  xrdp_rdp: 3389
  xrdp_sesman: 3350

# Container Configuration
containers:
  rdp-server-manager:
    name: lucid-rdp-server-manager
    base_image:  "pickme/lucid-rdp-server-manager:latest-arm64"
    tag: "latest"
    multi_stage_build: true
  lucid-xrdp:
    name: lucid-xrdp
    base_image: "pickme/lucid-rdp-xrdp:latest-arm64"
    tag: "latest"
    multi_stage_build: true
  rdp-session-controller:
    name: lucid-rdp-session-controller
    base_image: "pickme/lucid-rdp-session-control:latest-arm64"
    tag: "latest"
    multi_stage_build: true
  rdp-resource-monitor:
    name: lucid-rdp-resource-monitor
    base_image: "pickme/lucid-rdp-monitor:latest-arm64"
    tag: "latest"
    multi_stage_build: true

# Service Dependencies
dependencies:
  internal:
    - name: "api-gateway"
      url: "http://api-gateway:8080/app"
      required: true
    - name: "session-api"
      url: "http://session-api:8113/app"
      required: true
    - name: "lucid-auth-service"
      url: "http://lucid-auth-service:8089/app"
      required: true
    - name: "rdp-server-manager"
      url: "http://rdp-server-manager:8001/app"
      required: false
    - name: "lucid-xrdp"
      url: "http://lucid-xrdp:8250/app"
      required: false
  external:
    - name: "lucid-mongodb"
      url: "mongodb://lucid-mongodb:27017/lucid_rdp"
      required: true
    - name: "lucid-redis"
      url: "redis://lucid-redis:6379/3"
      required: true

# RDP Server Configuration
rdp_servers:
  port_range:
    start: 13350
    end: 14350
    max_servers: 1000
  server_lifecycle:
    creation_timeout: 30
    startup_timeout: 60
    shutdown_timeout: 30
    cleanup_timeout: 300
  resource_limits:
    cpu_limit: "2"
    memory_limit: "4Gi"
    disk_limit: "20Gi"
    network_limit: "100Mbps"
  security:
    encryption: true
    authentication: true
    access_control: true
    audit_logging: true

# XRDP Configuration
xrdp:
  enabled: true
  port: 3389
  ssl:
    enabled: true
    cert_path: "/app/etc/certs/xrdp.crt"
    key_path: "/app/etc/certs/xrdp.key"
  authentication:
    methods: ["password", "certificate"]
    timeout: 30
  session:
    max_sessions: 1
    idle_timeout: 3600
    disconnect_timeout: 300
  display:
    resolution: "1920x1080"
    color_depth: 24
    refresh_rate: 60

# Session Control Configuration
rdp-session-control:
  connection_manager:
    max_connections: 1000
    connection_timeout: 30
    keep_alive: true
    heartbeat_interval: 30
  session_lifecycle:
    states:
      - "connecting"
      - "connected"
      - "active"
      - "idle"
      - "disconnected"
      - "terminated"
    state_timeout: 300
    auto_cleanup: true
  user_management:
    user_isolation: true
    session_ownership: true
    concurrent_sessions: 1
    session_transfer: false

# Resource Monitoring Configuration
rdp-resource-monitor:
  metrics_collection:
    interval: 30
    retention: 86400  # 24 hours
    compression: true
  monitored_resources:
    cpu:
      enabled: true
      threshold_warning: 80
      threshold_critical: 95
    memory:
      enabled: true
      threshold_warning: 80
      threshold_critical: 95
    disk:
      enabled: true
      threshold_warning: 80
      threshold_critical: 95
    network:
      enabled: true
      threshold_warning: 80
      threshold_critical: 95
  alerts:
    enabled: true
    notification_channels:
      - "email"
      - "slack"
      - "webhook"

# API Configuration
api:
  version: "v1"
  base_path: "/app/api/v1"
  endpoints:
    health:
      - "GET /app/health"
    servers:
      - "POST /servers"
      - "GET /servers"
      - "GET /servers/{server_id}"
      - "PUT /servers/{server_id}"
      - "DELETE /servers/{server_id}"
      - "POST /servers/{server_id}/start"
      - "POST /servers/{server_id}/stop"
      - "POST /servers/{server_id}/restart"
    sessions:
      - "POST /servers/{server_id}/sessions"
      - "GET /servers/{server_id}/sessions"
      - "GET /servers/{server_id}/sessions/{session_id}"
      - "DELETE /servers/{server_id}/sessions/{session_id}"
      - "POST /servers/{server_id}/sessions/{session_id}/connect"
      - "POST /servers/{server_id}/sessions/{session_id}/disconnect"
    monitoring:
      - "GET /monitoring/status"
      - "GET /monitoring/servers/{server_id}/metrics"
      - "GET /monitoring/servers/{server_id}/resources"
      - "GET /monitoring/alerts"
    configuration:
      - "GET /config/servers"
      - "PUT /config/servers"
      - "GET /config/xrdp"
      - "PUT /config/xrdp"

# Database Configuration
database:
  mongodb:
    uri: "mongodb://lucid-mongodb:27017/lucid_rdp"
    database: "lucid_rdp"
    collections:
      - "servers"
      - "sessions"
      - "users"
      - "metrics"
      - "alerts"
      - "configurations"
    indexes:
      - "server_id"
      - "user_id"
      - "session_id"
      - "created_at"
      - "status"
    connection_pool: 20
    timeout: 30
  redis:
    uri: "redis://lucid-redis:6379/3"
    database: 3
    use_cases:
      - "server_cache"
      - "session_state"
      - "metrics_cache"
      - "alert_queue"
    timeout: 30

# Security Configuration
security:
  authentication:
    required: true
    methods: ["jwt", "certificate"]
    session_timeout: 3600
  authorization:
    rbac_enabled: true
    roles:
      - "user"
      - "admin"
      - "operator"
  encryption:
    data_in_transit: true
    data_at_rest: true
    session_encryption: true
  access_control:
    ip_whitelist: true
    user_isolation: true
    session_isolation: true
  audit_logging:
    enabled: true
    events:
      - "server_created"
      - "server_deleted"
      - "session_started"
      - "session_ended"
      - "user_connected"
      - "user_disconnected"
      - "resource_alert"

# Performance Configuration
performance:
  max_servers: 1000
  max_sessions_per_server: 1
  max_users: 10000
  connection_pool_size: 100
  request_timeout: 30
  response_timeout: 60
  bandwidth_limit: "1Gbps"
  cpu_usage_limit: "90%"
  memory_usage_limit: "90%"

# Logging Configuration
logging:
  level: "INFO"
  format: "json"
  structured: true
  server_events: true
  session_events: true
  resource_events: true
  error_events: true
  correlation_id: true
  user_activity: true

# Health Check Configuration
health_check:
  rdp-server-manager:
    endpoint: "/app/api/v1/servers/health"
    interval: 30
    timeout: 10
    retries: 3
  lucid-xrdp:
    endpoint: "/app/api/v1/xrdp/health"
    interval: 30
    timeout: 10
    retries: 3
  rdp-session-controller:
    endpoint: "/app/api/v1/sessions/health"
    interval: 30
    timeout: 10
    retries: 3
  rdp-resource-monitor:
    endpoint: "/app/api/v1/monitoring/health"
    interval: 30
    timeout: 10
    retries: 3

# Metrics Configuration
metrics:
  enabled: true
  prometheus:
    enabled: true
    port: 9090
  custom_metrics:
    - "active_servers"
    - "active_sessions"
    - "server_creation_rate"
    - "session_connection_rate"
    - "resource_utilization"
    - "error_rate"
    - "response_time"
    - "user_activity"

# Monitoring Configuration
monitoring:
  prometheus:
    enabled: true
    port: 9090
    path: "/app/metrics"
  grafana:
    enabled: true
    dashboard_id: "rdp-services"
  alerts:
    - name: "rdp-server-creation-failure"
      condition: "server_creation_success_rate < 0.9"
      severity: "critical"
    - name: "rdp-high-resource-usage"
      condition: "resource_utilization > 0.9"
      severity: "warning"
    - name: "rdp-session-connection-failure"
      condition: "session_connection_success_rate < 0.95"
      severity: "critical"
    - name: "rdp-server-overload"
      condition: "active_sessions > 0.8 * max_sessions"
      severity: "warning"

# Deployment Configuration
deployment:
  replicas: 3
  resources:
    requests:
      cpu: "1"
      memory: "2Gi"
    limits:
      cpu: "4"
      memory: "8Gi"
  strategy:
    type: "RollingUpdate"
    rolling_update:
      max_unavailable: 1
      max_surge: 1
  volumes:
    - name: "rdp_data"
      path: "/data/rdp"
      size: "100Gi"
    - name: "xrdp_config"
      path: "/etc/xrdp"
      size: "1Gi"
    - name: "ssl_certs"
      path: "/certs"
      size: "100Mi"

# Environment-specific Overrides
environments:
  development:
    debug: true
    log_level: "DEBUG"
    rdp_servers:
      max_servers: 10
    performance:
      max_servers: 10
      
  staging:
    debug: false
    log_level: "INFO"
    rdp_servers:
      max_servers: 100
    performance:
      max_servers: 100
      
  production:
    debug: false
    log_level: "WARN"
    rdp_servers:
      max_servers: 1000
    performance:
      max_servers: 1000
    security:
      enhanced: true

# Validation Rules
validation:
  required_fields:
    - "service.name"
    - "service.version"
    - "ports.rdp_server_manager_http"
    - "containers.rdp-server-manager.base_image"
  port_ranges:
    rdp_server: [8001, 8999]
    rdp_server_manager_http: [8090, 8999]
    lucid-xrdp: [8250, 8999]
    rdp_session_controller: [8101, 8999]
    rdp_resource_monitor: [8201, 8999]
    xrdp_rdp: [3389, 3389]
    xrdp_sesman: [3350, 3350]
  resource_limits:
    cpu_max: "8"
    memory_max: "16Gi"
  security_requirements:
    - "security.authentication.required"
    - "security.encryption.data_in_transit"
    - "security.audit_logging.enabled"
