# Runtime (container): /app/service_configs/x_lucid_cluster_calibration/foundation-cluster-host-alignment.yml
# Canonical foundation cluster alignment: host-config.yml + x-files-listing.txt (merge with docker-compose for this stack).
x-lucid-calibration:
  cluster: foundation
  source_host_config: infrastructure/containers/host-config.yml
  source_x_files_listing: x-files-listing.txt
  description: Host registry + x-lucid file paths for foundation cluster (merge with docker-compose fragments for this stack).
x-lucid-host-config:
  file: ../../host-config.yml
  repo_path: infrastructure/containers/host-config.yml
  version: '1.0'
  description: Lucid container host registry for Docker DNS hostnames, ports, discovery URLs, and static host IPs.
  ip_source_repo_path: service-ip.txt
  http_path_template: http://{service_name}:{port}/app
  host_ip_range: 172.20.10.1–172.20.10.76
  in_container_path: /app/configs/host-config.yml
x-lucid-host-config-alignment:
  registry_path: /app/configs/host-config.yml
  http_path_template: http://{service_name}:{port}/app
  host_ip_range: 172.20.10.1–172.20.10.76
  entries:
    lucid_auth_service:
      host_config_key: lucid_auth_service
      service_name: lucid-auth-service
      port: 8089
      host_ip: 172.20.10.5
      http_path: http://lucid-auth-service:8089/app
    lucid_elasticsearch_http:
      host_config_key: lucid_elasticsearch_http
      service_name: lucid-elasticsearch-http
      port: 9200
      host_ip: 172.20.10.68
      http_path: http://lucid-elasticsearch-http:9200/app
    lucid_elasticsearch_transport:
      host_config_key: lucid_elasticsearch_transport
      service_name: lucid-elasticsearch-transport
      port: 9300
      host_ip: 172.20.10.69
      http_path: http://lucid-elasticsearch-transport:9300/app
    lucid_gov:
      host_config_key: lucid_gov
      service_name: lucid-gov
      port: 8108
      host_ip: 172.20.10.6
      http_path: http://lucid-gov:8108/app
    lucid_mongodb:
      host_config_key: lucid_mongodb
      service_name: lucid-mongodb
      port: 27017
      host_ip: 172.20.10.70
      http_path: http://lucid-mongodb:27017/app
    lucid_redis:
      host_config_key: lucid_redis
      service_name: lucid-redis
      port: 6379
      host_ip: 172.20.10.67
      http_path: http://lucid-redis:6379/app
    mongodb_monitoring:
      host_config_key: mongodb_monitoring
      service_name: mongodb-monitoring
      port: 27018
      host_ip: 172.20.10.71
      http_path: http://mongodb-monitoring:27018/app
    tor_control:
      host_config_key: tor_control
      service_name: tor-control
      port: 9051
      host_ip: 172.20.10.65
      http_path: http://tor-control:9051/app
    tor_socks:
      host_config_key: tor_socks
      service_name: tor-socks
      port: 9050
      host_ip: 172.20.10.64
      http_path: http://tor-socks:9050/app
    tunnel_tools:
      host_config_key: tunnel_tools
      service_name: tunnel-tools
      port: 7000
      host_ip: 172.20.10.66
      http_path: http://tunnel-tools:7000/app
