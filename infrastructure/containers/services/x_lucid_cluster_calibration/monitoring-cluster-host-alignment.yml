# Runtime (container): /app/service_configs/x_lucid_cluster_calibration/monitoring-cluster-host-alignment.yml
# Canonical monitoring cluster alignment: host-config.yml + x-files-listing.txt (merge with docker-compose for this stack).
x-lucid-calibration:
  cluster: monitoring
  source_host_config: infrastructure/containers/host-config.yml
  source_x_files_listing: x-files-listing.txt
  description: Host registry + x-lucid file paths for monitoring cluster (merge with docker-compose fragments for this stack).
x-lucid-host-config:
  file: ../../host-config.yml
  repo_path: infrastructure/containers/host-config.yml
  version: '1.0'
  description: Lucid container host registry for Docker DNS hostnames, ports, discovery URLs, and static host IPs.
  ip_source_repo_path: service-ip.txt
  http_path_template: http://{service_name}:{port}/app
  host_ip_range: 172.20.10.1–172.20.10.76
  in_container_path: /app/configs/host-config.yml
x-lucid-host-config-alignment:
  registry_path: /app/configs/host-config.yml
  http_path_template: http://{service_name}:{port}/app
  host_ip_range: 172.20.10.1–172.20.10.76
  entries:
    prometheus_metrics:
      host_config_key: prometheus_metrics
      service_name: prometheus-metrics
      port: 9090
      host_ip: 172.20.10.74
      http_path: http://prometheus-metrics:9090/app
x-lucid-x-files-calibration:
