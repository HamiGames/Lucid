# Runtime (container): /app/service_configs/x_lucid_cluster_calibration/gui-integration-cluster-host-alignment.yml
# Canonical gui-integration cluster alignment: host-config.yml + x-files-listing.txt (merge with docker-compose for this stack).
x-lucid-calibration:
  cluster: gui-integration
  source_host_config: infrastructure/containers/host-config.yml
  source_x_files_listing: x-files-listing.txt
  description: Host registry + x-lucid file paths for gui-integration cluster (merge with docker-compose fragments for this
    stack).
x-lucid-host-config:
  file: ../../host-config.yml
  repo_path: infrastructure/containers/host-config.yml
  version: '1.0'
  description: Lucid container host registry for Docker DNS hostnames, ports, discovery URLs, and static host IPs.
  ip_source_repo_path: service-ip.txt
  http_path_template: http://{service_name}:{port}/app
  host_ip_range: 172.20.10.1–172.20.10.76
  in_container_path: /app/configs/host-config.yml
x-lucid-host-config-alignment:
  registry_path: /app/configs/host-config.yml
  http_path_template: http://{service_name}:{port}/app
  host_ip_range: 172.20.10.1–172.20.10.76
  entries:
    electron_gui_node:
      host_config_key: electron_gui_node
      service_name: electron-gui-node
      port: 3002
      host_ip: 172.20.10.76
      http_path: http://electron-gui-node:3002/app
    electron_gui_user:
      host_config_key: electron_gui_user
      service_name: electron-gui-user
      port: 3001
      host_ip: 172.20.10.75
      http_path: http://electron-gui-user:3001/app
    gui_api_bridge:
      host_config_key: gui_api_bridge
      service_name: gui-api-bridge
      port: 8102
      host_ip: 172.20.10.61
      http_path: http://gui-api-bridge:8102/app
    gui_docker_manager:
      host_config_key: gui_docker_manager
      service_name: gui-docker-manager
      port: 8098
      host_ip: 172.20.10.60
      http_path: http://gui-docker-manager:8098/app
    gui_hardware_manager:
      host_config_key: gui_hardware_manager
      service_name: gui-hardware-manager
      port: 8099
      host_ip: 172.20.10.62
      http_path: http://gui-hardware-manager:8099/app
    gui_tor_manager_http:
      host_config_key: gui_tor_manager_http
      service_name: gui-tor-manager
      port: 8097
      host_ip: 172.20.10.63
      http_path: http://gui-tor-manager:8097/app
