# Runtime (container): /app/service_configs/x_lucid_cluster_calibration/storage-cluster-host-alignment.yml
# Canonical storage cluster alignment: host-config.yml + x-files-listing.txt (merge with docker-compose for this stack).
x-lucid-calibration:
  cluster: storage
  source_host_config: infrastructure/containers/host-config.yml
  source_x_files_listing: x-files-listing.txt
  description: Host registry + x-lucid file paths for storage cluster (merge with docker-compose fragments for this stack).
x-lucid-host-config:
  file: ../../host-config.yml
  repo_path: infrastructure/containers/host-config.yml
  version: '1.0'
  description: Lucid container host registry for Docker DNS hostnames, ports, discovery URLs, and static host IPs.
  ip_source_repo_path: service-ip.txt
  http_path_template: http://{service_name}:{port}/app
  host_ip_range: 172.20.10.1–172.20.10.76
  in_container_path: /app/configs/host-config.yml
x-lucid-host-config-alignment:
  registry_path: /app/configs/host-config.yml
  http_path_template: http://{service_name}:{port}/app
  host_ip_range: 172.20.10.1–172.20.10.76
  entries:
    lucid_system_storage:
      host_config_key: lucid_system_storage
      service_name: lucid-system-storage
      port: 9900
      host_ip: 172.20.10.72
      http_path: http://lucid-system-storage:9900/app
    session_storage:
      host_config_key: session_storage
      service_name: session-storage
      port: 8082
      host_ip: 172.20.10.11
      http_path: http://session-storage:8082/app
    session_storage_service:
      host_config_key: session_storage_service
      service_name: session-storage-service
      port: 8020
      host_ip: 172.20.10.10
      http_path: http://session-storage-service:8020/app
x-lucid-x-files-calibration:
