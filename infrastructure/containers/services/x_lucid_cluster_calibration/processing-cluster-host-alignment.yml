# Runtime (container): /app/service_configs/x_lucid_cluster_calibration/processing-cluster-host-alignment.yml
# Canonical processing cluster alignment: host-config.yml + x-files-listing.txt (merge with docker-compose for this stack).
x-lucid-calibration:
  cluster: processing
  source_host_config: infrastructure/containers/host-config.yml
  source_x_files_listing: x-files-listing.txt
  description: Host registry + x-lucid file paths for processing cluster (merge with docker-compose fragments for this stack).
x-lucid-host-config:
  file: ../../host-config.yml
  repo_path: infrastructure/containers/host-config.yml
  version: '1.0'
  description: Lucid container host registry for Docker DNS hostnames, ports, discovery URLs, and static host IPs.
  ip_source_repo_path: service-ip.txt
  http_path_template: http://{service_name}:{port}/app
  host_ip_range: 172.20.10.1–172.20.10.76
  in_container_path: /app/configs/host-config.yml
x-lucid-host-config-alignment:
  registry_path: /app/configs/host-config.yml
  http_path_template: http://{service_name}:{port}/app
  host_ip_range: 172.20.10.1–172.20.10.76
  entries:
    session_api:
      host_config_key: session_api
      service_name: session-api
      port: 8113
      host_ip: 172.20.10.17
      http_path: http://session-api:8113/app
    session_chunk_processor:
      host_config_key: session_chunk_processor
      service_name: session-chunk-processor
      port: 8010
      host_ip: 172.20.10.9
      http_path: http://session-chunk-processor:8010/app
    session_merkle_tree_builder:
      host_config_key: session_merkle_tree_builder
      service_name: session-merkle-tree-builder
      port: 8092
      host_ip: 172.20.10.15
      http_path: http://session-merkle-tree-builder:8092/app
    session_overlord:
      host_config_key: session_overlord
      service_name: session-overlord
      port: 8110
      host_ip: 172.20.10.16
      http_path: http://session-overlord:8110/app
    session_pipeline:
      host_config_key: session_pipeline
      service_name: session-pipeline
      port: 8083
      host_ip: null
      http_path: http://session-pipeline:8083/app
    session_pipeline_manager:
      host_config_key: session_pipeline_manager
      service_name: session-pipeline-manager
      port: 7990
      host_ip: 172.20.10.8
      http_path: http://session-pipeline-manager:7990/app
    session_processor:
      host_config_key: session_processor
      service_name: session-processor
      port: 8091
      host_ip: 172.20.10.14
      http_path: http://session-processor:8091/app
    session_system_control:
      host_config_key: session_system_control
      service_name: session-system-control
      port: 7988
      host_ip: 172.20.10.7
      http_path: http://session-system-control:7988/app
