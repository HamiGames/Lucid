# =============================================================================
# Admin overlord — YAML trigger definitions
# Path: admin/over_lord/triggers.yaml
#
# Step types (same as node-overlord):
#   copy_file      — copy from /app/over_lord (src) to configs/environment (dest)
#   yaml_to_dotenv — map YAML paths to KEY=value under configs/environment
# =============================================================================
version: 1

startup:
  run_triggers: []

triggers:
  - id: publish-admin-yaml-bundle
    description: Snapshot admin overlord YAML/compose into configs/environment/snapshots
    steps:
      - type: copy_file
        src: config.yaml
        dest: snapshots/admin-overlord-config.yaml
      - type: copy_file
        src: openapi.yaml
        dest: snapshots/admin-overlord-openapi.yaml
      - type: copy_file
        src: docker-compose.yml
        dest: snapshots/admin-docker-compose.yml
      - type: copy_file
        src: triggers.yaml
        dest: snapshots/admin-triggers.yaml
      - type: copy_file
        src: env.admin-interface.template
        dest: snapshots/env.admin-interface.template

  - id: render-env-from-admin-config-yaml
    description: Emit dotenv fragment from config.yaml global.* for host merge
    steps:
      - type: yaml_to_dotenv
        yaml_file: config.yaml
        outfile: .env.admin.from-yaml
        header: |
          # Generated by admin-overlord trigger render-env-from-admin-config-yaml
          # Merge with configs/environment/.env.admin and .env.secrets on the host
        mappings:
          - yaml: global.overlord_port
            env: ADMIN_OVERLORD_PORT
          - yaml: global.service_name
            env: ADMIN_OVERLORD_SERVICE_NAME
