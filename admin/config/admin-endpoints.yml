# admin/config/admin-endpoints.yml
#
# Host registry: infrastructure/containers/host-config.yml (container: /app/configs/host-config.yml)
# http_path_template: http://${service_name}:${port}/app

version: "1.0"

meta:
  host_config_path: infrastructure/containers/host-config.yml
  host_config_container_path: /app/configs/host-config.yml
  services_config_root: /app/configs/services
  admin_interface_bundle: /app/configs/services/admin-interface.yml
  http_path_template: http://${service_name}:${port}/app
  description: >
    Admin-plane HTTP bases. base_url ends with /app; health_path is relative to base_url.

